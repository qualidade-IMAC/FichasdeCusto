                            <div className={`bg-white/5 rounded-2xl p-4 flex items-center ${isSidebarExpanded ? 'justify-between' : 'flex-col gap-3 justify-center'}`}>
                                {isSidebarExpanded ? (
                                    <>
                                        <div className="flex items-center gap-3 overflow-hidden">
                                            {user?.photoURL ? <img src={user.photoURL} className="w-8 h-8 rounded-full flex-shrink-0" /> : <div className="w-8 h-8 rounded-full bg-stone-800 flex items-center justify-center flex-shrink-0"><Users size={16} className="text-stone-400"/></div>}
                                            <div className="flex flex-col text-left overflow-hidden">
                                                <span className="text-xs text-white font-bold truncate max-w-[120px]">{user?.displayName || 'Utilizador'}</span>
                                                <button onClick={() => signOut(auth)} className="text-[10px] text-stone-500 hover:text-brand-orange transition-colors uppercase font-bold tracking-widest mt-0.5 flex items-center gap-1 w-max"><LogOut size={10}/> Terminar Sessão</button>
                                            </div>
                                        </div>
                                        <div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.8)] flex-shrink-0"></div>
                                    </>
                                ) : (
                                    <>
                                        {user?.photoURL ? <img src={user.photoURL} title={user?.displayName || 'Utilizador'} className="w-8 h-8 rounded-full flex-shrink-0" /> : <div title={user?.displayName || 'Utilizador'} className="w-8 h-8 rounded-full bg-stone-800 flex items-center justify-center flex-shrink-0"><Users size={16} className="text-stone-400"/></div>}
                                        <button onClick={() => signOut(auth)} title="Terminar Sessão" className="text-stone-500 hover:text-brand-orange transition-colors p-1"><LogOut size={16}/></button>
                                    </>
                                )}
                            </div>
                        </div>
                    </aside>

                    <div id="main-content" className="flex-1 flex flex-col min-w-0 bg-[#f5f5f4] relative h-full">
                        <div className="md:hidden flex items-center justify-between bg-white text-stone-900 px-6 py-4 border-b border-stone-200 shadow-sm z-30 no-print sticky top-0">
                            <div className="flex items-center gap-3">
                                {settings?.logo ? <img src={settings.logo} className="h-9 w-auto rounded-lg" /> : <div className="p-2 bg-brand-orange rounded-xl text-white shadow-md shadow-orange-500/20"><ChefHat size={18} strokeWidth={2.5}/></div>}
                                <span className="font-black text-stone-900 tracking-wide text-lg">Fichas Técnicas</span>
                            </div>
                            <button onClick={() => setIsMobileMenuOpen(true)} className="p-2.5 text-stone-600 bg-stone-100 hover:bg-stone-200 rounded-xl transition-colors"><Menu size={20} strokeWidth={2.5} /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-10 custom-scroll relative">
                            {content}
                        </div>
                    </div>

                    {notification && <div className="fixed bottom-6 right-6 bg-stone-900 text-white px-6 py-4 rounded-2xl shadow-2xl shadow-black/20 z-50 animate-slide-in flex items-center gap-4 no-print border border-stone-700 font-bold"><CheckCircle size={22} className="text-emerald-400" strokeWidth={2.5}/>{notification}</div>}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
