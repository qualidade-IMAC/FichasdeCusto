                                <button onClick={()=>setEditorTab('receita')} className={`px-6 py-3.5 font-bold text-sm whitespace-nowrap rounded-t-xl transition-colors flex items-center gap-2 border-b-2 ${editorTab==='receita' ? 'border-imac-yellow text-imac-yellow bg-white' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-50'}`}><i className="ph ph-list-checks text-lg"></i> Ficha Técnica (Receita)</button>
                                <button onClick={()=>setEditorTab('custos')} className={`px-6 py-3.5 font-bold text-sm whitespace-nowrap rounded-t-xl transition-colors flex items-center gap-2 border-b-2 ${editorTab==='custos' ? 'border-gray-800 text-gray-800 bg-white' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-50'}`}><i className="ph ph-cube text-lg"></i> Operação & Indiretos</button>
                                <button onClick={()=>setEditorTab('precificacao')} className={`px-6 py-3.5 font-bold text-sm whitespace-nowrap rounded-t-xl transition-colors flex items-center gap-2 border-b-2 ${editorTab==='precificacao' ? 'border-emerald-600 text-emerald-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-50'}`}><i className="ph ph-trend-up text-lg"></i> Precificação Final</button>
                            </div>

                            {/* ABA 1: RECEITA */}
                            <div className={`space-y-6 ${editorTab==='receita' ? 'block animate-fadeIn' : 'hidden'}`}>
                                {activeSections.length === 0 && (
                                    <div className="text-center py-16 bg-white rounded-2xl border-2 border-dashed border-gray-200">
                                        <div className="mx-auto w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4"><i className="ph ph-cookie text-3xl text-gray-400"></i></div>
                                        <h3 className="text-lg font-black text-gray-700">Comece a sua Receita</h3>
                                        <p className="text-sm text-gray-500 mb-6 max-w-sm mx-auto font-medium">Adicione os ingredientes, organize por etapas do processo (Ex: Massa, Recheio) e estabeleça os padrões de perda.</p>
                                        <Button onClick={() => addIng(settings?.stages?.[0] || 'Massa')} variant="brand" className="mx-auto px-6 py-3"><i className="ph ph-plus text-lg"></i> Adicionar Primeiro Ingrediente</Button>
                                    </div>
                                )}

                                {activeSections.map((secName) => {
                                    const secIngs = p.ingredients.map((ing, i) => ({...ing, originalIdx: i})).filter(ing => (ing.section || settings?.stages?.[0] || 'Massa') === secName);
                                    const secLoss = p.sections?.[secName]?.processLossPct || 0;
                                    
                                    return (
                                        <div key={secName} className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm avoid-break hover:border-imac-yellow transition-colors">
                                            <div className="bg-gray-50 p-5 border-b border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4">
                                                <h3 className="font-black text-imac-text flex items-center gap-3 text-lg"><div className="w-1.5 h-6 bg-imac-yellow rounded-full"></div> {secName}</h3>
                                                <div className="flex items-center gap-4 bg-white px-4 py-2 rounded-xl border border-gray-200 shadow-sm">
                                                    <span className="text-xs font-bold uppercase text-gray-500 tracking-wider">Perda (Evaporação/Quebra)</span>
                                                    <div className="flex items-center gap-1">
                                                        <input type="number" className="w-16 text-right font-black text-red-500 outline-none bg-red-50 p-1 rounded" value={secLoss} onChange={e => updateSection(secName, 'processLossPct', Number(e.target.value))} />
                                                        <span className="text-sm font-bold text-red-500">%</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-5 space-y-3">
                                                <div className="hidden md:flex gap-3 px-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100 pb-2">
                                                    <div className="flex-1">Ingrediente Base</div><div className="w-24 text-center">Quant.</div><div className="w-16 text-center">Medida</div><div className="w-24 text-center" title="Qtd Fixa Setup">Fixo/Setup*</div><div className="w-32 text-right">Custo Unitário</div><div className="w-10"></div>
                                                </div>
                                                {secIngs.map((ing) => {
                                                    const idx = ing.originalIdx;
                                                    const isLinked = !!ing.ingredientId;
                                                    return (
                                                        <div key={idx} className={`flex flex-wrap md:flex-nowrap gap-3 items-center p-2.5 rounded-xl border transition-all ${isLinked ? 'bg-yellow-50/30 border-yellow-200 shadow-sm' : 'bg-white hover:bg-gray-50 border-gray-100'}`}>
                                                            <div className="flex-1 flex items-center gap-2 w-full md:w-auto">
                                                                <button onClick={() => { if(isLinked) handleUnlink(idx); else { setEditorActiveLinkIdx(idx); setEditorIngModalOpen(true); } }} className={`p-2 rounded-lg transition-colors ${isLinked ? 'text-imac-yellow bg-yellow-100' : 'text-gray-400 bg-gray-100 hover:bg-gray-200'}`} title={isLinked ? "Desvincular" : "Vincular ao Estoque Central"}>
                                                                    {isLinked ? <i className="ph ph-link text-lg"></i> : <i className="ph ph-link-break text-lg"></i>}
                                                                </button>
                                                                <input placeholder="Nome do Ingrediente..." value={ing.name} onChange={e => updateIng(idx, 'name', e.target.value)} className="w-full bg-transparent border-none outline-none font-bold text-sm text-gray-800 placeholder:text-gray-300" readOnly={isLinked} />
                                                            </div>
                                                            <div className="w-1/3 md:w-24"><input type="number" step="any" placeholder="Qtd" value={ing.qty} onChange={e => updateIng(idx, 'qty', e.target.value)} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm text-center font-black text-gray-800 outline-none focus:border-imac-yellow" /></div>
                                                            <div className="w-1/3 md:w-16"><select value={ing.unit} onChange={e => updateIng(idx, 'unit', e.target.value)} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm text-center font-bold outline-none" disabled={isLinked}><option value="g">g</option><option value="kg">kg</option><option value="ml">ml</option><option value="l">L</option><option value="un">un</option></select></div>
                                                            <div className="w-1/3 md:w-24"><input type="number" step="any" placeholder="Fixo" value={ing.fixedQty||''} onChange={e => updateIng(idx, 'fixedQty', e.target.value)} className="w-full p-2.5 bg-blue-50/50 border border-blue-200 rounded-lg text-sm text-center text-blue-700 font-bold outline-none" title="Quantidade que não se multiplica ao fazer mais lotes" /></div>
                                                            <div className="w-full md:w-32 relative flex items-center">
                                                                <span className="absolute left-3 text-xs font-bold text-gray-400">R$</span>
                                                                <input type="number" step="any" className={`w-full p-2.5 pl-8 border rounded-lg text-sm text-right font-black outline-none ${isLinked ? 'bg-yellow-100/50 text-gray-600 border-yellow-200' : 'bg-white border-gray-200 focus:border-imac-yellow'}`} value={getIngCostDisplay(ing)} onChange={e => updateIng(idx, 'cost', e.target.value)} readOnly={isLinked} />
                                                            </div>
                                                            <button onClick={() => removeIng(idx)} className="text-gray-300 hover:text-red-500 p-2.5 hover:bg-red-50 rounded-lg transition-colors"><i className="ph ph-trash text-xl"></i></button>
                                                        </div>
                                                    )
                                                })}
                                                <Button variant="outline" onClick={() => addIng(secName)} className="mt-4 text-gray-600 w-full border-dashed border-2 py-3 hover:border-imac-yellow hover:text-imac-yellow"><i className="ph ph-plus text-lg"></i> Adicionar Ingrediente em {secName}</Button>
                                            </div>
                                        </div>
                                    )
                                })}

                                <div className="bg-gray-50 p-6 border-2 border-dashed border-gray-200 rounded-xl text-center no-print">
                                    <span className="block text-sm text-gray-600 font-bold mb-4 uppercase tracking-wider">Criar Nova Etapa de Produção:</span>
                                    <div className="inline-flex flex-wrap gap-2 justify-center">
                                        {(settings?.stages || []).map(s => <button key={s} onClick={() => addIng(s)} className="px-4 py-2 bg-white border shadow-sm rounded-xl text-xs font-bold text-gray-700 hover:border-imac-yellow hover:text-imac-yellow transition-all">+ {s}</button>)}
                                    </div>
                                </div>
                            </div>

                            {/* ABA 2: CUSTOS ADICIONAIS */}
                            <div className={`space-y-6 ${editorTab==='custos' ? 'block animate-fadeIn' : 'hidden'}`}>
                                {/* Mão de Obra */}
                                <Card className="overflow-hidden border-0 shadow-md">
                                    <div className="px-6 py-4 bg-gray-800 text-white flex items-center gap-3"><i className="ph ph-clock text-xl"></i><h3 className="font-black text-lg uppercase tracking-wide">Mão de Obra Operacional</h3></div>
                                    <div className="p-6 space-y-3 bg-gray-50/30">
                                        {p.laborItems?.map(l => {
                                            const emp = (settings?.employees || []).find(e => e.id == l.employeeId);
                                            return (
                                                <div key={l.id} className="flex gap-3 items-center bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
                                                    <div className="flex-1 font-bold text-sm text-gray-800 pl-2">{emp?.name || 'Desconhecido'}</div>
                                                    <div className="flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-lg border border-gray-200">
                                                        <input type="number" className="w-16 bg-transparent text-right outline-none font-black text-gray-800" value={l.minutes} onChange={e => { const nl = p.laborItems.map(x=>x.id===l.id?{...x,minutes:e.target.value}:x); updateField('laborItems', nl); }}/> 
                                                        <span className="text-xs font-bold text-gray-500 uppercase">minutos</span>
                                                    </div>
                                                    <button onClick={() => { const nl = p.laborItems.filter(x=>x.id!==l.id); updateField('laborItems', nl); }} className="p-3 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><i className="ph ph-trash text-xl"></i></button>
                                                </div>
                                            )
                                        })}
                                        <div className="flex flex-col sm:flex-row gap-3 mt-4 bg-gray-100 p-4 rounded-xl border border-gray-200 border-dashed">
                                            <select id="newLaborEmp" className="flex-1 p-3 bg-white border border-gray-200 rounded-xl text-sm font-bold outline-none focus:border-imac-yellow"><option value="">Selecionar Profissional...</option>{(settings?.employees || []).map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</select>
                                            <div className="flex gap-3">
                                                <input id="newLaborMin" type="number" placeholder="Minutos" className="w-32 p-3 bg-white border border-gray-200 rounded-xl text-sm text-center outline-none font-black focus:border-imac-yellow"/>
                                                <Button onClick={() => { 
                                                    const empId = document.getElementById('newLaborEmp').value; const min = document.getElementById('newLaborMin').value;
                                                    if(empId && min) { updateField('laborItems', [...(p.laborItems||[]), {id:generateId(), employeeId: empId, minutes: Number(min)}]); document.getElementById('newLaborEmp').value=''; document.getElementById('newLaborMin').value='';}
                                                }} variant="secondary" className="px-6">Adicionar</Button>
                                            </div>
                                        </div>
                                    </div>
                                </Card>

                                {/* Energia */}
                                <Card className="overflow-hidden border-0 shadow-md">
                                    <div className="px-6 py-4 bg-imac-yellow text-white flex items-center gap-3"><i className="ph ph-lightning text-xl"></i><h3 className="font-black text-lg uppercase tracking-wide">Maquinário & Energia</h3></div>
                                    <div className="p-6 space-y-3 bg-gray-50/30">
                                        {p.machineryItems?.map(m => {
                                            return (
                                                <div key={m.id} className="flex gap-3 items-center bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
                                                    <select className="flex-1 p-2 text-sm font-bold text-gray-800 border-none bg-transparent outline-none focus:ring-0" value={m.machineId} onChange={e => { const nm = p.machineryItems.map(x=>x.id===m.id?{...x,machineId:e.target.value}:x); updateField('machineryItems', nm); }}>{(settings?.machines || []).map(sm => <option key={sm.id} value={sm.id}>{sm.name}</option>)}</select>
                                                    <div className="flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-lg border border-gray-200">
                                                        <input type="number" className="w-16 bg-transparent text-right outline-none font-black text-gray-800" value={m.timeMinutes} onChange={e => { const nm = p.machineryItems.map(x=>x.id===m.id?{...x,timeMinutes:e.target.value}:x); updateField('machineryItems', nm); }}/> 
                                                        <span className="text-xs font-bold text-gray-500 uppercase">minutos</span>
                                                    </div>
                                                    <button onClick={() => { const nm = p.machineryItems.filter(x=>x.id!==m.id); updateField('machineryItems', nm); }} className="p-3 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><i className="ph ph-trash text-xl"></i></button>
                                                </div>
                                            )
                                        })}
                                        <Button onClick={() => updateField('machineryItems', [...(p.machineryItems||[]), {id:generateId(), machineId: settings?.machines?.[0]?.id, timeMinutes: 60}])} variant="outline" className="w-full border-dashed border-2 py-3 mt-4 text-gray-600 hover:border-imac-yellow hover:text-imac-yellow"><i className="ph ph-plus text-lg"></i> Adicionar Uso de Máquina</Button>
                                    </div>
                                </Card>

                                {/* Indiretos */}
                                <Card className="overflow-hidden border-0 shadow-md">
                                    <div className="px-6 py-4 bg-imac-blue text-white flex items-center gap-3"><i className="ph ph-coins text-xl"></i><h3 className="font-black text-lg uppercase tracking-wide">Custos Indiretos / Taxas / Embalagens</h3></div>
                                    <div className="p-6 space-y-3 bg-gray-50/30">
                                        <p className="text-xs font-bold text-gray-500 mb-4 bg-gray-100 p-3 rounded-lg border border-gray-200">Nota: Os itens importados das configurações padrão podem ser editados livremente apenas para esta ficha.</p>
                                        {p.indirectItems?.map(ind => (
                                            <div key={ind.id} className="flex gap-3 items-center bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
                                                <input type="text" placeholder="Descrição do Custo..." value={ind.name} onChange={e => { const ni = p.indirectItems.map(x=>x.id===ind.id?{...x,name:e.target.value}:x); updateField('indirectItems', ni); }} className="flex-1 text-sm font-bold text-gray-800 outline-none pl-2 border-none bg-transparent"/>
                                                <div className="flex items-center bg-gray-50 rounded-lg border border-gray-200 overflow-hidden">
                                                    <select value={ind.type || 'R$'} onChange={e => { const ni = p.indirectItems.map(x=>x.id===ind.id?{...x,type:e.target.value}:x); updateField('indirectItems', ni); }} className="p-3 bg-gray-100 text-xs font-black text-gray-600 outline-none border-r border-gray-200 cursor-pointer">
                                                        <option value="R$">R$</option>
                                                        <option value="%">%</option>
                                                    </select>
                                                    <input type="number" step="0.01" className="w-24 bg-transparent text-right outline-none font-black text-gray-800 p-3" value={ind.cost} onChange={e => { const ni = p.indirectItems.map(x=>x.id===ind.id?{...x,cost:e.target.value}:x); updateField('indirectItems', ni); }}/>
                                                </div>
                                                <button onClick={() => { const ni = p.indirectItems.filter(x=>x.id!==ind.id); updateField('indirectItems', ni); }} className="p-3 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><i className="ph ph-trash text-xl"></i></button>
                                            </div>
                                        ))}
                                        <Button onClick={() => updateField('indirectItems', [...(p.indirectItems||[]), {id:generateId(), name:'', cost:0, type: 'R$'}])} variant="outline" className="w-full border-dashed border-2 py-3 mt-4 text-gray-600 hover:border-imac-yellow hover:text-imac-yellow"><i className="ph ph-plus text-lg"></i> Adicionar Novo Custo Indireto</Button>
                                    </div>
                                </Card>
                            </div>

                            {/* ABA 3: PRECIFICAÇÃO */}
                            <div className={`space-y-6 ${editorTab==='precificacao' ? 'block animate-fadeIn' : 'hidden'}`}>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="space-y-8">
                                        <Card className="p-6 border-t-4 border-gray-800 shadow-md">
                                            <h3 className="font-black text-imac-text border-b border-gray-100 pb-4 mb-5 uppercase text-sm tracking-widest">Estrutura de Custos (1 Lote)</h3>
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100"><span className="text-sm font-bold text-gray-600 flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-imac-blue"></div> Matéria Prima</span><span className="font-black text-gray-800">R$ {formatMoney(t.directCost)}</span></div>
                                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100"><span className="text-sm font-bold text-gray-600 flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-gray-800"></div> Mão de Obra</span><span className="font-black text-gray-800">R$ {formatMoney(t.laborCost)}</span></div>
                                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100"><span className="text-sm font-bold text-gray-600 flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-imac-yellow"></div> Energia / Máquinas</span><span className="font-black text-gray-800">R$ {formatMoney(t.machineryCost)}</span></div>
                                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100"><span className="text-sm font-bold text-gray-600 flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-purple-500"></div> Indiretos & Taxas</span><span className="font-black text-gray-800">R$ {formatMoney(t.indirectCost)}</span></div>
                                            </div>
                                            <div className="mt-6 p-4 bg-gray-900 rounded-xl flex justify-between items-center shadow-inner">
                                                <span className="font-bold text-gray-300 uppercase tracking-widest text-xs">Custo Total do Lote</span>
                                                <span className="font-black text-2xl text-white">R$ {formatMoney(t.totalCost)}</span>
                                            </div>
                                        </Card>

                                        <Card className="p-6 bg-gradient-to-br from-gray-50 to-gray-100 border-gray-200 shadow-md">
                                            <h3 className="font-black text-gray-800 border-b border-gray-200 pb-4 mb-5 uppercase text-sm tracking-widest">Rendimento Técnico</h3>
                                            <div className="space-y-5">
                                                <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                                    <div><span className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Massa Bruta (Entrada)</span><span className="font-black text-xl text-gray-700">{t.grandTotalGrossKg.toFixed(3)} <span className="text-sm font-bold text-gray-400">kg</span></span></div>
                                                    <div className="bg-gray-100 p-2 rounded-full"><i className="ph ph-arrow-right text-gray-400 text-xl"></i></div>
                                                    <div className="text-right"><span className="block text-[10px] font-bold text-imac-blue uppercase tracking-wider mb-1">Final (Após Quebras)</span><span className="font-black text-2xl text-gray-900">{t.finalYieldKg.toFixed(3)} <span className="text-sm font-bold text-imac-blue">kg</span></span></div>
                                                </div>
                                                
                                                <div className="bg-white p-5 rounded-xl border-l-4 border-l-emerald-500 shadow-sm">
                                                    <span className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Custo Base ({p.outputType === 'unit' ? 'Por Unidade' : 'Por Quilo'})</span>
                                                    <span className="block font-black text-4xl text-emerald-600">R$ {formatMoney(t.baseCostForPricing)}</span>
                                                </div>

                                                {p.outputType === 'unit' && (
                                                    <div className="flex justify-between text-sm font-bold text-gray-500 px-2">
                                                        <span>Peso Ref: {p.outputUnitWeight}{p.outputUnitMeasure}</span>
                                                        <span>1 Lote rende ~{t.totalUnits} unidades</span>
                                                    </div>
                                                )}
                                            </div>
                                        </Card>
                                    </div>

                                    <Card className="p-0 overflow-hidden border-imac-yellow/30 shadow-xl flex flex-col h-full">
                                        <div className="bg-imac-yellow px-6 py-5 flex items-center gap-3"><i className="ph ph-trend-up text-white text-2xl"></i><h3 className="font-black text-white text-lg tracking-wide uppercase">Simulador de Preço</h3></div>
                                        <div className="p-8 flex flex-col gap-8 flex-1 bg-white">
                                            
                                            <div className="space-y-6">
                                                <div>
                                                    <label className="flex items-center justify-between text-sm font-bold text-gray-600 uppercase mb-2">
                                                        <span>Markup Alvo (Margem %)</span>
                                                    </label>
                                                    <div className="relative">
                                                        <input type="number" className="w-full p-4 bg-yellow-50/50 border border-yellow-200 rounded-xl text-imac-yellow font-black text-2xl outline-none focus:ring-2 focus:ring-imac-yellow transition-all" value={p.targetMargin} onChange={e => updateField('targetMargin', Number(e.target.value))} />
                                                        <span className="absolute right-5 top-4 text-yellow-500 font-black text-2xl">%</span>
                                                    </div>
                                                </div>
                                                <div className="bg-gray-50 p-5 rounded-xl border border-gray-200 flex justify-between items-center">
                                                    <span className="block text-xs font-bold text-gray-500 uppercase w-32">Preço Sugerido ({p.outputType==='unit'?'Un':'Kg'})</span>
                                                    <span className="block text-3xl font-black text-gray-800">R$ {formatMoney(t.suggestedPrice)}</span>
                                                </div>
                                            </div>

                                            <div className="bg-gray-900 rounded-2xl p-8 shadow-inner mt-auto">
                                                <label className="block text-sm font-bold text-gray-400 uppercase mb-4 flex items-center gap-2 tracking-wider"><i className="ph ph-currency-dollar text-lg"></i> Preço de Venda Real Praticado</label>
                                                <div className="relative mb-8">
                                                    <span className="absolute left-4 top-4 text-white/50 font-black text-3xl">R$</span>
                                                    <input type="number" step="0.01" className="w-full p-4 pl-16 bg-white/10 border-2 border-white/20 rounded-xl text-4xl font-black text-white outline-none focus:border-emerald-500 transition-colors" value={p.manualSalePrice||''} onChange={e => updateField('manualSalePrice', Number(e.target.value))} placeholder={formatMoney(t.suggestedPrice)} />
                                                </div>
                                                
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className={`p-4 rounded-xl border ${t.marginPercent >= p.targetMargin ? 'bg-emerald-500/20 border-emerald-500/30 text-emerald-400' : 'bg-red-500/20 border-red-500/30 text-red-400'}`}>
                                                        <span className="block text-[10px] uppercase font-bold tracking-widest opacity-80 mb-1">Margem Real</span>
                                                        <span className="block text-2xl font-black">{formatMoney(t.marginPercent)}%</span>
                                                    </div>
                                                    <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                                                        <span className="block text-[10px] uppercase font-bold text-gray-400 tracking-widest mb-1">Lucro Bruto ({p.outputType==='unit'?'Un':'Kg'})</span>
                                                        <span className="block text-2xl font-black text-white">R$ {formatMoney(t.grossProfit)}</span>
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    </Card>
                                </div>
                            </div>
                        </div>

                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-lg flex justify-center gap-4 z-50 md:hidden">
                             <Button onClick={handleSave} className="bg-imac-text text-white w-full"><i className="ph ph-floppy-disk text-lg"></i> Guardar Produto</Button>
                        </div>
                    </div>
                );
            };

            // VISTA: ESTOQUE (INVENTÁRIO)
            // ==========================================
            const renderInventory = () => {
                const addIng = async () => { 
                    if(invNewIng.name && invNewIng.price) { 
                        const newObj = { ...invNewIng, id: generateId(), price: Number(invNewIng.price) };
                        if (user) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', newObj.id), newObj);
                        setInvNewIng({code: '', name:'', price:'', unit:'kg'}); 
                        notify("Insumo adicionado ao estoque!"); 
                    } 
                };
                const updateIng = async (id, f, v) => {
                    setIngredients(prev => prev.map(i => i.id === id ? { ...i, [f]: v } : i));
                    if (user) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', id), { [f]: v }, { merge: true });
                };
                const removeIng = async (id) => {
                    if (user) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', id));
                };
                
                const filteredIngredients = ingredients.filter(i => 
                    i.name.toLowerCase().includes(invSearch.toLowerCase()) || 
                    (i.code && String(i.code).toLowerCase().includes(invSearch.toLowerCase()))
                );
                
                return (
                    <div className="max-w-7xl mx-auto space-y-6 animate-fade-in pb-20">
                        <NavHeader title="Estoque Integrado de Insumos" />
                        
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <Card className="p-6 h-fit bg-white border border-gray-200 shadow-sm">
                                <h3 className="font-black text-gray-800 mb-6 flex items-center gap-2 text-lg uppercase tracking-wider"><i className="ph ph-plus text-imac-yellow"></i> Novo Insumo Manual</h3>
                                <div className="space-y-5">
                                    <div className="grid grid-cols-3 gap-3">
                                        <div className="col-span-1"><label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Cód. ERP</label><input placeholder="Ex: 114" value={invNewIng.code} onChange={e=>setInvNewIng({...invNewIng, code: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-imac-yellow bg-gray-50 font-mono text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Descrição / Nome</label><input placeholder="Ex: Farinha de Trigo" value={invNewIng.name} onChange={e=>setInvNewIng({...invNewIng, name: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-imac-yellow bg-gray-50 text-sm font-black text-gray-800" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Preço (R$)</label><input type="number" step="0.01" placeholder="0.00" value={invNewIng.price} onChange={e=>setInvNewIng({...invNewIng, price: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-imac-yellow font-black text-imac-yellow bg-yellow-50/30" /></div>
                                        <div><label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Unidade</label><input placeholder="kg, L, un" value={invNewIng.unit} onChange={e=>setInvNewIng({...invNewIng, unit: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-imac-yellow bg-gray-50 text-center font-bold text-gray-600 text-sm" /></div>
                                    </div>
                                    <Button className="w-full bg-imac-text text-white shadow-md py-3.5 mt-2" onClick={addIng}>Gravar no Estoque</Button>
                                </div>
                            </Card>

                            <Card className="p-0 lg:col-span-2 overflow-hidden flex flex-col border border-gray-200 shadow-sm">
                                <div className="bg-gray-900 text-white px-6 py-5 flex flex-col sm:flex-row items-center justify-between gap-4">
                                    <div className="flex items-center gap-3"><i className="ph ph-database text-2xl text-imac-yellow"></i><h3 className="font-black text-lg tracking-wide">Base de Dados de Insumos</h3><span className="bg-white/10 px-2.5 py-1 rounded-lg text-xs font-black border border-white/10">{ingredients.length}</span></div>
                                    <div className="flex items-center gap-3 w-full sm:w-auto">
                                        <div className="relative flex-1 sm:w-64 text-gray-900">
                                            <i className="ph ph-magnifying-glass absolute left-3 top-2.5 text-gray-400 text-lg"></i>
                                            <input type="text" placeholder="Pesquisa Inteligente (Nome ou Cód)..." value={invSearch} onChange={e=>setInvSearch(e.target.value)} className="w-full pl-10 pr-4 py-2 text-sm rounded-xl bg-white border-0 outline-none focus:ring-2 focus:ring-imac-yellow font-bold"/>
                                        </div>
                                        <button onClick={() => setView('inv_print')} className="bg-white/10 hover:bg-white/20 border border-white/10 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors" title="Imprimir Base de Dados"><i className="ph ph-file-arrow-down text-lg"></i> Ficha TI</button>
                                        <button onClick={() => { setWtPanelOpen(v => !v); setWtImportStep('idle'); setWtParsed([]); setWtPasteText(''); setWtSyncResult(null); }} className={`px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors border ${wtPanelOpen ? 'bg-imac-yellow text-white border-imac-yellow' : 'bg-white/10 hover:bg-white/20 border-white/10 text-white'}`}>
                                            <i className="ph ph-currency-dollar text-lg"></i> Atualizar Custos
                                        </button>
                                    </div>
                                </div>

                                {/* ── PAINEL IMPORTAÇÃO DE CUSTOS ── */}
                                {wtPanelOpen && (
                                    <div className="bg-gradient-to-br from-slate-900 to-blue-950 border-b border-blue-900 p-5 animate-fade-in">
                                        {/* Header */}
                                        <div className="flex items-center gap-3 mb-5">
                                            <div className="w-9 h-9 rounded-xl bg-imac-yellow flex items-center justify-center flex-shrink-0"><i className="ph ph-currency-dollar text-white text-xl"></i></div>
                                            <div>
                                                <h4 className="font-black text-white text-sm tracking-wide">Atualizar Custos via WinThor / Portal</h4>
                                                <p className="text-blue-300 text-xs font-medium">Importe a tabela de custos do portal corporativo — sem instalar nada</p>
                                            </div>
                                            {wtLastSync && <span className="ml-auto text-[10px] font-bold text-blue-400 text-right hidden md:block whitespace-nowrap">Última atualização:<br/>{wtLastSync}</span>}
                                        </div>

                                        {wtImportStep === 'idle' && (
                                            <>
                                                {/* Passo a passo */}
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-5">
                                                    {[
                                                        { n:'1', icon:'ph-globe', title:'Abra o portal', desc:'Acesse 192.168.26.225/producao/custos no navegador' },
                                                        { n:'2', icon:'ph-selection-all', title:'Selecione a tabela', desc:'Ctrl+A na tabela de custos, depois Ctrl+C para copiar' },
                                                        { n:'3', icon:'ph-clipboard-text', title:'Cole aqui', desc:'Clique na área abaixo e pressione Ctrl+V' },
                                                    ].map(s => (
                                                        <div key={s.n} className="flex gap-3 bg-white/5 border border-blue-800/50 rounded-xl p-4">
                                                            <div className="w-7 h-7 rounded-full bg-imac-yellow text-white font-black text-sm flex items-center justify-center flex-shrink-0">{s.n}</div>
                                                            <div><p className="font-black text-white text-xs mb-0.5">{s.title}</p><p className="text-blue-300 text-[11px] font-medium">{s.desc}</p></div>
                                                        </div>
                                                    ))}
                                                </div>

                                                {/* Área de colar + upload */}
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-2">Colar dados copiados do portal (Ctrl+V)</label>
                                                        <textarea
                                                            className="w-full h-32 px-4 py-3 rounded-xl bg-white/10 border border-blue-700 text-white text-xs font-mono outline-none focus:border-imac-yellow transition-colors resize-none placeholder-blue-600"
                                                            placeholder={"Cole aqui os dados copiados da tabela do portal...\nEx:\n3590\tFECULA DE MANDIOCA\tKG\t60.61\t...\t3,60\n113\tOVO LIQUIDO\tKG\t...\t13,36"}
                                                            value={wtPasteText}
                                                            onChange={e => wtHandlePaste(e.target.value)}
                                                        />
                                                    </div>
                                                    <div className="flex flex-col gap-3">
                                                        <div>
                                                            <label className="block text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-2">Ou envie um arquivo Excel / CSV</label>
                                                            <div className="relative h-32 border-2 border-dashed border-blue-700 hover:border-imac-yellow rounded-xl flex flex-col items-center justify-center gap-2 text-blue-400 hover:text-imac-yellow transition-colors cursor-pointer bg-white/5">
                                                                <input ref={wtFileRef} type="file" accept=".xlsx,.xls,.csv,.txt" className="absolute inset-0 opacity-0 cursor-pointer" onChange={wtHandleFile} />
                                                                <i className="ph ph-upload-simple text-3xl"></i>
                                                                <span className="text-xs font-bold text-center px-4">Clique para enviar<br/><span className="font-medium text-blue-500">.xlsx, .csv, .txt</span></span>
                                                            </div>
                                                        </div>
                                                        <div className="bg-white/5 border border-blue-800/50 rounded-xl p-3">
                                                            <p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1">Como exportar do portal:</p>
                                                            <p className="text-[11px] text-blue-300 font-medium">No portal, use <strong className="text-white">Ctrl+A</strong> na tabela → <strong className="text-white">Ctrl+C</strong> → cole aqui. Ou salve como Excel e envie o arquivo.</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </>
                                        )}

                                        {wtImportStep === 'preview' && (
                                            <div className="animate-fade-in">
                                                <div className="flex items-center justify-between mb-3">
                                                    <p className="font-black text-emerald-400 text-sm"><i className="ph ph-check-circle mr-2"></i>{wtParsed.length} produtos identificados — confira antes de aplicar:</p>
                                                    <button onClick={() => { setWtImportStep('idle'); setWtParsed([]); setWtPasteText(''); }} className="text-blue-400 hover:text-white text-xs font-bold transition-colors"><i className="ph ph-arrow-left mr-1"></i>Voltar</button>
                                                </div>
                                                <div className="max-h-48 overflow-y-auto custom-scroll rounded-xl border border-blue-800 mb-4">
                                                    <table className="w-full text-xs">
                                                        <thead className="bg-blue-900/60 text-blue-300 uppercase sticky top-0">
                                                            <tr><th className="px-3 py-2 text-left font-black">Código</th><th className="px-3 py-2 text-left font-black">Produto</th><th className="px-3 py-2 text-center font-black">Unid.</th><th className="px-3 py-2 text-right font-black">Custo</th><th className="px-3 py-2 text-center font-black">Insumo Vinculado</th></tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-blue-900/40">
                                                            {wtParsed.map((p, i) => {
                                                                const ing = ingredients.find(x => String(x.code) === String(p.codprod));
                                                                return (
                                                                    <tr key={i} className={`${ing ? 'bg-emerald-900/20' : 'bg-white/5'}`}>
                                                                        <td className="px-3 py-2 font-mono text-blue-300">{p.codprod}</td>
                                                                        <td className="px-3 py-2 font-bold text-white truncate max-w-[180px]">{p.descricao}</td>
                                                                        <td className="px-3 py-2 text-center text-blue-300 font-bold">{p.unidade}</td>
                                                                        <td className="px-3 py-2 text-right font-black text-imac-yellow">R$ {p.custo.toFixed(2)}</td>
                                                                        <td className="px-3 py-2 text-center">{ing ? <span className="text-emerald-400 font-bold text-[10px]">✅ {ing.name.slice(0,20)}</span> : <span className="text-red-400 font-bold text-[10px]">Sem vínculo</span>}</td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                                <div className="flex items-center justify-between gap-4 bg-blue-900/30 rounded-xl p-4 border border-blue-800">
                                                    <div>
                                                        <p className="text-white font-black text-sm">{ingredients.filter(x => x.code && wtParsed.find(p => String(p.codprod) === String(x.code))).length} insumos serão atualizados</p>
                                                        <p className="text-blue-400 text-xs font-medium mt-0.5">Apenas insumos com código ERP preenchido serão afetados</p>
                                                    </div>
                                                    <button onClick={wtApplyImport} disabled={wtSyncing} className="px-6 py-3 bg-imac-yellow hover:opacity-90 text-white rounded-xl text-sm font-black disabled:opacity-50 transition-all flex items-center gap-2 shadow-lg whitespace-nowrap">
                                                        {wtSyncing ? <><i className="ph ph-spinner animate-spin text-lg"></i>Aplicando...</> : <><i className="ph ph-arrows-clockwise text-lg"></i>Aplicar Custos</>}
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {wtImportStep === 'done' && wtSyncResult && (
                                            <div className="animate-fade-in">
                                                <div className="flex items-center gap-3 bg-emerald-900/30 border border-emerald-700/50 rounded-xl p-4 mb-4">
                                                    <i className="ph ph-check-circle text-3xl text-emerald-400"></i>
                                                    <div>
                                                        <p className="font-black text-emerald-400 text-sm">{wtSyncResult.atualizados} de {wtSyncResult.total} insumos atualizados com sucesso!</p>
                                                        <p className="text-emerald-600 text-xs font-medium">{wtLastSync}</p>
                                                    </div>
                                                    <button onClick={() => { setWtImportStep('idle'); setWtParsed([]); setWtPasteText(''); setWtSyncResult(null); }} className="ml-auto text-blue-400 hover:text-white text-xs font-bold transition-colors"><i className="ph ph-arrow-counter-clockwise mr-1"></i>Nova importação</button>
                                                </div>
                                                <div className="max-h-40 overflow-y-auto custom-scroll space-y-1">
                                                    {wtSyncResult.resultado.filter(x => x.cod).map((x,i) => (
                                                        <div key={i} className={`text-xs font-bold flex justify-between px-3 py-1.5 rounded-lg ${x.atualizado ? 'text-emerald-300 bg-emerald-900/20' : 'text-slate-500 bg-white/5'}`}>
                                                            <span>{x.nome}</span>
                                                            <span>{x.atualizado ? `✅ R$ ${x.custo?.toFixed(2)}` : '— sem código vinculado'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                                {/* ── FIM PAINEL ── */}
                                <div className="overflow-x-auto flex-1 custom-scroll h-[600px] bg-white">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-gray-50 text-gray-500 uppercase text-[10px] tracking-widest font-black sticky top-0 shadow-sm z-10">
                                            <tr><th className="p-4 w-24 text-center border-b border-gray-200">Cód. ERP</th><th className="p-4 border-b border-gray-200">Descrição do Insumo</th><th className="p-4 text-center border-b border-gray-200 w-20">Unid</th><th className="p-4 text-right border-b border-gray-200 w-32">Preço (R$)</th><th className="p-4 border-b border-gray-200 w-16"></th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {filteredIngredients.map(i => (
                                                <tr key={i.id} className="hover:bg-gray-50 transition-colors group">
                                                    <td className="p-3 text-center"><input value={i.code || ''} placeholder="-" onChange={e=>updateIng(i.id, 'code', e.target.value)} className="w-16 bg-transparent border border-transparent outline-none text-center focus:bg-white focus:border-gray-300 rounded-lg px-2 py-1.5 text-gray-500 font-mono text-xs font-bold transition-all"/></td>
                                                    <td className="p-3"><input value={i.name} onChange={e=>updateIng(i.id, 'name', e.target.value)} className="w-full bg-transparent border border-transparent outline-none font-black text-gray-800 focus:bg-white focus:border-imac-yellow rounded-lg px-3 py-1.5 transition-all"/></td>
                                                    <td className="p-3 text-center"><input value={i.unit} onChange={e=>updateIng(i.id, 'unit', e.target.value)} className="w-14 bg-transparent border border-transparent outline-none text-center focus:bg-white focus:border-gray-300 rounded-lg px-2 py-1.5 font-bold text-gray-600 transition-all"/></td>
                                                    <td className="p-3 text-right"><div className="flex items-center justify-end gap-1"><span className="text-gray-400 text-xs font-bold">R$</span><input type="number" step="0.01" value={i.price} onChange={e=>updateIng(i.id, 'price', Number(e.target.value))} className="w-20 bg-transparent border border-transparent outline-none font-black text-gray-900 text-right focus:bg-white focus:border-imac-yellow rounded-lg px-2 py-1.5 transition-all"/></div></td>
                                                    <td className="p-3 text-center"><button onClick={()=>removeIng(i.id)} className="text-gray-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-all"><i className="ph ph-trash text-lg"></i></button></td>
                                                </tr>
                                            ))}
                                            {filteredIngredients.length === 0 && <tr><td colSpan="5" className="text-center p-16 text-gray-400 font-bold">Nenhum insumo encontrado na base de dados.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    </div>
                );
            };

            const renderInvPrint = () => {
                const filteredIngredients = ingredients.filter(i => 
                    i.name.toLowerCase().includes(invSearch.toLowerCase()) || 
                    (i.code && String(i.code).toLowerCase().includes(invSearch.toLowerCase()))
                );

                return (
                    <div className="max-w-4xl mx-auto p-8 bg-white min-h-screen shadow-2xl">
                        <div className="no-print flex justify-between items-center mb-8 border-b border-gray-200 pb-6">
                            <Button variant="secondary" onClick={() => setView('inventory')} className="text-sm"><i className="ph ph-caret-left text-lg"></i> Voltar ao Estoque</Button>
                            <Button onClick={() => window.print()} className="bg-gray-900 text-white text-sm font-bold"><i className="ph ph-printer text-lg"></i> Imprimir Ficha TI</Button>
                        </div>
                        <div className="text-center mb-10">
                            {settings?.logo && <img src={settings.logo} className="h-16 w-auto mx-auto mb-4" />}
                            <h1 className="text-2xl font-black uppercase tracking-widest text-gray-800">Ficha de Cadastro de Insumos</h1>
                            <p className="text-gray-500 font-bold mt-1">Para atualização no Sistema (TI)</p>
                            <p className="text-xs text-gray-400 mt-1 font-bold">Data de Emissão: {new Date().toLocaleDateString('pt-BR')}</p>
                        </div>
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="border-b-2 border-gray-800 text-gray-800 uppercase text-xs font-black">
                                    <th className="py-2 pl-2">Código ERP</th>
                                    <th className="py-2">Item / Descrição</th>
                                    <th className="py-2 text-center">Unid.</th>
                                    <th className="py-2 pr-2 text-right">Preço Ref. (R$)</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {filteredIngredients.map((i, idx) => (
                                    <tr key={idx} className="text-sm hover:bg-gray-50">
                                        <td className="py-2 pl-2 font-mono font-bold text-gray-600">{i.code || <span className="text-gray-300 italic">Sem Código</span>}</td>
                                        <td className="py-2 font-bold text-gray-900">{i.name}</td>
                                        <td className="py-2 text-center font-bold text-gray-600">{i.unit}</td>
                                        <td className="py-2 pr-2 text-right text-gray-800 font-black">{formatMoney(i.price)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                )
            };

            const renderProdOrders = () => {
                const p = catalog.find(x => x.id === poSelectedProduct);
                const t = p ? calculateProductData(p) : null;
                let basisOptions = [];
                if (p) {
                    const activeSections = Array.from(new Set(p.ingredients.map(i => i.section || settings?.stages?.[0] || 'Massa')));
                    activeSections.forEach(s => basisOptions.push({ label: `[ETAPA] ${s}`, value: `SECTION:${s}` }));
                    p.ingredients.forEach(i => basisOptions.push({ label: `[ING] ${i.name}`, value: `ING:${i.name}:${i.section}` }));
                }

                let order = null;
                if (p && t) {
                    let factor = 1; let targetBatches = 0; let referenceLabel = "Padrão";
                    const activeSections = Array.from(new Set(p.ingredients.map(i => i.section || settings?.stages?.[0] || 'Massa')));
                    const sectionsData = {};
                    
                    activeSections.forEach(secName => {
                        const secIngs = p.ingredients.filter(i => (i.section || settings?.stages?.[0] || 'Massa') === secName);
                        const lossPct = p.sections?.[secName]?.processLossPct || 0;
                        const secGross = secIngs.reduce((acc, curr) => isPackaging(curr.name) ? acc : acc + toKg(safeVal(curr.qty), curr.unit), 0);
                        sectionsData[secName] = { secGross, yieldKg: secGross * (1 - lossPct/100) };
                    });

                    if (poMode === 'batch') { factor = Number(poInputValue) || 0; targetBatches = factor; referenceLabel = `${factor} Receita(s)`; } 
                    else if (poMode === 'target') { factor = (Number(poInputValue) || 0) / t.finalYieldKg; targetBatches = factor; referenceLabel = `Meta: ${Number(poInputValue)}kg Final`; } 
                    else if (poMode === 'proportional' && poBasisItem) {
                        const parts = poBasisItem.split(':'); const type = parts[0]; const name = parts[1]; const sec = parts[2];
                        const targetQty = Number(poInputValue) || 0; let baseQty = 0;
                        if (type === 'SECTION' && sectionsData[name]) baseQty = sectionsData[name].yieldKg; 
                        else if (type === 'ING') { const ing = p.ingredients.find(i => i.name === name && (i.section || 'Geral') === (sec || 'Geral')); if (ing) baseQty = toKg(safeVal(ing.qty), ing.unit); }
                        if (baseQty > 0) { factor = targetQty / baseQty; targetBatches = factor; referenceLabel = `Base: ${targetQty}kg de ${name}`; }
                    }

                    const sectionsOut = []; let grossTotal = 0;
                    activeSections.forEach(secName => {
                        const secIngs = p.ingredients.filter(i => (i.section || settings?.stages?.[0] || 'Massa') === secName);
                        const lossPct = p.sections?.[secName]?.processLossPct || 0;
                        let secGross = 0;
                        const scaledIngs = secIngs.map(ing => {
                            const variableQty = safeVal(ing.qty) * factor; const fixedQty = safeVal(ing.fixedQty); const totalVal = variableQty + fixedQty;
                            if(!isPackaging(ing.name)) secGross += toKg(totalVal, ing.unit);
                            return { ...ing, calcNet: totalVal };
                        });
                        grossTotal += secGross;
                        sectionsOut.push({ name: secName, lossPct, ingredients: scaledIngs, finalWeightKg: secGross * (1 - lossPct/100) });
                    });
                    order = { factor, sections: sectionsOut, grossTotal, finalProductWeightKg: t.finalYieldKg * factor, targetBatches, referenceLabel };
                }

                return (
                    <div className="max-w-5xl mx-auto space-y-6 animate-fade-in pb-20">
                        <NavHeader title="Ordens de Produção" />
                        <Card className="p-6 md:p-8 mb-6 border border-gray-200 shadow-sm bg-gradient-to-br from-white to-gray-50 no-print">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                                <div className="md:col-span-2"><label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Selecione o Produto a Fabricar</label><SearchableSelect options={catalog.map(c => ({label: c.name, value: c.id}))} value={poSelectedProduct} onChange={setPoSelectedProduct} placeholder="Pesquisar Produto..." /></div>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Escalonamento Matemático</label>
                                    <div className="flex bg-gray-200 p-1.5 rounded-xl overflow-x-auto shadow-inner">
                                        <button onClick={()=>setPoMode('batch')} className={`flex-1 py-2 px-2 text-xs font-black rounded-lg whitespace-nowrap transition-all ${poMode==='batch'?'bg-white shadow-sm text-gray-900':'text-gray-500 hover:text-gray-700'}`}>Lotes</button>
                                        <button onClick={()=>setPoMode('target')} className={`flex-1 py-2 px-2 text-xs font-black rounded-lg whitespace-nowrap transition-all ${poMode==='target'?'bg-white shadow-sm text-gray-900':'text-gray-500 hover:text-gray-700'}`}>Kg Final</button>
                                        <button onClick={()=>setPoMode('proportional')} className={`flex-1 py-2 px-2 text-xs font-black rounded-lg whitespace-nowrap transition-all ${poMode==='proportional'?'bg-white shadow-sm text-gray-900':'text-gray-500 hover:text-gray-700'}`}>Por Item</button>
                                    </div>
                                </div>
                            </div>
                            {p && (
                                <div className="mt-8 flex flex-col md:flex-row gap-6 items-end border-t border-gray-200 pt-8 animate-fade-in">
                                    {poMode === 'proportional' && (<div className="flex-1 w-full"><label className="block text-[10px] font-bold text-imac-blue uppercase tracking-widest mb-2">Basear a matemática em:</label><SearchableSelect options={basisOptions} value={poBasisItem} onChange={setPoBasisItem} placeholder="Ex: Massa, Farinha..." /></div>)}
                                    <div className="flex-1 w-full">
                                        <label className="block text-[10px] font-bold text-imac-blue uppercase tracking-widest mb-2">{poMode === 'batch' ? 'Quantos Lotes / Receitas Base?' : poMode === 'target' ? 'Qual a Meta de Quilos (Kg) Final?' : 'Qual a Quantidade Disponível (Kg)?'}</label>
                                        <input type="number" step="any" value={poInputValue} onChange={e=>setPoInputValue(e.target.value)} className="w-full p-4 border border-blue-200 rounded-xl text-3xl font-black text-gray-800 outline-none focus:border-imac-blue bg-white shadow-inner transition-all" />
                                    </div>
                                    <Button onClick={()=>window.print()} className="h-16 px-8 bg-imac-text text-white w-full md:w-auto shadow-lg hover:shadow-xl"><i className="ph ph-printer text-xl"></i> Imprimir Ficha de Produção</Button>
                                </div>
                            )}
                        </Card>

                        {order && (
                            <Card className="border border-gray-200 shadow-xl overflow-hidden print-shadow-none">
                                <div className="bg-imac-text text-white p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                    <div><span className="text-gray-400 text-[10px] font-bold uppercase tracking-widest block mb-2 flex items-center gap-2"><i className="ph ph-clipboard-text text-sm"></i> Ordem de Produção Emitida</span><h2 className="text-3xl font-black">{p.name}</h2><p className="text-sm font-bold text-gray-300 mt-2 bg-gray-800 inline-block px-3 py-1 rounded-lg">Cálculo Base: {order.referenceLabel}</p></div>
                                    <div className="md:text-right w-full md:w-auto bg-gray-800 md:bg-transparent p-4 md:p-0 rounded-xl"><span className="text-gray-400 text-[10px] font-bold uppercase tracking-widest block mb-2">Rendimento Alvo Estimado</span><span className="text-4xl font-black text-emerald-400">{order.finalProductWeightKg.toFixed(3)} <span className="text-xl text-emerald-600">kg</span></span>{p.outputType === 'unit' && p.outputUnitWeight > 0 && (<span className="block text-sm font-bold text-gray-400 mt-2">Equivalente a ~ {Math.floor(order.finalProductWeightKg / toKg(p.outputUnitWeight, p.outputUnitMeasure))} unidades</span>)}</div>
                                </div>
                                <div className="p-8">
                                    <div className="flex flex-col md:flex-row gap-6 mb-10 bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner">
                                        <div className="flex-1 md:border-r border-gray-200 md:pr-6"><span className="block text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1">Múltiplo de Lotes Escalonado</span><span className="text-2xl font-black text-gray-800">{order.targetBatches.toFixed(3)}x <span className="text-sm font-bold text-gray-400">Padrão</span></span></div>
                                        <div className="flex-1 md:pl-6 pt-6 md:pt-0 border-t md:border-t-0 border-gray-200"><span className="block text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1">Massa Bruta Total (Entrada)</span><span className="text-2xl font-black text-gray-800">{order.grossTotal.toFixed(3)} <span className="text-sm font-bold text-gray-400">kg</span></span></div>
                                    </div>
                                </div>
                            </Card>
                        )}
                    </div>
                );
            };

            const renderMonitoring = () => {
                // Placeholder para Monitoramento (mantendo a view simplificada para não deixar vazio)
                return (
                    <div className="max-w-6xl mx-auto space-y-6 animate-fade-in pb-20">
                        <NavHeader title="Monitoramento de Qualidade & Rendimento" />
                        <Card className="p-10 text-center border-gray-200">
                            <i className="ph ph-activity text-5xl text-gray-300 mb-4"></i>
                            <h3 className="text-lg font-black text-gray-700">Módulo em Desenvolvimento</h3>
                            <p className="text-sm text-gray-500 mt-2 font-medium">Os registros de qualidade e controle estatístico do processo estarão disponíveis em breve nesta área integrada.</p>
                        </Card>
                    </div>
                );
            }

            const renderSettingsView = () => {
                const handleExport = () => { const data = JSON.stringify({ catalog, ingredients, settings, logs }); const blob = new Blob([data], {type: "application/json"}); const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.download = `backup_gestao_${new Date().toISOString().slice(0,10)}.json`; link.href = url; link.click(); };
                const handleImport = (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = async (evt) => { try { const d = JSON.parse(evt.target.result); if(d.catalog || d.ingredients || d.settings || d.logs) { if (user) { const batch = writeBatch(db); if (d.catalog) d.catalog.forEach(p => batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'catalog', p.id), p)); if (d.ingredients) d.ingredients.forEach(i => batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', i.id), i)); if (d.logs) d.logs.forEach(l => batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'logs', l.id), l)); if (d.settings) batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'settings'), d.settings); await batch.commit(); } notify("Sistema restaurado com sucesso do Firebase!"); } } catch(err){ notify("Erro no ficheiro de backup."); } }; reader.readAsText(file); };
                
                const addLine = () => { if(setNewLine) { updateSettings({...settings, lines: [...(settings?.lines || []), setNewLine]}); setSetNewLine(''); } };
                const addStage = () => { if(setNewStage) { updateSettings({...settings, stages: [...(settings?.stages || []), setNewStage]}); setSetNewStage(''); } };
                const addMachine = () => { if(setNewMachine.name) { updateSettings({...settings, machines: [...(settings?.machines || []), { ...setNewMachine, id: generateId() }]}); setSetNewMachine({name:'', powerWatts:''}); } };
                const addEmployee = () => { if(setNewEmployee.name) { updateSettings({...settings, employees: [...(settings?.employees || []), { ...setNewEmployee, id: generateId() }]}); setSetNewEmployee({name:'', salary:'', hoursMonth:220}); } };
                const addDefaultIndirect = () => { if(setNewIndirect.name && setNewIndirect.cost) { updateSettings({...settings, defaultIndirectCosts: [...(settings?.defaultIndirectCosts || []), { ...setNewIndirect, id: generateId(), cost: Number(setNewIndirect.cost) }]}); setSetNewIndirect({name:'', cost:'', type:'%'}); } };

                const removeLine = (l) => updateSettings({...settings, lines: (settings?.lines || []).filter(x => x !== l)});
                const removeStage = (s) => updateSettings({...settings, stages: (settings?.stages || []).filter(x => x !== s)});
                const removeMachine = (id) => updateSettings({...settings, machines: (settings?.machines || []).filter(x => x.id !== id)});
                const removeEmployee = (id) => updateSettings({...settings, employees: (settings?.employees || []).filter(x => x.id !== id)});
                const removeDefaultIndirect = (id) => updateSettings({...settings, defaultIndirectCosts: (settings?.defaultIndirectCosts || []).filter(x => x.id !== id)});

                return (
                    <div className="max-w-4xl mx-auto space-y-6 animate-fade-in pb-20">
                        <NavHeader title="Configurações do Sistema" />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <Card className="p-6 md:col-span-2 flex flex-col md:flex-row items-center justify-between bg-imac-text border-none shadow-md gap-4 text-white">
                                <div><h3 className="font-black text-lg flex items-center gap-2 mb-1"><i className="ph ph-archive text-gray-400"></i> Backup Integrado</h3><p className="text-sm text-gray-400 font-bold">Faça o download ou restaure toda a base de dados num único ficheiro JSON seguro.</p></div>
                                <div className="flex gap-3 w-full md:w-auto">
                                    <div className="relative flex-1 md:flex-none">
                                        <input type="file" accept=".json" onChange={handleImport} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"/>
                                        <Button variant="secondary" className="w-full bg-white/10 text-white border-white/20 hover:bg-white/20 relative z-0"><i className="ph ph-upload-simple"></i> Restaurar</Button>
                                    </div>
                                    <Button onClick={handleExport} className="bg-imac-yellow text-white flex-1 md:flex-none hover:opacity-90 border-none"><i className="ph ph-file-arrow-down text-lg"></i> Exportar DB</Button>
                                </div>
                            </Card>

                            <Card className="p-6 border-gray-200 shadow-sm">
                                <h3 className="font-black text-gray-800 text-lg mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]"><i className="ph ph-image text-gray-400 text-base"></i> Logótipo da Empresa</h3>
                                <div className="flex gap-5 items-center">
                                    <div className="w-24 h-24 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 flex items-center justify-center overflow-hidden relative group transition-colors hover:border-imac-yellow hover:bg-yellow-50 cursor-pointer z-0">
                                        <input type="file" accept="image/*" onChange={async (e) => { 
                                            const f = e.target.files[0]; 
                                            if(f){ 
                                                try {
                                                    const base64 = await compressImage(f, 400);
                                                    updateSettings({...settings, logo: base64});
                                                } catch(err) {
                                                    notify("Erro ao processar o logótipo.");
                                                }
                                            } 
                                        }} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"/>
                                        {settings?.logo ? (
                                            <>
                                                <img src={settings.logo} className="w-full h-full object-contain p-2 relative z-0"/>
                                                <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity z-10">
                                                    <button onClick={(e)=>{e.preventDefault(); e.stopPropagation(); updateSettings({...settings, logo: null});}} className="text-white bg-red-500 p-2 rounded-full relative z-20 hover:bg-red-600 transition-colors shadow-lg"><i className="ph ph-trash text-lg"></i></button>
                                                </div>
                                            </>
                                        ) : (
                                            <i className="ph ph-image text-3xl text-gray-300 relative z-0"></i>
                                        )}
                                    </div>
                                    <p className="text-xs text-gray-500 font-bold">Aparece no cabeçalho e nas impressões PDF.</p>
                                </div>
                            </Card>
                            <Card className="p-6 border-gray-200 shadow-sm">
                                <h3 className="font-black text-gray-800 text-lg mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]"><i className="ph ph-lightning text-yellow-500 text-base"></i> Tarifa de Energia</h3>
                                <div><label className="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Preço KWh Referência (R$)</label><input type="number" step="0.01" value={settings?.kwhPrice || 0} onChange={e=>updateSettings({...settings, kwhPrice: Number(e.target.value)})} className="w-full p-3 border border-gray-200 rounded-xl font-black text-gray-800 outline-none focus:border-yellow-500 bg-gray-50 transition-colors" /></div>
                            </Card>

                            <Card className="p-6 md:col-span-2 border-gray-200 shadow-sm">
                                <h3 className="font-black text-gray-800 text-lg mb-2 flex items-center gap-2 uppercase tracking-widest text-[11px]"><i className="ph ph-coins text-imac-yellow text-base"></i> Taxas e Indiretos (Padrão Global)</h3>
                                <p className="text-xs text-gray-500 font-bold mb-6">Estas parcelas serão adicionadas automaticamente à aba de Custos de <strong>todas as novas Fichas Técnicas</strong>.</p>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-gray-50 p-5 rounded-2xl border border-gray-200 border-dashed">
                                    <input className="md:col-span-2 border border-gray-200 bg-white rounded-xl px-4 py-3 text-sm font-black text-gray-800 outline-none focus:border-imac-yellow transition-colors" placeholder="Ex: Taxa TPA, Embalagem Genérica" value={setNewIndirect.name} onChange={e=>setSetNewIndirect({...setNewIndirect, name: e.target.value})} />
                                    <div className="flex items-center bg-white rounded-xl border border-gray-200 overflow-hidden focus-within:border-imac-yellow transition-colors">
                                        <select value={setNewIndirect.type} onChange={e=>setSetNewIndirect({...setNewIndirect, type: e.target.value})} className="p-3 bg-gray-100 text-sm font-black text-gray-600 outline-none border-r border-gray-200 cursor-pointer">
