                                            <option value="%">%</option>
                                            <option value="R$">R$</option>
                                        </select>
                                        <input type="number" step="0.01" className="w-full border-none px-3 py-3 text-sm font-black text-gray-800 outline-none focus:ring-0 text-right" placeholder="0.00" value={setNewIndirect.cost} onChange={e=>setSetNewIndirect({...setNewIndirect, cost: e.target.value})} />
                                    </div>
                                    <Button onClick={addDefaultIndirect} className="bg-imac-text text-white rounded-xl">Registar Padrão</Button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {(settings?.defaultIndirectCosts || []).map(ind => (
                                        <div key={ind.id} className="flex justify-between items-center p-4 border border-gray-200 rounded-xl bg-white shadow-sm hover:border-imac-yellow transition-colors group">
                                            <div>
                                                <div className="font-black text-sm text-gray-800 mb-0.5">{ind.name}</div>
                                                <div className="text-xs font-black text-imac-yellow">{ind.type === '%' ? `${ind.cost}% do Subtotal` : `R$ ${ind.cost} fixos`}</div>
                                            </div>
                                            <button onClick={()=>removeDefaultIndirect(ind.id)} className="text-gray-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100"><i className="ph ph-trash text-xl"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </Card>

                            <Card className="p-6 border-gray-200 shadow-sm">
                                <h3 className="font-black text-gray-800 mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]">Categorias de Produto</h3>
                                <div className="flex gap-2 mb-6"><input value={setNewLine} onChange={e=>setSetNewLine(e.target.value)} placeholder="Ex: Padaria Fria" className="flex-1 p-3 border border-gray-200 bg-gray-50 rounded-xl text-sm font-black text-gray-800 outline-none focus:border-imac-yellow transition-colors" /><Button onClick={addLine} className="bg-imac-text text-white px-4 rounded-xl"><i className="ph ph-plus text-lg"></i></Button></div>
                                <ul className="space-y-2">{(settings?.lines || []).map(l => <li key={l} className="flex justify-between items-center bg-white p-3 rounded-xl text-sm font-bold border border-gray-200 shadow-sm group text-gray-700">{l}<button onClick={()=>removeLine(l)} className="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph ph-trash text-lg"></i></button></li>)}</ul>
                            </Card>
                            <Card className="p-6 border-gray-200 shadow-sm">
                                <h3 className="font-black text-gray-800 mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]">Etapas de Processo</h3>
                                <div className="flex gap-2 mb-6"><input value={setNewStage} onChange={e=>setSetNewStage(e.target.value)} placeholder="Ex: Forneamento" className="flex-1 p-3 border border-gray-200 bg-gray-50 rounded-xl text-sm font-black text-gray-800 outline-none focus:border-imac-yellow transition-colors" /><Button onClick={addStage} className="bg-imac-text text-white px-4 rounded-xl"><i className="ph ph-plus text-lg"></i></Button></div>
                                <ul className="space-y-2">{(settings?.stages || []).map(s => <li key={s} className="flex justify-between items-center bg-white p-3 rounded-xl text-sm font-bold border border-gray-200 shadow-sm group text-gray-700">{s}<button onClick={()=>removeStage(s)} className="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph ph-trash text-lg"></i></button></li>)}</ul>
                            </Card>

                            <Card className="p-6 md:col-span-2 border-gray-200 shadow-sm">
                                <h3 className="font-black text-gray-800 text-lg mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]"><i className="ph ph-users text-gray-400 text-base"></i> Profissionais & Cargos</h3>
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6 bg-gray-50 p-5 rounded-2xl border border-gray-200 border-dashed">
                                    <input className="md:col-span-2 border border-gray-200 bg-white rounded-xl px-4 py-3 text-sm font-black text-gray-800 outline-none focus:border-imac-yellow transition-colors" placeholder="Cargo (Ex: Padeiro)" value={setNewEmployee.name} onChange={e=>setSetNewEmployee({...setNewEmployee, name: e.target.value})} />
                                    <input type="number" className="border border-gray-200 bg-white rounded-xl px-4 py-3 text-sm font-black text-gray-800 outline-none focus:border-imac-yellow transition-colors" placeholder="Salário (R$)" value={setNewEmployee.salary} onChange={e=>setSetNewEmployee({...setNewEmployee, salary: Number(e.target.value)})} />
                                    <div className="md:col-span-2 flex gap-3"><input type="number" className="w-full border border-gray-200 bg-white rounded-xl px-4 py-3 text-sm font-black text-gray-800 text-center outline-none focus:border-imac-yellow transition-colors" placeholder="Carga (Hrs/mês)" value={setNewEmployee.hoursMonth} onChange={e=>setSetNewEmployee({...setNewEmployee, hoursMonth: Number(e.target.value)})} /><Button onClick={addEmployee} className="bg-imac-text text-white rounded-xl w-full">Registar</Button></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {(settings?.employees || []).map(e => <div key={e.id} className="flex justify-between items-center p-4 border border-gray-200 rounded-xl bg-white shadow-sm group"><div><div className="font-black text-sm text-gray-800 mb-0.5">{e.name}</div><div className="text-xs font-bold text-gray-500 tracking-wider">R$ {e.salary} <span className="font-medium text-gray-300">|</span> {e.hoursMonth}h/mês</div></div><button onClick={()=>removeEmployee(e.id)} className="text-gray-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100"><i className="ph ph-trash text-xl"></i></button></div>)}
                                </div>
                            </Card>

                            <Card className="p-6 md:col-span-2 border-gray-200 shadow-sm">
                                <h3 className="font-black text-gray-800 text-lg mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]"><i className="ph ph-gear text-gray-400 text-base"></i> Equipamentos de Produção</h3>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-gray-50 p-5 rounded-2xl border border-gray-200 border-dashed">
                                    <input className="md:col-span-2 border border-gray-200 bg-white rounded-xl px-4 py-3 text-sm font-black text-gray-800 outline-none focus:border-imac-yellow transition-colors" placeholder="Equipamento (Ex: Forno Elétrico)" value={setNewMachine.name} onChange={e=>setSetNewMachine({...setNewMachine, name: e.target.value})} />
                                    <input type="number" className="border border-gray-200 bg-white rounded-xl px-4 py-3 text-sm font-black text-imac-yellow text-right outline-none focus:border-imac-yellow transition-colors" placeholder="Consumo Watts" value={setNewMachine.powerWatts} onChange={e=>setSetNewMachine({...setNewMachine, powerWatts: Number(e.target.value)})} />
                                    <Button onClick={addMachine} className="bg-imac-text text-white rounded-xl w-full">Registar Eq.</Button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {(settings?.machines || []).map(m => <div key={m.id} className="flex justify-between items-center p-4 border border-gray-200 rounded-xl bg-white shadow-sm group"><div><div className="font-black text-sm text-gray-800 mb-0.5">{m.name}</div><div className="text-xs font-black text-imac-yellow tracking-wider">{m.powerWatts} <span className="font-bold text-gray-500">Watts</span></div></div><button onClick={()=>removeMachine(m.id)} className="text-gray-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100"><i className="ph ph-trash text-xl"></i></button></div>)}
                                </div>
                            </Card>
                        </div>
                    </div>
                );
            };

            const menuItems = [
                { id: 'dashboard', label: 'Visão Geral', icon: 'ph-squares-four' },
                { id: 'catalog_list', label: 'Fichas Técnicas', icon: 'ph-book-open' },
                { id: 'inventory', label: 'Estoque / Insumos', icon: 'ph-database' },
                { id: 'prod_orders', label: 'Ordens de Produção', icon: 'ph-clipboard-text' },
                { id: 'prod_monitoring', label: 'Qual. & Rendimento', icon: 'ph-activity' },
                { id: 'settings', label: 'Configurações', icon: 'ph-gear' }
            ];

            if (loadingAuth) {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center bg-imac-bg text-gray-600">
                        <i className="ph ph-spinner animate-spin text-5xl mb-4 text-imac-yellow"></i>
                        <p className="font-black text-lg">Conectando ao Firebase...</p>
                        <p className="text-sm text-gray-400 font-bold">A verificar a sua sessão</p>
                    </div>
                );
            }

            if (!user) {
                return renderLogin();
            }

            let content;
            if (view === 'dashboard') content = renderDashboard();
            else if (view === 'catalog_list') content = renderCatalogList();
            else if (view === 'catalog_editor') content = renderCatalogEditor();
            else if (view === 'inventory') content = renderInventory();
            else if (view === 'inv_print') content = renderInvPrint();
            else if (view === 'prod_orders') content = renderProdOrders();
            else if (view === 'prod_monitoring') content = renderMonitoring();
            else if (view === 'settings') content = renderSettingsView();

            return (
                <div className="flex flex-col h-screen overflow-hidden font-sans text-gray-800 bg-imac-bg selection:bg-imac-yellow selection:text-white">
                    
                    {/* Barra Superior IMAC (Padrão) */}
                    <header className="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-6 md:px-10 flex-shrink-0 z-20 shadow-sm no-print">
                        <div className="flex items-center gap-4">
                            <img src="CARINHA AMARELO E IMAC AZUL.png" alt="IMAC Logo" className="h-8 md:h-10 w-auto" onError={(e)=>e.target.src='https://placehold.co/120x40/ffffff/104ea2?text=IMAC+Logo'} />
                            <h1 className="text-xl md:text-2xl font-black text-imac-text tracking-tight hidden sm:block">Fichas Técnicas / Custos</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-sm font-bold text-gray-500 hidden md:inline-block">{user.displayName || 'Utilizador logado'}</span>
                            <button onClick={() => signOut(auth)} className="flex items-center gap-2 p-2 px-3 text-sm font-bold text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Sair do Sistema">
                                <span className="hidden sm:inline">Sair</span>
                                <i className="ph ph-sign-out text-xl"></i>
                            </button>
                        </div>
                    </header>

                    {/* Navegação Horizontal em Abas */}
                    <nav className="bg-white border-b border-gray-200 px-6 md:px-10 flex gap-6 overflow-x-auto no-print shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] flex-shrink-0 custom-scroll z-10">
                        {menuItems.map(item => {
                            const isActive = view === item.id || (view === 'catalog_editor' && item.id === 'catalog_list') || (view === 'inv_print' && item.id === 'inventory');
                            return (
                                <button 
                                    key={item.id} 
                                    onClick={() => setView(item.id)}
                                    className={`py-4 font-black text-sm border-b-2 whitespace-nowrap flex items-center gap-2 transition-colors outline-none
                                        ${isActive ? 'border-imac-yellow text-imac-yellow' : 'border-transparent text-gray-400 hover:text-imac-text hover:border-gray-200'}`}
                                >
                                    <i className={`ph ${item.icon} text-xl`}></i> {item.label}
                                </button>
                            )
                        })}
                    </nav>

                    {/* Conteúdo Principal */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-10 custom-scroll relative z-0">
                        {content}
                    </main>

                    {/* Modal de Importação de Fichas Técnicas */}
                    <ImportDataModal
                        isOpen={importDataModalOpen}
                        onClose={() => setImportDataModalOpen(false)}
                        onProcess={handleProcessImportedData}
                    />

                    {notification && (
                        <div className="fixed bottom-6 right-6 bg-imac-text text-white px-6 py-4 rounded-2xl shadow-2xl z-50 animate-slide-in flex items-center gap-4 no-print font-bold">
                            <i className="ph ph-check-circle text-2xl text-emerald-400"></i>
                            {notification}
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
