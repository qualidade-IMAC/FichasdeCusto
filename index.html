<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fichas Técnicas/Custos</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>

    <!-- Configurações do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#f97316',
                            amber: '#FDB913',
                            light: '#fdfbf7'

                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },

                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-in': 'slideIn 0.3s ease-out'

    <!-- Import Map para React, Lucide Icons e Firebase -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
    }
    </script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SheetJS Fallback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f5f5f4; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
        
        @media print {
            @page { margin: 0.5cm; size: A4; }
            body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { break-after: page; page-break-after: always; }
            .avoid-break { break-inside: avoid; page-break-inside: avoid; }
            .print-shadow-none { box-shadow: none !important; border-color: #e5e7eb !important; }
            #sidebar-root { display: none !important; }
            #main-content { margin-left: 0 !important; width: 100% !important; overflow: visible !important; height: auto !important; background-color: white !important; padding: 0 !important; }
        }
        
        /* Tabs transition */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
    </style>
</head>
<body class="text-stone-900 h-screen overflow-hidden">

    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Plus, Trash2, Save, Calculator, ChevronLeft, ChevronRight, Printer, 
            Package, Clock, Zap, Settings, Edit2, X, AlertTriangle, 
            Users, TrendingUp, DollarSign, Archive, Image as ImageIcon, 
            Coins, Search, Link as LinkIcon, Unlink, Database, 
            Activity, ClipboardList, ChefHat, Info, ArrowRight, 
            CheckCircle, LayoutDashboard, Book, ListChecks, Shapes, FileOutput, Menu, LogOut, Loader2, FileSpreadsheet, Upload
        } from 'lucide-react';
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "firebase/auth";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc, writeBatch } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyBvCS2rxIxzEXoEvKPFKeBjv1g6d06wSwI",
            authDomain: "fichasdecusto.firebaseapp.com",
            projectId: "fichasdecusto",
            storageBucket: "fichasdecusto.firebasestorage.app",
            messagingSenderId: "953506009753",
            appId: "1:953506009753:web:79b3ce62c0364a6d341e08",
            measurementId: "G-X7N1VDYGL5"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fichasdecusto_app';

        // --- Helpers Globais ---
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        const safeVal = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'string') val = val.replace(',', '.');
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        };
        const formatMoney = (val) => safeVal(val).toFixed(2);
        const formatDate = (isoString) => {
            if (!isoString) return 'Data desconhecida';
            if (isoString.includes('T')) return new Date(isoString).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
            const parts = isoString.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0].slice(2)}`;
            return isoString;
        };
        const toKg = (qty, unit) => {
            const val = parseFloat(qty) || 0;
            const u = (unit || '').toLowerCase().trim();
            if (u === 'g' || u === 'grama' || u === 'gramas') return val / 1000;
            if (u === 'mg') return val / 1000000;
            if (u === 'ml') return val / 1000;
            return val;
        };
        const isPackaging = (name) => {
            const n = (name || '').toLowerCase();
            return n.includes('embalagem') || n.includes('etiqueta') || n.includes('bobina') || n.includes('saco') || n.includes('fita') || n.includes('caixa') || n.includes('papel');
        };

        // --- Compressor de Imagens Otimizado ---
        const compressImage = (file, maxWidth = 800) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); // Comprime para JPEG 70%
                    };
                };
                reader.onerror = error => reject(error);
            });
        };

        // --- Componentes UI Base Independentes ---
        const Card = ({ children, className = "", onClick }) => (
            <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-stone-200 ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = "primary", className = "", disabled = false, ...props }) => {
            const baseStyle = "px-4 py-2.5 rounded-xl font-medium transition-all active:scale-95 flex items-center gap-2 justify-center text-sm relative overflow-hidden";
            const variants = {
                primary: "bg-stone-900 text-white hover:bg-stone-800 disabled:opacity-50 shadow-sm",
                secondary: "bg-white text-stone-700 hover:bg-stone-50 border border-stone-200 disabled:bg-stone-50 disabled:text-stone-400 shadow-sm",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-100",
                success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm",
                outline: "border border-stone-300 text-stone-700 hover:bg-stone-50",
                brand: "bg-brand-orange text-white hover:opacity-90 shadow-sm"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className} ${disabled ? 'cursor-not-allowed opacity-70' : ''}`} {...props}>
                    {children}
                </button>
            );
        };

        const SearchableSelect = ({ options, value, onChange, placeholder, labelKey = 'label', valueKey = 'value', disabled = false }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => {
                if (!value) setSearchTerm('');
                else {
                    const selected = options.find(opt => (typeof opt === 'object' ? opt[valueKey] : opt) === value);
                    if (selected) setSearchTerm(typeof selected === 'object' ? selected[labelKey] : selected);
                    else setSearchTerm(value);
                }
            }, [value, options, labelKey, valueKey]);

            const filteredOptions = useMemo(() => {
                if (!searchTerm) return options;
                return options.filter(opt => {
                    const label = typeof opt === 'object' ? opt[labelKey] : opt;
                    return String(label).toLowerCase().includes(searchTerm.toLowerCase());
                });
            }, [options, searchTerm, labelKey]);

            return (
                <div className="relative w-full" ref={wrapperRef}>
                    <div className="relative">
                        <input type="text" className={`w-full p-2.5 border ${isOpen ? 'border-brand-orange ring-1 ring-orange-500' : 'border-stone-300'} rounded-lg outline-none text-sm bg-white disabled:bg-stone-100 disabled:text-stone-400`} placeholder={placeholder} value={searchTerm} onChange={(e) => { setSearchTerm(e.target.value); setIsOpen(true); if(e.target.value === '') onChange(''); }} onClick={() => !disabled && setIsOpen(true)} disabled={disabled} />
                        <div className="absolute right-2 top-3 text-stone-400 pointer-events-none"><ChevronLeft className="transform -rotate-90" size={16} /></div>
                    </div>
                    {isOpen && !disabled && (
                        <ul className="absolute z-50 w-full mt-1 bg-white border border-stone-200 rounded-lg shadow-lg max-h-60 overflow-auto custom-scroll" style={{ zIndex: 9999 }}>
                            {filteredOptions.length > 0 ? filteredOptions.map((opt, idx) => {
                                const val = typeof opt === 'object' ? opt[valueKey] : opt;
                                const label = typeof opt === 'object' ? opt[labelKey] : opt;
                                return <li key={idx} onClick={() => { onChange(val); setSearchTerm(String(label)); setIsOpen(false); }} className={`p-3 text-sm cursor-pointer hover:bg-stone-50 break-words ${val === value ? 'bg-orange-50 text-brand-orange font-medium' : 'text-stone-700'}`}>{String(label)}</li>;
                            }) : <li className="p-3 text-sm text-stone-400 italic">Nenhuma opção encontrada</li>}
                        </ul>
                    )}
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, onClose, onConfirm, title, message }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4 border border-stone-100">
                        <div className="flex items-center gap-3 text-red-600 mb-4 bg-red-50 p-3 rounded-lg w-fit"><AlertTriangle size={24} /></div>
                        <h3 className="text-lg font-bold text-stone-900 mb-2">{title}</h3><p className="text-stone-600 mb-6 text-sm">{message}</p>
                        <div className="flex justify-end gap-3"><Button variant="secondary" onClick={onClose}>Cancelar</Button><Button variant="danger" onClick={onConfirm}>Confirmar</Button></div>
                    </div>
                </div>
            );
        };

        // --- Modais de Importação ---
        const ImportDataModal = ({ isOpen, onClose, onProcess }) => {
            const [fileType, setFileType] = useState(null); 
            const [fileContent, setFileContent] = useState('');
            const [mimeType, setMimeType] = useState('');
            const [workbookData, setWorkbookData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [stats, setStats] = useState('');

            useEffect(() => {
                if (!isOpen) { setFileType(null); setFileContent(''); setWorkbookData(null); setError(''); setLoading(false); setStats(''); }
            }, [isOpen]);

            const processLocalExcel = (workbook) => {
                const newProducts = [];
                workbook.SheetNames.forEach(sheetName => {
                    const sheet = workbook.Sheets[sheetName];
                    const rows = window.XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    
                    let recipeName = sheetName;
                    let yieldKg = 1;
                    let ingredients = [];
                    
                    let currentSection = 'Geral';
                    let inIngredients = false;
                    let ingIdx = -1, qtyIdx = -1, priceIdx = -1, sectionIdx = 0, unitIdx = -1;

                    for (let i = 0; i < rows.length; i++) {
                        const row = rows[i] || [];
                        if (row.length === 0) continue;
                        
                        const joinedRow = row.join(' ').replace(/\s+/g, ' ').trim();
                        if (!joinedRow) continue;
                        
                        if (!inIngredients) {
                            if (joinedRow.includes('Ficha de Custo -')) {
                                const match = joinedRow.match(/Ficha de Custo -\s*([^,]+)/);
                                if (match) recipeName = match[1].trim();
                            }
                            
                            if (joinedRow.toLowerCase().includes('rendimento')) {
                                const rendIdx = row.findIndex(c => typeof c === 'string' && c.toLowerCase().includes('rendimento'));
                                if (rendIdx !== -1) {
                                    const valStr = String(row[rendIdx + 1] || row[rendIdx + 2] || '').trim();
                                    let val = parseFloat(valStr.replace(',', '.'));
                                    if (!isNaN(val) && val > 0) {
                                        if (valStr.toLowerCase().includes('g') && !valStr.toLowerCase().includes('kg')) {
                                            val = val / 1000;
                                        } else if (row[rendIdx + 2] && String(row[rendIdx + 2]).toLowerCase().trim() === 'g') {
                                            val = val / 1000;
                                        }
                                        yieldKg = val;
                                    }
                                }
                            }

                            const headerRow = row.map(c => String(c || '').toLowerCase().trim());
                            const tempIngIdx = headerRow.findIndex(c => c === 'ingrediente' || c === 'ingredientes' || c.includes('descrição') || c === 'item' || c === 'produto');
                            const tempQtyIdx = headerRow.findIndex(c => c === 'quantidade' || c === 'qtd' || c === 'peso' || c === 'quant.');
                            
                            if (tempIngIdx !== -1 && tempQtyIdx !== -1) {
                                inIngredients = true;
                                ingIdx = tempIngIdx;
                                qtyIdx = tempQtyIdx;
                                priceIdx = headerRow.findIndex(c => c.includes('preço') || c.includes('preco') || c.includes('custo unit') || c.includes('valor') || c === 'custo (kg)');
                                unitIdx = headerRow.findIndex(c => c === 'unidade' || c === 'und' || c === 'unid' || c === 'un');
                                sectionIdx = ingIdx > 0 ? ingIdx - 1 : 0;
                            }
                        } else {
                            const ingName = String(row[ingIdx] || '').trim();
                            const rawQty = row[qtyIdx];
                            
                            if (!ingName && !rawQty) continue;
                            
                            const lowerIngName = ingName.toLowerCase();
                            if (lowerIngName.includes('custo total') || lowerIngName.includes('rendimento') || lowerIngName.includes('lucro') || lowerIngName.includes('observação') || lowerIngName === 'total') {
                                inIngredients = false; 
                                continue;
                            }

                            const secVal = String(row[sectionIdx] || '').trim();
                            if (secVal && secVal !== ingName && !secVal.toLowerCase().includes('total')) {
                                currentSection = secVal;
                            }

                            let qty = parseFloat(String(rawQty || '').replace(',', '.'));
                            if (isNaN(qty)) qty = 0;

                            let price = 0;
                            if (priceIdx !== -1) {
                                let priceStr = String(row[priceIdx] || '').replace(/R\$|\s/g, '').replace(',', '.');
                                price = parseFloat(priceStr);
                                if (isNaN(price)) price = 0;
                            }

                            let unit = 'kg';
                            if (unitIdx !== -1 && row[unitIdx]) {
                                unit = String(row[unitIdx]).trim().toLowerCase();
                            } else if (row[qtyIdx + 1]) {
                                unit = String(row[qtyIdx + 1]).trim().toLowerCase(); 
                            }
                            if (!unit || unit.length > 5) unit = 'un';

                            if (ingName && qty > 0) {
                                ingredients.push({
                                    section: currentSection || 'Geral',
                                    name: ingName,
                                    quantity: qty,
                                    unit: unit,
                                    unitPrice: price
                                });
                            }
                        }
                    }
                    
                    if (ingredients.length > 0) {
                        newProducts.push({ recipeName, yieldKg, ingredients });
                    }
                });
                return { products: newProducts };
            };

            const handleFile = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                setLoading(true); setError(''); setStats('');
                
                try {
                    let isExcelOrCsv = false;
                    const combinedWorkbook = window.XLSX.utils.book_new();
                    let sheetsAdded = 0;

                    for (const f of files) {
                        if (f.name.endsWith('.xlsx') || f.name.endsWith('.xls') || f.name.endsWith('.csv')) {
                            isExcelOrCsv = true;
                            const data = await f.arrayBuffer();
                            const wb = window.XLSX.read(data, { type: 'array' });
                            
                            wb.SheetNames.forEach(name => {
                                let safeName = name;
                                if (f.name.endsWith('.csv')) {
                                    safeName = f.name.replace('.csv', '').substring(0, 31);
                                }
                                while (combinedWorkbook.SheetNames.includes(safeName)) {
                                    safeName = safeName.substring(0, 28) + (Math.floor(Math.random() * 100));
                                }
                                window.XLSX.utils.book_append_sheet(combinedWorkbook, wb.Sheets[name], safeName);
                                sheetsAdded++;
                            });
                        }
                    }
                    
                    if (isExcelOrCsv && sheetsAdded > 0) {
                        setWorkbookData(combinedWorkbook);
                        setFileType('excel');
                        setStats(`Ficheiros reconhecidos! Encontrada(s) ${sheetsAdded} receita(s) para importação combinada.`);
                    } else {
                        setError("Formato de ficheiro não suportado. Por favor, utilize ficheiros Excel (.xlsx, .xls) ou CSV.");
                    }
                } catch (err) {
                    setError("Erro ao ler ficheiros. Tente novamente.");
                } finally {
                    setLoading(false);
                }
            };

            const processData = async () => {
                if (!fileType) return setError("Faça o upload de um ficheiro primeiro.");
                setLoading(true); setError('');

                try {
                    const result = processLocalExcel(workbookData);
                    if (!result.products || result.products.length === 0) {
                        throw new Error("O sistema não conseguiu identificar o formato dos ingredientes na planilha. Verifique se as colunas 'Ingrediente' e 'Quantidade' existem.");
                    }
                    onProcess(result);
                } catch (err) {
                    setError(err.message || "Erro ao processar o ficheiro. Verifique o formato.");
                } finally {
                    setLoading(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="px-6 py-4 border-b flex justify-between items-center bg-stone-50">
                            <h3 className="font-bold text-lg flex items-center gap-2 text-stone-800"><FileSpreadsheet className="text-brand-orange"/> Importação de Planilhas</h3>
                            <button onClick={onClose} disabled={loading} className="text-stone-400 hover:text-stone-600"><X/></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scroll">
                            <p className="text-sm text-stone-500 mb-4">Selecione <strong>uma ou várias Planilhas (Excel/CSV)</strong>. O sistema vai extrair as receitas em lote, alimentar o seu catálogo e criar os itens no estoque instantaneamente!</p>
                            
                            {!fileType ? (
                                <div className="relative">
                                    <input type="file" accept=".xlsx, .xls, .csv" multiple className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-20" onChange={handleFile} />
                                    <div className="border-2 border-dashed border-stone-300 rounded-xl p-8 flex flex-col items-center justify-center text-stone-400 hover:bg-stone-50 hover:border-brand-orange transition-colors relative z-10 text-center">
                                        <Upload size={32} className="mb-2 text-brand-orange" />
                                        <span className="font-bold text-stone-700">Clique para enviar Ficheiro(s)</span>
                                        <span className="text-xs text-stone-400 mt-1">Suporta: Múltiplos Excels (.xlsx), CSV</span>
                                    </div>
                                </div>
                            ) : (
                                <div className="relative rounded-xl p-6 border border-stone-200 bg-stone-50 flex flex-col items-center text-center">
                                    <FileSpreadsheet size={48} className="text-green-600 mb-3"/>
                                    <p className="font-bold text-stone-800">{stats}</p>
                                    {!loading && <button onClick={() => setFileType(null)} className="mt-4 text-xs font-bold text-red-500 hover:underline">Cancelar e escolher outro ficheiro</button>}
                                </div>
                            )}

                            {error && <div className="mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100">{error}</div>}
                        </div>
                        <div className="p-4 border-t bg-stone-50">
                            <Button onClick={processData} disabled={!fileType || loading} variant="primary" className="w-full h-12 text-lg bg-brand-orange hover:bg-orange-600">
                                {loading ? <><Loader2 className="animate-spin" size={20}/> Extraindo Dados...</> : 'Processar e Importar Produtos'}
                            </Button>
                        </div>
                    </div>
                </div>
            );
        };

        const ControlChart = ({ data, targetYield, tolerance }) => {
            const safeTolerance = tolerance !== undefined ? tolerance : 10;
            if (!data || data.length < 2) return <div className="h-48 flex items-center justify-center text-stone-400 text-sm bg-stone-50 rounded-lg border border-dashed">Dados insuficientes (mínimo 2 registos)</div>;
            const values = data.map(d => d.yieldPct);
            const mean = targetYield || 100;
            const upperLimit = mean * (1 + safeTolerance / 100);
            const lowerLimit = mean * (1 - safeTolerance / 100);
            const height = 220, width = 600, padding = 50;
            const maxVal = Math.max(...values, upperLimit) * 1.05;
            const minVal = Math.min(...values, lowerLimit) * 0.95;
            const range = (maxVal - minVal) || 1;
            const getY = (val) => height - padding - ((val - minVal) / range) * (height - (padding * 2));
            const getX = (idx) => padding + (idx / (Math.max(values.length - 1, 1))) * (width - (padding * 2));
            const points = values.map((val, idx) => `${getX(idx)},${getY(val)}`).join(' ');

            return (
                <div className="w-full overflow-x-auto">
                    <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} className="bg-white rounded-lg shadow-sm border border-stone-200 min-w-[600px]">
                        <rect x={padding} y={padding} width={width - padding * 2} height={height - padding * 2} fill="#fdfbf7" />
                        <line x1={padding} y1={getY(mean)} x2={width - padding} y2={getY(mean)} stroke="#f97316" strokeWidth="2" strokeDasharray="4" />
                        <text x={width - padding + 5} y={getY(mean) + 3} className="text-[10px] fill-emerald-600 font-bold">Padrão: {mean.toFixed(1)}%</text>
                        <line x1={padding} y1={getY(upperLimit)} x2={width - padding} y2={getY(upperLimit)} stroke="#ef4444" strokeWidth="1" strokeDasharray="2" />
                        <text x={width - padding + 5} y={getY(upperLimit) + 3} className="text-[10px] fill-red-500">LCS</text>
                        <line x1={padding} y1={getY(lowerLimit)} x2={width - padding} y2={getY(lowerLimit)} stroke="#ef4444" strokeWidth="1" strokeDasharray="2" />
                        <text x={width - padding + 5} y={getY(lowerLimit) + 3} className="text-[10px] fill-red-500">LCI</text>
                        <polyline points={points} fill="none" stroke="#6b7280" strokeWidth="2" />
                        {values.map((val, idx) => (
                            <g key={idx}>
                                <circle cx={getX(idx)} cy={getY(val)} r="4" fill={val > upperLimit || val < lowerLimit ? "#ef4444" : "#6b7280"} stroke="white" strokeWidth="2"><title>{formatDate(data[idx].date)}: {val.toFixed(2)}%</title></circle>
                                { (data.length <= 10 || idx % Math.ceil(data.length/10) === 0) && <text x={getX(idx)} y={height - 15} textAnchor="middle" className="text-[9px] fill-stone-500 font-medium" fontSize="9">{formatDate(data[idx].date).slice(0,5)}</text> }
                            </g>
                        ))}
                    </svg>
                </div>
            );
        };

        const NavHeader = ({ title, module, onBack }) => (
            <div className="flex items-center justify-between mb-6 pb-4 border-b border-stone-200 no-print">
                <div className="flex items-center gap-4">
                    {onBack && <button onClick={onBack} className="p-2 hover:bg-stone-200 rounded-full transition-colors"><ChevronLeft size={24} className="text-stone-600" /></button>}
                    <div>
                        <h2 className="text-2xl font-bold text-stone-900 leading-none">{title}</h2>
                        {module && <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded mt-1 inline-block ${module === 'prod' ? 'bg-orange-100 text-brand-orange' : 'bg-stone-200 text-stone-600'}`}>{module === 'prod' ? 'Módulo Produção' : 'Módulo Custos'}</span>}
                    </div>
                </div>
            </div>
        );

        // --- Configurações Iniciais e Constantes ---
        const INITIAL_PRODUCT = {
            id: null,
            name: '',
            image: null,
            description: '',
            line: 'Geral', 
            outputType: 'kg', 
            outputUnitWeight: 0, 
            outputUnitMeasure: 'g',
            targetMargin: 50, 
            manualSalePrice: 0,
            sections: { "Massa": { processLossPct: 0, tolerancePct: 5 } },
            ingredients: [], 
            laborItems: [],
            machineryItems: [],
            indirectItems: [],
            lastUpdated: new Date().toISOString()
        };

        // --- Main App Component ---
        const App = () => {
            const [view, setView] = useState('catalog_list');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isSidebarExpanded, setIsSidebarExpanded] = useState(true);
            const [notification, setNotification] = useState(null);

            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);

            // Estados Unificados
            const [catalog, setCatalog] = useState([]);
            const [ingredients, setIngredients] = useState([]);
            const [logs, setLogs] = useState([]);
            const [editingProduct, setEditingProduct] = useState(null);

            const defaultSettingsObj = { 
                logo: null, themeColor: '#482823', kwhPrice: 0.95,
                lines: ["Padaria", "Confeitaria", "Salgados", "Geral"],
                stages: ["Massa", "Recheio", "Cobertura", "Montagem", "Outros"],
                machines: [{ id: 1, name: 'Forno Elétrico Industrial', powerWatts: 5000 }],
                employees: [{ id: 1, name: 'Confeiteiro Principal', salary: 2500, hoursMonth: 220 }],
                defaultIndirectCosts: [
                    { id: 'def_card', name: 'Taxa de Cartão', cost: 2, type: '%' },
                    { id: 'def_embalagem', name: 'Embalagem Padrão', cost: 1.5, type: 'R$' }
                ]
            };
            
            const [settings, setSettings] = useState(defaultSettingsObj);
            const settingsTimeoutRef = useRef(null);

            const updateSettings = (newSettings) => {
                setSettings(newSettings);
                if (!user) return;
                if (settingsTimeoutRef.current) clearTimeout(settingsTimeoutRef.current);
                settingsTimeoutRef.current = setTimeout(() => {
                    setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'settings'), newSettings);
                }, 1000);
            };

            // Firebase Auth
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth); 
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoadingAuth(false);
                });
                return () => unsubscribe();
            }, []);

            const handleGoogleLogin = async () => {
                const provider = new GoogleAuthProvider();
                try {
                    setLoadingAuth(true);
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Login error:", error);
                    notify("Erro ao tentar entrar com o Google.");
                    setLoadingAuth(false);
                }
            };

            // Firebase Data Fetching
            useEffect(() => {
                if (!user) return;

                const unsubCat = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'catalog'),
                    (snapshot) => {
                        const items = [];
                        snapshot.forEach(doc => items.push(doc.data()));
                        setCatalog(items);
                    },
                    (error) => console.error(error)
                );

                const unsubIng = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'ingredients'),
                    (snapshot) => {
                        const items = [];
                        snapshot.forEach(doc => items.push(doc.data()));
                        setIngredients(items);
                    },
                    (error) => console.error(error)
                );

                const unsubLogs = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'logs'),
                    (snapshot) => {
                        const items = [];
                        snapshot.forEach(doc => items.push(doc.data()));
                        setLogs(items);
                    },
                    (error) => console.error(error)
                );

                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'settings'),
                    (docSnap) => {
                        if (docSnap.exists() && !docSnap.metadata.hasPendingWrites) {
                            const data = docSnap.data();
                            setSettings({
                                ...defaultSettingsObj,
                                ...data,
                                lines: data.lines || defaultSettingsObj.lines,
                                stages: data.stages || defaultSettingsObj.stages,
                                machines: data.machines || defaultSettingsObj.machines,
                                employees: data.employees || defaultSettingsObj.employees,
                                defaultIndirectCosts: data.defaultIndirectCosts || defaultSettingsObj.defaultIndirectCosts
                            });
                        }
                    },
                    (error) => console.error(error)
                );

                return () => { unsubCat(); unsubIng(); unsubLogs(); unsubSettings(); };
            }, [user]);

            // Estados Elevados 
            const [editorTab, setEditorTab] = useState('receita'); 
            const [editorIngModalOpen, setEditorIngModalOpen] = useState(false);
            const [editorActiveLinkIdx, setEditorActiveLinkIdx] = useState(null);

            const [invNewIng, setInvNewIng] = useState({ code: '', name: '', price: '', unit: 'kg' });
            const [invSearch, setInvSearch] = useState('');
            const invFileInputRef = useRef(null);

            const [poSelectedProduct, setPoSelectedProduct] = useState('');
            const [poMode, setPoMode] = useState('batch'); 
            const [poInputValue, setPoInputValue] = useState(1);
            const [poBasisItem, setPoBasisItem] = useState('');

            const [monSelectedProduct, setMonSelectedProduct] = useState('');
            const [monYieldKg, setMonYieldKg] = useState('');
            const [monBatches, setMonBatches] = useState(1);
            const [monEntryDate, setMonEntryDate] = useState(new Date().toISOString().split('T')[0]);
            const [monLogSearch, setMonLogSearch] = useState('');

            const [setNewLine, setSetNewLine] = useState('');
            const [setNewStage, setSetNewStage] = useState('');
            const [setNewMachine, setSetNewMachine] = useState({ name: '', powerWatts: '' });
            const [setNewEmployee, setSetNewEmployee] = useState({ name: '', salary: '', hoursMonth: 220 });
            const [setNewIndirect, setSetNewIndirect] = useState({ name: '', cost: '', type: '%' });

            // Sincronização Segura
            const pLength = editingProduct?.ingredients?.length || 0;
            useEffect(() => {
                if (editingProduct) {
                    const currentSections = Array.from(new Set(editingProduct.ingredients.map(i => i.section || settings?.stages?.[0] || 'Massa')));
                    let changed = false; 
                    const newSecs = { ...editingProduct.sections };
                    currentSections.forEach(s => { 
                        if (!newSecs[s]) { 
                            newSecs[s] = { processLossPct: 0, tolerancePct: 5 }; 
                            changed = true; 
                        } 
                    });
                    if (changed) {
                        setEditingProduct(prev => ({ ...prev, sections: newSecs }));
                    }
                }
            }, [pLength, settings?.stages]); 

            const notify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };

            // ==========================================
            // MOTOR DE CÁLCULO UNIFICADO 
            // ==========================================
            const calculateProductData = (prod) => {
                let grandTotalGrossKg = 0;
                let grandTotalNetKg = 0;
                let directCost = 0;

                const sectionsData = {};
                (prod.ingredients || []).forEach(ing => {
                    const sec = ing.section || "Geral";
                    if (!sectionsData[sec]) sectionsData[sec] = { ings: [], grossKg: 0 };
                    sectionsData[sec].ings.push(ing);
                    
                    const qty = safeVal(ing.qty) + safeVal(ing.fixedQty); 
                    const kgQty = toKg(qty, ing.unit);
                    
                    if (!isPackaging(ing.name)) {
                        sectionsData[sec].grossKg += kgQty;
                        grandTotalGrossKg += kgQty;
                    }

                    let price = safeVal(ing.cost);
                    let invUnit = ing.unit;
                    if (ing.ingredientId) {
                        const invItem = ingredients.find(i => i.id === ing.ingredientId);
                        if (invItem) { price = safeVal(invItem.price); invUnit = invItem.unit; }
                    }

                    let costMultiplier = qty;
                    if ((ing.unit === 'g' || ing.unit === 'ml') && (invUnit === 'kg' || invUnit === 'l')) {
                        costMultiplier = qty / 1000;
                    }
                    
                    directCost += (costMultiplier * price);
                });

                Object.keys(sectionsData).forEach(secName => {
                    const lossPct = prod.sections?.[secName]?.processLossPct || 0;
                    const netKg = sectionsData[secName].grossKg * (1 - (lossPct / 100));
                    sectionsData[secName].netKg = netKg;
                    grandTotalNetKg += netKg;
                });

                const finalYieldKg = grandTotalNetKg > 0 ? grandTotalNetKg : (safeVal(prod.yieldUnit) || 1);

                let laborCost = 0;
                (prod.laborItems || []).forEach(l => {
                    const emp = (settings?.employees || []).find(e => e.id == l.employeeId);
                    if (emp) {
                        const costPerMin = emp.salary / (emp.hoursMonth * 60);
                        laborCost += (costPerMin * safeVal(l.minutes));
                    }
                });

                let machineryCost = 0;
                (prod.machineryItems || []).forEach(m => {
                    const mach = (settings?.machines || []).find(x => x.id == m.machineId);
                    if (mach) {
                        machineryCost += ((mach.powerWatts / 1000) * (safeVal(m.timeMinutes) / 60) * (settings?.kwhPrice || 0));
                    }
                });

                const subtotalForIndirects = directCost + laborCost + machineryCost;
                let indirectCost = 0;
                
                (prod.indirectItems || []).forEach(i => {
                    const val = safeVal(i.cost);
                    if (i.type === '%') {
                        indirectCost += subtotalForIndirects * (val / 100);
                    } else {
                        indirectCost += val;
                    }
                });

                const totalCost = subtotalForIndirects + indirectCost;
                const costPerKg = finalYieldKg > 0 ? totalCost / finalYieldKg : 0;

                let totalUnits = 1; 
                let unitCost = costPerKg;
                if (prod.outputType === 'unit' && safeVal(prod.outputUnitWeight) > 0) {
                    const unitWeightKg = toKg(prod.outputUnitWeight, prod.outputUnitMeasure || 'g');
                    totalUnits = Math.floor(finalYieldKg / unitWeightKg);
                    unitCost = totalUnits > 0 ? totalCost / totalUnits : 0;
                }

                const marginDecimal = (prod.targetMargin || 0) / 100;
                const baseCostForPricing = prod.outputType === 'unit' ? unitCost : costPerKg;
                
                const suggestedPrice = marginDecimal < 1 ? baseCostForPricing / (1 - marginDecimal) : 0;
                const salePrice = safeVal(prod.manualSalePrice) || suggestedPrice;
                
                const grossProfit = salePrice - baseCostForPricing;
                const marginPercent = salePrice > 0 ? (grossProfit / salePrice) * 100 : 0;

                return {
                    finalYieldKg, grandTotalGrossKg,
                    directCost, laborCost, machineryCost, indirectCost, totalCost,
                    costPerKg, unitCost, totalUnits,
                    suggestedPrice, salePrice, grossProfit, marginPercent,
                    baseCostForPricing
                };
            };

            const handleProcessImportedData = async (data) => {
                const productsToProcess = data.products || (data.recipeName ? [data] : []);
                let countImported = 0;
                const finalIngredientsList = [...ingredients];
                
                productsToProcess.forEach(prodData => {
                    (prodData.ingredients || []).forEach(ing => {
                        if (!ing.name) return;
                        
                        let invItem = finalIngredientsList.find(i => i.name.toLowerCase().trim() === ing.name.toLowerCase().trim());
                        
                        if (!invItem) {
                            invItem = { id: generateId(), code: '', name: ing.name, price: safeVal(ing.unitPrice), unit: ing.unit || 'kg' };
                            finalIngredientsList.push(invItem);
                        } else if (safeVal(ing.unitPrice) > 0) {
                            invItem.price = safeVal(ing.unitPrice);
                        }
                        
                        ing.ingredientId = invItem.id;
                    });
                });

                const newProducts = [];
                productsToProcess.forEach(prodData => {
                    const recipeIngs = (prodData.ingredients || []).map(ing => ({
                        id: generateId(), name: ing.name, qty: safeVal(ing.quantity), unit: ing.unit || 'kg', cost: safeVal(ing.unitPrice), section: ing.section || settings?.stages?.[0] || 'Massa', fixedQty: 0, ingredientId: ing.ingredientId 
                    })).filter(i => i.name);

                    const defaults = (settings?.defaultIndirectCosts || []).map(d => ({ ...d, id: generateId() }));

                    newProducts.push({
                        ...INITIAL_PRODUCT,
                        id: generateId(),
                        name: prodData.recipeName || 'Receita Importada',
                        yieldUnit: prodData.yieldKg || 1, 
                        ingredients: recipeIngs,
                        indirectItems: defaults
                    });
                });

                countImported = newProducts.length;

                if (user) {
                    try {
                        const batch = writeBatch(db);
                        newProducts.forEach(p => batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'catalog', p.id), p));
                        finalIngredientsList.forEach(ing => batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', ing.id), ing, { merge: true }));
                        await batch.commit();
                    } catch (e) {
                        console.error("Batch write error:", e);
                    }
                }

                setImportDataModalOpen(false);
                
                setTimeout(() => {
                    if (countImported === 1) {
                        setEditingProduct(newProducts[0]);
                        setEditorTab('receita');
                        setView('catalog_editor');
                    } else {
                        setView('catalog_list');
                    }
                    notify(`${countImported} receita(s) importada(s) com sucesso!`);
                }, 50);
            };

            // ==========================================
            // COMPONENTES DE VISTA
            // ==========================================

            const renderLogin = () => (
                <div className="min-h-screen bg-stone-100 flex flex-col justify-center items-center p-4 font-sans animate-fade-in">
                    <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-10 text-center border border-stone-200">
                        <div className="w-20 h-20 bg-brand-orange rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-lg shadow-orange-500/30">
                            <ChefHat size={40} className="text-white" strokeWidth={2.5}/>
                        </div>
                        <h1 className="text-3xl font-black text-stone-900 tracking-tight mb-2">Fichas Técnicas/Custos</h1>
                        <p className="text-stone-500 font-medium mb-10 text-sm px-4">Faça login com a sua conta Google para aceder ao sistema e sincronizar o seu progresso na nuvem.</p>

                        <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-4 bg-white border-2 border-stone-200 hover:bg-stone-50 hover:border-stone-300 text-stone-800 font-bold py-4 px-6 rounded-2xl transition-all shadow-sm active:scale-95">
                            <svg className="w-6 h-6" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Entrar com o Google
                        </button>
                        <button onClick={() => signInAnonymously(auth)} className="w-full mt-4 text-sm font-bold text-stone-500 hover:text-stone-800 transition-colors">
                            Entrar como Convidado (Local)
                        </button>
                        <p className="mt-8 text-[10px] text-stone-400 font-bold uppercase tracking-widest">Acesso Seguro • Cloud Firestore</p>
                    </div>
                </div>
            );

            const renderDashboard = () => (
                <div className="max-w-6xl mx-auto space-y-6 animate-fade-in pb-20">
                    <NavHeader title="Visão Geral do Sistema" />
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="p-6 border-l-4 border-brand-orange hover:shadow-md transition-all cursor-pointer hover:-translate-y-1" onClick={() => setView('catalog_list')}>
                            <div className="flex items-center gap-4">
                                <div className="p-4 bg-orange-50 text-brand-orange rounded-xl"><Book size={32}/></div>
                                <div><p className="text-sm text-stone-500 font-bold uppercase tracking-wider">Fichas Técnicas</p><h3 className="text-3xl font-black text-stone-800">{catalog.length}</h3></div>
                            </div>
                        </Card>
                        <Card className="p-6 border-l-4 border-stone-800 hover:shadow-md transition-all cursor-pointer hover:-translate-y-1" onClick={() => setView('inventory')}>
                            <div className="flex items-center gap-4">
                                <div className="p-4 bg-stone-100 text-stone-800 rounded-xl"><Database size={32}/></div>
                                <div><p className="text-sm text-stone-500 font-bold uppercase tracking-wider">Itens no Estoque</p><h3 className="text-3xl font-black text-stone-800">{ingredients.length}</h3></div>
                            </div>
                        </Card>
                        <Card className="p-6 border-l-4 border-emerald-500 hover:shadow-md transition-all cursor-pointer hover:-translate-y-1" onClick={() => setView('prod_monitoring')}>
                            <div className="flex items-center gap-4">
                                <div className="p-4 bg-emerald-50 text-emerald-600 rounded-xl"><Activity size={32}/></div>
                                <div><p className="text-sm text-stone-500 font-bold uppercase tracking-wider">Registos Qualidade</p><h3 className="text-3xl font-black text-stone-800">{logs.length}</h3></div>
                            </div>
                        </Card>
                    </div>
                </div>
            );

            const renderCatalogList = () => (
                <div className="max-w-7xl mx-auto space-y-6 animate-fade-in pb-20">
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border-b border-stone-200 pb-4">
                        <h2 className="text-2xl font-bold text-stone-900 leading-tight">Catálogo de Fichas Técnicas</h2>
                        <div className="flex flex-wrap gap-2 w-full sm:w-auto">
                            <Button onClick={() => setImportDataModalOpen(true)} variant="secondary" className="text-sm flex-1 sm:flex-none whitespace-nowrap border-brand-orange text-brand-orange hover:bg-orange-50"><FileSpreadsheet size={16}/> Importar Ficheiros</Button>
                            <Button onClick={() => { 
                                const defaults = (settings?.defaultIndirectCosts || []).map(d => ({ ...d, id: generateId() }));
                                setEditingProduct({...INITIAL_PRODUCT, id: generateId(), indirectItems: defaults}); 
                                setView('catalog_editor'); 
                                setEditorTab('receita'); 
                            }} variant="brand" className="text-sm flex-1 sm:flex-none whitespace-nowrap"><Plus size={18}/> Novo Produto</Button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        {catalog.map(p => {
                            const t = calculateProductData(p);
                            return (
                                <Card key={p.id} onClick={() => { setEditingProduct(p); setView('catalog_editor'); setEditorTab('receita'); }} className="p-5 cursor-pointer hover:border-brand-orange transition-all hover:shadow-md border-l-4 border-l-brand-orange group">
                                    <div className="flex justify-between items-start mb-3">
                                        <span className="text-[10px] bg-orange-100 text-brand-orange px-2 py-0.5 rounded font-bold uppercase tracking-wider">{p.line}</span>
                                        {p.image && <div className="w-8 h-8 rounded-md overflow-hidden bg-stone-100"><img src={p.image} className="w-full h-full object-cover"/></div>}
                                    </div>
                                    <h3 className="font-bold text-stone-800 mb-1 truncate text-lg group-hover:text-brand-orange transition-colors">{p.name}</h3>
                                    <div className="text-xs font-medium text-stone-500 mb-4">{t.finalYieldKg.toFixed(2)} Kg / Lote</div>
                                    <div className="border-t border-stone-100 pt-3 flex justify-between items-end">
                                        <div><span className="block text-[10px] uppercase text-stone-400 font-bold mb-0.5">Custo / {p.outputType === 'unit' ? 'Un' : 'Kg'}</span><span className="font-bold text-stone-800 text-sm">R$ {formatMoney(t.baseCostForPricing)}</span></div>
                                        <div className="text-right"><span className="block text-[10px] uppercase text-stone-400 font-bold mb-0.5">Margem</span><span className={`font-bold text-sm ${t.marginPercent >= p.targetMargin ? 'text-emerald-600' : 'text-red-500'}`}>{formatMoney(t.marginPercent)}%</span></div>
                                    </div>
                                </Card>
                            )
                        })}
                        {catalog.length === 0 && <div className="col-span-full text-center py-16 text-stone-400 border-2 border-dashed border-stone-200 rounded-2xl bg-stone-50"><Book size={48} className="mx-auto mb-4 text-stone-300"/>Nenhum produto cadastrado no catálogo.<br/>Clique em "Novo Produto" para começar a sua primeira Ficha Técnica.</div>}
                    </div>
                </div>
            );

            const PrintTechSheet = ({ product: p, calc: t, settings }) => (
                <div className="hidden print:block w-full bg-white text-black p-4 font-sans max-w-4xl mx-auto">
                    <div className="flex justify-between items-start border-b-4 border-stone-900 pb-6 mb-8">
                        <div>
                            {settings?.logo ? <img src={settings.logo} className="h-20 w-auto object-contain" /> : <div className="text-2xl font-black tracking-widest text-stone-300">EMPRESA</div>}
                        </div>
                        <div className="text-right">
                            <h1 className="text-3xl font-black uppercase tracking-widest text-stone-900">Ficha Técnica e de Custos</h1>
                            <p className="text-stone-500 font-bold mt-1 tracking-widest">REF: {p.id ? p.id.slice(-6).toUpperCase() : 'NOVA'}</p>
                            <p className="text-stone-500 text-xs mt-1">Emissão: {new Date().toLocaleDateString('pt-BR')}</p>
                        </div>
                    </div>

                    <div className="flex gap-8 mb-8">
                        <div className="flex-1 grid grid-cols-2 gap-4 bg-stone-50 p-6 rounded-2xl border border-stone-200">
                            <div className="col-span-2"><p className="text-[10px] uppercase font-bold text-stone-500 tracking-wider">Produto</p><p className="font-black text-2xl text-stone-900">{p.name}</p></div>
                            <div><p className="text-[10px] uppercase font-bold text-stone-500 tracking-wider">Categoria / Linha</p><p className="font-bold text-lg text-stone-800">{p.line}</p></div>
                            <div><p className="text-[10px] uppercase font-bold text-stone-500 tracking-wider">Rendimento do Lote</p><p className="font-black text-brand-orange text-xl">{t.finalYieldKg.toFixed(3)} kg</p></div>
                            <div><p className="text-[10px] uppercase font-bold text-stone-500 tracking-wider">Formato de Venda</p><p className="font-bold text-lg text-stone-800">{p.outputType === 'unit' ? `Unidade (${p.outputUnitWeight}${p.outputUnitMeasure})` : 'Quilo (kg)'}</p></div>
                        </div>
                        {p.image ? (
                            <img src={p.image} className="w-48 h-48 object-cover rounded-2xl border border-stone-200 shadow-sm" />
                        ) : (
                            <div className="w-48 h-48 bg-stone-50 rounded-2xl border-2 border-dashed border-stone-200 flex items-center justify-center text-stone-300 flex-col"><ImageIcon size={40} className="mb-2"/><span className="text-[10px] font-bold uppercase tracking-widest">Sem Imagem</span></div>
                        )}
                    </div>

                    <h3 className="font-black text-lg mb-3 uppercase tracking-widest border-b-2 border-stone-200 pb-2 text-stone-800">Composição (Matéria-Prima)</h3>
                    <table className="w-full text-sm text-left mb-10 border border-stone-200 rounded-lg overflow-hidden">
                        <thead className="bg-stone-100 font-bold uppercase text-[10px] text-stone-500 tracking-widest">
                            <tr><th className="p-3 border-b border-stone-200">Etapa de Processo</th><th className="p-3 border-b border-stone-200">Descrição do Insumo</th><th className="p-3 border-b border-stone-200 text-center">Quant.</th><th className="p-3 border-b border-stone-200 text-right">Custo Base</th></tr>
                        </thead>
                        <tbody className="divide-y divide-stone-100">
                            {p.ingredients.map((ing, i) => (
                                <tr key={i} className="even:bg-stone-50">
                                    <td className="p-3 font-bold text-stone-500 text-xs uppercase tracking-wider">{ing.section}</td>
                                    <td className="p-3 font-bold text-stone-900">{ing.name} {ing.fixedQty > 0 ? <span className="text-[9px] text-stone-400 font-normal uppercase ml-1">(Fixo)</span> : ''}</td>
                                    <td className="p-3 text-center font-black text-brand-orange">{(safeVal(ing.qty) + safeVal(ing.fixedQty)).toFixed(3)} {ing.unit}</td>
                                    <td className="p-3 text-right font-bold text-stone-800">R$ {formatMoney((toKg(safeVal(ing.qty)+safeVal(ing.fixedQty), ing.unit) * safeVal(ing.cost)))}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>

                    <div className="grid grid-cols-2 gap-10 border-t-2 border-stone-200 pt-8">
                        <div>
                            <h3 className="font-black text-lg mb-4 uppercase tracking-widest text-stone-800">Estrutura de Custos</h3>
                            <div className="space-y-3 text-sm">
                                <div className="flex justify-between border-b border-stone-100 pb-2"><span className="font-bold text-stone-500">Matéria Prima</span><span className="font-black text-stone-800">R$ {formatMoney(t.directCost)}</span></div>
                                <div className="flex justify-between border-b border-stone-100 pb-2"><span className="font-bold text-stone-500">Mão de Obra</span><span className="font-black text-stone-800">R$ {formatMoney(t.laborCost)}</span></div>
                                <div className="flex justify-between border-b border-stone-100 pb-2"><span className="font-bold text-stone-500">Energia / Equipamentos</span><span className="font-black text-stone-800">R$ {formatMoney(t.machineryCost)}</span></div>
                                <div className="flex justify-between border-b border-stone-100 pb-2"><span className="font-bold text-stone-500">Indiretos / Taxas</span><span className="font-black text-stone-800">R$ {formatMoney(t.indirectCost)}</span></div>
                                <div className="flex justify-between pt-3"><span className="font-black uppercase tracking-widest text-stone-800 text-lg">Custo Total Lote</span><span className="font-black text-2xl text-red-600">R$ {formatMoney(t.totalCost)}</span></div>
                            </div>
                        </div>
                        <div>
                            <h3 className="font-black text-lg mb-4 uppercase tracking-widest text-stone-800">Precificação Estratégica</h3>
                            <div className="bg-stone-900 text-white p-6 rounded-2xl">
                                <div className="flex justify-between items-center mb-4"><span className="text-xs font-bold uppercase tracking-widest text-stone-400">Markup Alvo</span><span className="font-black text-xl">{p.targetMargin}%</span></div>
                                <div className="flex justify-between items-center mb-5"><span className="text-xs font-bold uppercase tracking-widest text-stone-400">Custo Base ({p.outputType==='unit'?'Un':'Kg'})</span><span className="font-black text-2xl text-stone-200">R$ {formatMoney(t.baseCostForPricing)}</span></div>
                                <div className="flex justify-between items-center border-t border-stone-700 pt-5"><span className="text-sm font-black uppercase tracking-widest text-emerald-400">Preço Sugerido</span><span className="font-black text-4xl text-emerald-400">R$ {formatMoney(t.suggestedPrice)}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderCatalogEditor = () => {
                if (!editingProduct) return <div className="p-10 text-center text-stone-500"><Loader2 className="animate-spin mx-auto mb-4"/>A carregar editor...</div>;
                const p = editingProduct;
                const t = calculateProductData(p);
                const activeSections = Array.from(new Set(p.ingredients.map(i => i.section || settings?.stages?.[0] || 'Massa')));

                const updateField = (f, v) => setEditingProduct({ ...p, [f]: v });
                const updateIng = (idx, f, v) => { const newIngs = [...p.ingredients]; newIngs[idx][f] = v; setEditingProduct({ ...p, ingredients: newIngs }); };
                const addIng = (sec) => setEditingProduct({ ...p, ingredients: [...p.ingredients, { id: generateId(), name: '', qty: 0, unit: 'g', cost: 0, section: sec, fixedQty: 0, ingredientId: null }] });
                const removeIng = (idx) => setEditingProduct({ ...p, ingredients: p.ingredients.filter((_, i) => i !== idx) });
                
                const updateSection = (secName, field, value) => {
                    const newSecs = { ...p.sections, [secName]: { ...p.sections[secName], [field]: value } };
                    setEditingProduct({ ...p, sections: newSecs });
                };

                const handleLink = (ing) => {
                    if (editorActiveLinkIdx !== null) {
                        updateIng(editorActiveLinkIdx, 'name', ing.name);
                        updateIng(editorActiveLinkIdx, 'unit', ing.unit);
                        updateIng(editorActiveLinkIdx, 'ingredientId', ing.id);
                        updateIng(editorActiveLinkIdx, 'cost', ing.price);
                    }
                    setEditorIngModalOpen(false); setEditorActiveLinkIdx(null);
                };

                const handleUnlink = (idx) => updateIng(idx, 'ingredientId', null);
                const getIngCostDisplay = (ing) => { if (ing.ingredientId) { const inv = ingredients.find(i => i.id === ing.ingredientId); if (inv) return inv.price; } return ing.cost; };

                const handleProductImageUpload = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        const base64Img = await compressImage(file, 600);
                        updateField('image', base64Img);
                    } catch (err) {
                        notify("Erro ao carregar a imagem.");
                    }
                };

                const handleSave = async () => {
                    if (!p.name) return notify("Nome do produto é obrigatório.");
                    if (!p.id) p.id = generateId();
                    p.lastUpdated = new Date().toISOString();
                    
                    if (user) {
                        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'catalog', p.id), p);
                    }
                    
                    setView('catalog_list'); notify("Produto salvo com sucesso!");
                };

                return (
                    <div className="max-w-6xl mx-auto animate-slide-in pb-32">
                        <PrintTechSheet product={p} calc={t} settings={settings} />

                        <div className="print:hidden">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-stone-200 pb-4">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setView('catalog_list')} className="p-2 bg-white border border-stone-200 hover:bg-stone-50 rounded-xl transition-colors shadow-sm"><ChevronLeft size={20} className="text-stone-600" /></button>
                                    <div>
                                        <h2 className="text-2xl font-bold text-stone-900 leading-none">Editor de Ficha</h2>
                                        <p className="text-xs text-stone-500 font-medium uppercase tracking-widest mt-1">Ref: {p.id ? p.id.slice(-6).toUpperCase() : 'NOVO'}</p>
                                    </div>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto overflow-x-auto">
                                    <Button variant="outline" onClick={() => window.print()} className="bg-white whitespace-nowrap"><Printer size={16}/> Imprimir Ficha</Button>
                                    <Button variant="brand" onClick={handleSave} className="whitespace-nowrap w-full md:w-auto"><Save size={16}/> Guardar e Voltar</Button>
                                </div>
                            </div>

                            {/* Cabeçalho do Produto com Imagem */}
                            <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-6 mb-6 flex flex-col md:flex-row gap-6">
                                <div className="flex-shrink-0 w-full md:w-48 h-48 bg-stone-50 rounded-xl border-2 border-dashed border-stone-200 flex items-center justify-center overflow-hidden relative group cursor-pointer transition-colors hover:border-brand-orange hover:bg-orange-50 z-0">
                                    <input type="file" accept="image/*" onChange={handleProductImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20"/>
                                    {p.image ? (
                                        <>
                                            <img src={p.image} className="w-full h-full object-cover relative z-0" />
                                            <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity z-10">
                                                <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); updateField('image', null); }} className="text-white bg-red-500 p-2 rounded-full relative z-30 hover:bg-red-600 transition-colors shadow-lg"><Trash2 size={16}/></button>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex flex-col items-center text-stone-400 group-hover:text-brand-orange transition-colors relative z-0"><ImageIcon size={32} className="mb-2"/><span className="text-xs font-bold uppercase tracking-widest text-center px-4">Adicionar Foto</span></div>
                                    )}
                                </div>

                                <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-5 content-start">
                                    <div className="md:col-span-2"><label className="block text-xs font-bold text-stone-500 uppercase mb-1.5">Nome do Produto</label><input type="text" value={p.name} onChange={e => updateField('name', e.target.value)} className="w-full p-3 border border-stone-300 rounded-xl outline-none font-bold text-stone-800 focus:border-brand-orange focus:ring-1 focus:ring-orange-500 transition-all text-lg" placeholder="Ex: Pão Francês Tradicional" /></div>
                                    <div><label className="block text-xs font-bold text-stone-500 uppercase mb-1.5">Linha / Categoria</label><SearchableSelect options={settings?.lines || []} value={p.line} onChange={(val) => updateField('line', val)} /></div>
                                    <div>
                                        <label className="block text-xs font-bold text-stone-500 uppercase mb-1.5">Formato de Venda</label>
                                        <select value={p.outputType} onChange={e => updateField('outputType', e.target.value)} className="w-full p-3 border border-stone-300 rounded-xl outline-none focus:border-brand-orange bg-white text-sm font-bold text-stone-800 transition-all">
                                            <option value="kg">Por Kg (Granel)</option>
                                            <option value="unit">Por Unidade / Pacote</option>
                                        </select>
                                    </div>
                                    {p.outputType === 'unit' && (
                                        <div className="md:col-span-2 bg-orange-50/50 p-4 rounded-xl border border-orange-100 flex items-center gap-4 animate-fade-in mt-2">
                                            <div className="p-2 bg-white rounded-lg shadow-sm border border-orange-100"><Info className="text-brand-orange" size={20}/></div>
                                            <div className="flex-1">
                                                <label className="block text-xs font-bold text-orange-800 uppercase mb-2">Peso exato de 1 Unidade para venda</label>
                                                <div className="flex items-center gap-3">
                                                    <input type="number" step="0.001" value={p.outputUnitWeight} onChange={e => updateField('outputUnitWeight', e.target.value)} className="w-32 p-3 border border-orange-200 rounded-xl font-bold text-stone-800 outline-none focus:border-brand-orange" placeholder="Ex: 50" />
                                                    <select value={p.outputUnitMeasure} onChange={e => updateField('outputUnitMeasure', e.target.value)} className="p-3 border border-orange-200 rounded-xl bg-white text-sm font-medium outline-none focus:border-brand-orange"><option value="g">gramas (g)</option><option value="kg">quilos (kg)</option></select>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Abas Navegação */}
                            <div className="flex overflow-x-auto border-b border-stone-200 mb-6 gap-2 no-print pb-px">
                                <button onClick={()=>setEditorTab('receita')} className={`px-6 py-3.5 font-bold text-sm whitespace-nowrap rounded-t-xl transition-colors flex items-center gap-2 border-b-2 ${editorTab==='receita' ? 'border-brand-orange text-brand-orange bg-white' : 'border-transparent text-stone-500 hover:text-stone-800 hover:bg-stone-50'}`}><ListChecks size={18}/> Ficha Técnica (Receita)</button>
                                <button onClick={()=>setEditorTab('custos')} className={`px-6 py-3.5 font-bold text-sm whitespace-nowrap rounded-t-xl transition-colors flex items-center gap-2 border-b-2 ${editorTab==='custos' ? 'border-stone-800 text-stone-800 bg-white' : 'border-transparent text-stone-500 hover:text-stone-800 hover:bg-stone-50'}`}><Shapes size={18}/> Operação & Indiretos</button>
                                <button onClick={()=>setEditorTab('precificacao')} className={`px-6 py-3.5 font-bold text-sm whitespace-nowrap rounded-t-xl transition-colors flex items-center gap-2 border-b-2 ${editorTab==='precificacao' ? 'border-emerald-600 text-emerald-600 bg-white' : 'border-transparent text-stone-500 hover:text-stone-800 hover:bg-stone-50'}`}><TrendingUp size={18}/> Precificação Final</button>
                            </div>

                            {/* ABA 1: RECEITA */}
                            <div className={`space-y-6 ${editorTab==='receita' ? 'block animate-fadeIn' : 'hidden'}`}>
                                {activeSections.length === 0 && (
                                    <div className="text-center py-16 bg-white rounded-2xl border-2 border-dashed border-stone-200">
                                        <div className="mx-auto w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mb-4"><ChefHat className="text-stone-400 w-8 h-8"/></div>
                                        <h3 className="text-lg font-bold text-stone-700">Comece a sua Receita</h3>
                                        <p className="text-sm text-stone-500 mb-6 max-w-sm mx-auto">Adicione os ingredientes, organize por etapas do processo (Ex: Massa, Recheio) e estabeleça os padrões de perda.</p>
                                        <Button onClick={() => addIng(settings?.stages?.[0] || 'Massa')} variant="brand" className="mx-auto px-6 py-3"><Plus size={18}/> Adicionar Primeiro Ingrediente</Button>
                                    </div>
                                )}

                                {activeSections.map((secName) => {
                                    const secIngs = p.ingredients.map((ing, i) => ({...ing, originalIdx: i})).filter(ing => (ing.section || settings?.stages?.[0] || 'Massa') === secName);
                                    const secLoss = p.sections?.[secName]?.processLossPct || 0;
                                    
                                    return (
                                        <div key={secName} className="bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-sm avoid-break">
                                            <div className="bg-stone-50/80 p-5 border-b border-stone-200 flex flex-col md:flex-row justify-between items-center gap-4">
