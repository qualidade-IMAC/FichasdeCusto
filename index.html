<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fichas Técnicas e Custos - IMAC</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>

    <!-- Phosphor Icons (Substituindo Lucide para manter o padrão) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Configurações do Tailwind (Padrão IMAC) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'imac-yellow': '#dca900', // Amarelo da barra superior/destaques
                        'imac-blue': '#104ea2',   // Azul da logo
                        'imac-text': '#111827',   // Cinza muito escuro para títulos pesados
                        'imac-subtext': '#6b7280', // Cinza para textos secundários
                        'imac-bg': '#f8fafc',     // Fundo cinza bem claro
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideIn: { '0%': { transform: 'translateX(20px)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-in': 'slideIn 0.3s ease-out'
                    }
                }
            }
        }
    </script>

    <!-- Import Map para React e Firebase (Sem Lucide) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
    }
    </script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SheetJS Fallback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @media print {
            @page { margin: 0.5cm; size: A4; }
            body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { break-after: page; page-break-after: always; }
            .avoid-break { break-inside: avoid; page-break-inside: avoid; }
            .print-shadow-none { box-shadow: none !important; border-color: #e5e7eb !important; }
        }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden bg-imac-bg">

    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "firebase/auth";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, deleteDoc, writeBatch } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyBvCS2rxIxzEXoEvKPFKeBjv1g6d06wSwI",
            authDomain: "fichasdecusto.firebaseapp.com",
            projectId: "fichasdecusto",
            storageBucket: "fichasdecusto.firebasestorage.app",
            messagingSenderId: "953506009753",
            appId: "1:953506009753:web:79b3ce62c0364a6d341e08",
            measurementId: "G-X7N1VDYGL5"
        };
        const app = initializeApp(firebaseConfig);
        
        const expedioConfig = {
            apiKey: "AIzaSyDev8spgKoKZi2pOohmk0r9SFLtLMcePa8",
            authDomain: "estoque-b50df.firebaseapp.com",
            projectId: "estoque-b50df",
            storageBucket: "estoque-b50df.firebasestorage.app",
            messagingSenderId: "634756791567",
            appId: "1:634756791567:web:993e61243b57b7e057d27a"
        };
        const appExpedio = initializeApp(expedioConfig, "expedio");
        const authExpedio = getAuth(appExpedio);
        const dbExpedio = getFirestore(appExpedio);
        const expedioAppId = '1:634756791567:web:993e61243b57b7e057d27a';
        
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fichasdecusto_app';

        // --- Helpers Globais ---
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        const safeVal = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'string') val = val.replace(',', '.');
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        };
        const formatMoney = (val) => safeVal(val).toFixed(2);
        const formatDate = (isoString) => {
            if (!isoString) return 'Data desconhecida';
            if (isoString.includes('T')) return new Date(isoString).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
            const parts = isoString.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0].slice(2)}`;
            return isoString;
        };
        const toKg = (qty, unit) => {
            const val = parseFloat(qty) || 0;
            const u = (unit || '').toLowerCase().trim();
            if (u === 'g' || u === 'grama' || u === 'gramas') return val / 1000;
            if (u === 'mg') return val / 1000000;
            if (u === 'ml') return val / 1000;
            return val;
        };
        const isPackaging = (name) => {
            const n = (name || '').toLowerCase();
            return n.includes('embalagem') || n.includes('etiqueta') || n.includes('bobina') || n.includes('saco') || n.includes('fita') || n.includes('caixa') || n.includes('papel');
        };

        const compressImage = (file, maxWidth = 800) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
                reader.onerror = error => reject(error);
            });
        };

        // --- Componentes UI Base Independentes ---
        const Card = ({ children, className = "", onClick }) => (
            <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-gray-200 ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = "primary", className = "", disabled = false, ...props }) => {
            const baseStyle = "px-4 py-2.5 rounded-xl font-bold transition-all active:scale-95 flex items-center gap-2 justify-center text-sm relative overflow-hidden";
            const variants = {
                primary: "bg-imac-text text-white hover:bg-gray-800 disabled:opacity-50 shadow-sm",
                secondary: "bg-white text-gray-700 hover:bg-gray-50 border border-gray-200 disabled:bg-gray-50 disabled:text-gray-400 shadow-sm",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-100",
                success: "bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm",
                outline: "border border-gray-300 text-gray-700 hover:bg-gray-50",
                brand: "bg-imac-yellow text-white hover:opacity-90 shadow-sm"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className} ${disabled ? 'cursor-not-allowed opacity-70' : ''}`} {...props}>
                    {children}
                </button>
            );
        };

        const SearchableSelect = ({ options, value, onChange, placeholder, labelKey = 'label', valueKey = 'value', disabled = false }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => {
                if (!value) setSearchTerm('');
                else {
                    const selected = options.find(opt => (typeof opt === 'object' ? opt[valueKey] : opt) === value);
                    if (selected) setSearchTerm(typeof selected === 'object' ? selected[labelKey] : selected);
                    else setSearchTerm(value);
                }
            }, [value, options, labelKey, valueKey]);

            const filteredOptions = useMemo(() => {
                if (!searchTerm) return options;
                return options.filter(opt => {
                    const label = typeof opt === 'object' ? opt[labelKey] : opt;
                    return String(label).toLowerCase().includes(searchTerm.toLowerCase());
                });
            }, [options, searchTerm, labelKey]);

            return (
                <div className="relative w-full" ref={wrapperRef}>
                    <div className="relative">
                        <input type="text" className={`w-full p-3 border ${isOpen ? 'border-imac-yellow ring-1 ring-yellow-400' : 'border-gray-300'} rounded-xl outline-none text-sm font-bold bg-white disabled:bg-gray-100 disabled:text-gray-400`} placeholder={placeholder} value={searchTerm} onChange={(e) => { setSearchTerm(e.target.value); setIsOpen(true); if(e.target.value === '') onChange(''); }} onClick={() => !disabled && setIsOpen(true)} disabled={disabled} />
                        <div className="absolute right-3 top-3.5 text-gray-400 pointer-events-none"><i className="ph ph-caret-down"></i></div>
                    </div>
                    {isOpen && !disabled && (
                        <ul className="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg max-h-60 overflow-auto custom-scroll" style={{ zIndex: 9999 }}>
                            {filteredOptions.length > 0 ? filteredOptions.map((opt, idx) => {
                                const val = typeof opt === 'object' ? opt[valueKey] : opt;
                                const label = typeof opt === 'object' ? opt[labelKey] : opt;
                                return <li key={idx} onClick={() => { onChange(val); setSearchTerm(String(label)); setIsOpen(false); }} className={`p-3 text-sm cursor-pointer hover:bg-gray-50 break-words ${val === value ? 'bg-yellow-50 text-imac-yellow font-bold' : 'text-gray-700 font-medium'}`}>{String(label)}</li>;
                            }) : <li className="p-3 text-sm text-gray-400 italic">Nenhuma opção encontrada</li>}
                        </ul>
                    )}
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, onClose, onConfirm, title, message }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4 border border-gray-100">
                        <div className="flex items-center gap-3 text-red-600 mb-4 bg-red-50 p-3 rounded-xl w-fit"><i className="ph ph-warning text-2xl"></i></div>
                        <h3 className="text-lg font-black text-imac-text mb-2">{title}</h3><p className="text-gray-600 mb-6 text-sm">{message}</p>
                        <div className="flex justify-end gap-3"><Button variant="secondary" onClick={onClose}>Cancelar</Button><Button variant="danger" onClick={onConfirm}>Confirmar</Button></div>
                    </div>
                </div>
            );
        };

        // --- Modais de Importação ---
        const ImportDataModal = ({ isOpen, onClose, onProcess }) => {
            const [fileType, setFileType] = useState(null); 
            const [fileContent, setFileContent] = useState('');
            const [mimeType, setMimeType] = useState('');
            const [workbookData, setWorkbookData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [stats, setStats] = useState('');
            const [preview, setPreview] = useState(null);

            useEffect(() => {
                if (!isOpen) { setFileType(null); setFileContent(''); setWorkbookData(null); setError(''); setLoading(false); setStats(''); setPreview(null); }
            }, [isOpen]);

            // ── Parser IMAC — formato exato das fichas de Croissants/Folhados ──
            // Estrutura descoberta por inspeção da planilha:
            //   Col A (0): Etapa mesclada (MASSA, COZIMENTO, RECHEIO, EMBALAGEM…)
            //              Após TOTAL: metadados (RENDIMENTO, PESO POR PACOTE, etc.)
            //   Col D (3): Nome do ingrediente
            //   Col H (7): Quantidade (número)
            //   Col I (8): Unidade (kg, und…)
            //   Linha 3 (R03): "Preparação: NOME"
            //   Linha 4 (R04): "1 UNIDADE: 100G"
            //   Linha 5 (R05): data | … | RENDIMENTO | valor | KG  (col E=5, H=7)
            //   Após TOTAL: RENDIMENTO na col A com valor na col H
            const processLocalExcel = (workbook) => {
                const newProducts = [];

                const parseNum = (v) => {
                    if (v === null || v === undefined || v === '') return 0;
                    const s = String(v).replace(',', '.').replace(/[^0-9.eE\-+]/g, '');
                    const n = parseFloat(s);
                    return isNaN(n) ? 0 : n;
                };
                const cellStr = (v) => String(v === null || v === undefined ? '' : v).trim();

                // Etapas válidas — qualquer valor de col A que seja uma dessas
                const ETAPAS = ['MASSA', 'RECHEIO', 'COZIMENTO', 'REFOGADO', 'EMBALAGEM',
                                'PÉ DE MASSA', 'PE DE MASSA', 'PULVERIZAÇÃO', 'PULVERIZACAO',
                                'COBERTURA', 'MONTAGEM', 'OUTROS'];
                const isEtapa = (v) => ETAPAS.some(e => cellStr(v).toUpperCase().includes(e));

                workbook.SheetNames.forEach(sheetName => {
                    const sheet = workbook.Sheets[sheetName];
                    // Lê com header:1 para ter arrays indexados por posição
                    const rows  = window.XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });

                    let recipeName        = sheetName;
                    let yieldKg           = 0;
                    let unitWeightG       = 0;
                    let unitWeightMeasure = 'g';
                    let packWeightKg      = 0;
                    let unitsPerPackage   = 0;
                    let packagesPerBatch  = 0;
                    let totalUnitsPerBatch = 0;
                    let sectionLoss       = {};   // { 'MASSA': 16.7, 'RECHEIO': 28.9 }
                    const ingredients     = [];

                    let lastSection = 'MASSA';   // propaga etapa (células mescladas)
                    let passedTotal = false;       // já passou da linha TOTAL

                    for (let i = 0; i < rows.length; i++) {
                        const row  = rows[i] || [];
                        const colA = cellStr(row[0]);  // etapa / metadado
                        const colD = cellStr(row[3]);  // ingrediente
                        const colH = row[7];           // quantidade
                        const colI = cellStr(row[8]);  // unidade

                        // ── Nome da receita ─────────────────────────────────
                        if (colA.startsWith('Preparação:') || colA.startsWith('Preparacao:')) {
                            recipeName = colA.replace(/Prepara[çc][aã]o:\s*/i, '').trim();
                            continue;
                        }

                        // ── Peso por unidade: "1 UNIDADE: 100G" ─────────────
                        if (colA.toUpperCase().includes('UNIDADE:')) {
                            const m = colA.match(/1\s+UNIDADE[:\s]+(\d+(?:[.,]\d+)?)\s*(G|KG|g|kg)/i);
                            if (m) { unitWeightG = parseNum(m[1]); unitWeightMeasure = m[2].toLowerCase(); }
                            continue;
                        }

                        // ── RENDIMENTO na linha de cabeçalho (col E=5 no raw) ─
                        // Row 05: A=data | E='RENDIMENTO' | H=formula/valor | I='KG'
                        if (!passedTotal) {
                            const col5 = cellStr(row[5]);
                            if (col5.toUpperCase() === 'RENDIMENTO' && colH) {
                                const v = parseNum(colH);
                                if (v > 0) yieldKg = v;
                            }
                        }

                        // ── Marcador TOTAL ───────────────────────────────────
                        if (colA.toUpperCase() === 'TOTAL') { passedTotal = true; continue; }

                        // ── Metadados pós-TOTAL (col A) ──────────────────────
                        if (passedTotal) {
                            // RENDIMENTO  (col A = 'RENDIMENTO', valor em col H)
                            if (colA.toUpperCase() === 'RENDIMENTO') {
                                const v = parseNum(colH);
                                if (v > 0) yieldKg = v;
                                continue;
                            }
                            // PESO POR PACOTE: 2 KG
                            const ppM = colA.match(/PESO\s+POR\s+PACOTE[:\s]+([0-9.,]+)\s*(KG|G|kg|g)/i);
                            if (ppM) { packWeightKg = parseNum(ppM[1]) * (ppM[2].toLowerCase() === 'g' ? 0.001 : 1); continue; }

                            // X PACOTES POR RECEITA = Y UNIDADES
                            const prM = colA.match(/([0-9.,]+)\s*PACOTES?\s+POR\s+RECEITA\s*=?\s*([0-9]+)\s*UNIDADES?/i);
                            if (prM) { packagesPerBatch = parseNum(prM[1]); totalUnitsPerBatch = parseNum(prM[2]); continue; }

                            // Pacote com N unidades
                            const puM = colA.match(/PACOTE\s+COM\s+(?:m[eé]dia\s+de\s+)?([0-9]+)\s*UNIDADES?/i);
                            if (puM) { unitsPerPackage = parseNum(puM[1]); continue; }

                            // Perdas: "9,20kg de massa (16,7% perda) + 3,65kg de recheio (28,9% perda)"
                            const perdaRe = /([0-9.,]+)\s*kg\s+de\s+(\w+)\s*\(([0-9.,]+)%\s*perda\)/gi;
                            let pm;
                            while ((pm = perdaRe.exec(colA)) !== null) {
                                sectionLoss[pm[2].toUpperCase()] = parseNum(pm[3]);
                            }
                            continue;
                        }

                        // ── Ingredientes (antes do TOTAL) ────────────────────
                        // Atualiza etapa se col A tiver valor válido
                        if (colA && isEtapa(colA)) lastSection = colA.trim();

                        // Nome do ingrediente em col D (idx 3)
                        const ingName = colD;
                        if (!ingName || ingName === 'Ingrediente') continue;

                        const qty = parseNum(colH);
                        if (qty <= 0) continue;

                        const unit = colI || 'kg';

                        ingredients.push({
                            section:   lastSection,
                            name:      ingName,
                            quantity:  qty,
                            unit:      unit.toLowerCase(),
                            unitPrice: 0,
                        });
                    }

                    if (ingredients.length > 0) {
                        newProducts.push({
                            recipeName,
                            yieldKg:           yieldKg || 1,
                            unitWeightG,
                            unitWeightMeasure,
                            packWeightKg,
                            unitsPerPackage,
                            packagesPerBatch,
                            totalUnitsPerBatch,
                            sectionLoss,
                            ingredients,
                        });
                    }
                });

                return { products: newProducts };
            };

            const handleFile = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                setLoading(true); setError(''); setStats('');
                
                try {
                    let isExcelOrCsv = false;
                    const combinedWorkbook = window.XLSX.utils.book_new();
                    let sheetsAdded = 0;

                    for (const f of files) {
                        if (f.name.endsWith('.xlsx') || f.name.endsWith('.xls') || f.name.endsWith('.csv')) {
                            isExcelOrCsv = true;
                            const data = await f.arrayBuffer();
                            const wb = window.XLSX.read(data, { type: 'array' });
                            
                            wb.SheetNames.forEach(name => {
                                let safeName = name;
                                if (f.name.endsWith('.csv')) {
                                    safeName = f.name.replace('.csv', '').substring(0, 31);
                                }
                                while (combinedWorkbook.SheetNames.includes(safeName)) {
                                    safeName = safeName.substring(0, 28) + (Math.floor(Math.random() * 100));
                                }
                                window.XLSX.utils.book_append_sheet(combinedWorkbook, wb.Sheets[name], safeName);
                                sheetsAdded++;
                            });
                        }
                    }
                    
                    if (isExcelOrCsv && sheetsAdded > 0) {
                        setWorkbookData(combinedWorkbook);
                        setFileType('excel');
                        setStats(`Ficheiros reconhecidos! Encontrada(s) ${sheetsAdded} receita(s) para importação combinada.`);
                    } else {
                        setError("Formato de ficheiro não suportado. Por favor, utilize ficheiros Excel (.xlsx, .xls) ou CSV.");
                    }
                } catch (err) {
                    setError("Erro ao ler ficheiros. Tente novamente.");
                } finally {
                    setLoading(false);
                }
            };

            const processData = async () => {
                if (!fileType) return setError("Faça o upload de um ficheiro primeiro.");
                setLoading(true); setError('');

                try {
                    const result = processLocalExcel(workbookData);
                    if (!result.products || result.products.length === 0) {
                        throw new Error("Nenhuma receita identificada. Verifique se a planilha segue o formato IMAC (com colunas Seção, Ingrediente, Quantidade).");
                    }
                    // Mostra preview antes de confirmar
                    setPreview(result);
                    setLoading(false);
                } catch (err) {
                    setError(err.message || "Erro ao processar o ficheiro.");
                    setLoading(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full overflow-hidden flex flex-col max-h-[90vh] border border-gray-100">
                        <div className="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
                            <h3 className="font-black text-lg flex items-center gap-2 text-imac-text">
                                <i className="ph ph-file-xls text-imac-yellow text-xl"></i>
                                {preview ? `${preview.products.length} receita(s) encontrada(s)` : 'Importar Fichas Técnicas'}
                            </h3>
                            <button onClick={onClose} disabled={loading} className="text-gray-400 hover:text-gray-600 transition-colors"><i className="ph ph-x text-xl"></i></button>
                        </div>

                        <div className="p-6 overflow-y-auto custom-scroll flex-1">
                            {!preview ? (
                                <>
                                    <p className="text-sm text-gray-500 mb-4 font-medium">Envie a planilha de fichas técnicas no <strong>formato IMAC</strong> (Croissants, Folhados e similares). Cada aba = uma receita.</p>
                                    {!fileType ? (
                                        <div className="relative">
                                            <input type="file" accept=".xlsx, .xls, .csv" multiple className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-20" onChange={handleFile} />
                                            <div className="border-2 border-dashed border-gray-300 rounded-xl p-10 flex flex-col items-center justify-center text-gray-400 hover:bg-gray-50 hover:border-imac-yellow transition-colors relative z-10 text-center gap-2">
                                                <i className="ph ph-upload-simple text-4xl text-imac-yellow"></i>
                                                <span className="font-bold text-gray-700 text-base">Clique para enviar Ficheiro(s)</span>
                                                <span className="text-xs text-gray-400 font-medium">Suporta: Excel (.xlsx, .xls) e CSV</span>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="rounded-xl p-6 border border-emerald-200 bg-emerald-50 flex flex-col items-center text-center gap-2">
                                            <i className="ph ph-file-xls text-5xl text-emerald-600"></i>
                                            <p className="font-bold text-gray-800">{stats}</p>
                                            {!loading && <button onClick={() => setFileType(null)} className="mt-2 text-xs font-bold text-red-500 hover:underline">Cancelar e escolher outro ficheiro</button>}
                                        </div>
                                    )}
                                    {error && <div className="mt-4 p-3 bg-red-50 text-red-600 text-sm font-bold rounded-lg border border-red-100"><i className="ph ph-warning-circle mr-2"></i>{error}</div>}
                                </>
                            ) : (
                                <div className="space-y-3">
                                    <p className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Pré-visualização — confirme antes de importar:</p>
                                    {preview.products.map((p, idx) => (
                                        <div key={idx} className="border border-gray-200 rounded-xl overflow-hidden">
                                            {/* Header da receita */}
                                            <div className="bg-imac-text text-white px-4 py-3 flex flex-wrap items-center gap-3 justify-between">
                                                <div>
                                                    <span className="font-black text-base">{p.recipeName}</span>
                                                    <div className="flex gap-3 mt-1 flex-wrap">
                                                        {p.yieldKg > 0 && <span className="text-xs font-bold bg-white/15 px-2 py-0.5 rounded"><i className="ph ph-scales mr-1"></i>Rend.: {p.yieldKg} kg</span>}
                                                        {p.unitWeightG > 0 && <span className="text-xs font-bold bg-imac-yellow/80 px-2 py-0.5 rounded">1 un = {p.unitWeightG}{p.unitWeightMeasure}</span>}
                                                        {p.totalUnitsPerBatch > 0 && <span className="text-xs font-bold bg-white/15 px-2 py-0.5 rounded">{p.totalUnitsPerBatch} un/receita</span>}
                                                        {p.unitsPerPackage > 0 && <span className="text-xs font-bold bg-white/15 px-2 py-0.5 rounded">{p.unitsPerPackage} un/pacote</span>}
                                                    </div>
                                                </div>
                                                {Object.keys(p.sectionLoss||{}).length > 0 && (
                                                    <div className="text-right">
                                                        {Object.entries(p.sectionLoss).map(([s,v]) => (
                                                            <div key={s} className="text-xs font-bold text-yellow-300">{s}: {v}% perda</div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                            {/* Ingredientes agrupados por seção */}
                                            <div className="p-3 bg-white">
                                                {[...new Set(p.ingredients.map(i => i.section))].map(sec => (
                                                    <div key={sec} className="mb-2 last:mb-0">
                                                        <div className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1 mb-1">{sec}</div>
                                                        <div className="grid grid-cols-2 gap-1">
                                                            {p.ingredients.filter(i => i.section === sec).map((ing, j) => (
                                                                <div key={j} className="flex justify-between text-xs px-2 py-1 bg-gray-50 rounded-lg border border-gray-100">
                                                                    <span className="font-bold text-gray-700 truncate mr-2">{ing.name}</span>
                                                                    <span className="font-black text-gray-900 whitespace-nowrap">{ing.quantity} {ing.unit}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="p-4 border-t bg-gray-50 flex gap-3">
                            {preview ? (
                                <>
                                    <Button variant="secondary" onClick={() => setPreview(null)} className="flex-1">
                                        <i className="ph ph-arrow-left text-lg"></i> Voltar
                                    </Button>
                                    <Button onClick={() => onProcess(preview)} variant="brand" className="flex-1 h-12 text-base">
                                        <i className="ph ph-check-circle text-xl"></i> Confirmar e Importar {preview.products.length} receita(s)
                                    </Button>
                                </>
                            ) : (
                                <Button onClick={processData} disabled={!fileType || loading} variant="brand" className="w-full h-12 text-base">
                                    {loading ? <><i className="ph ph-spinner animate-spin text-xl"></i> Lendo planilha...</> : <><i className="ph ph-magnifying-glass text-xl"></i> Analisar Planilha</>}
                                </Button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const NavHeader = ({ title, module, onBack }) => (
            <div className="flex items-center justify-between mb-6 pb-4 border-b border-gray-200 no-print">
                <div className="flex items-center gap-4">
                    {onBack && <button onClick={onBack} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><i className="ph ph-caret-left text-2xl text-gray-600"></i></button>}
                    <div>
                        <h2 className="text-2xl font-black text-imac-text leading-none tracking-tight">{title}</h2>
                        {module && <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded mt-1 inline-block ${module === 'prod' ? 'bg-yellow-50 text-imac-yellow' : 'bg-gray-100 text-gray-600'}`}>{module === 'prod' ? 'Módulo Produção' : 'Módulo Custos'}</span>}
                    </div>
                </div>
            </div>
        );

        // --- Configurações Iniciais e Constantes ---
        const INITIAL_PRODUCT = {
            id: null,
            name: '',
            image: null,
            description: '',
            line: 'Geral', 
            outputType: 'kg', 
            outputUnitWeight: 0, 
            outputUnitMeasure: 'g',
            targetMargin: 50, 
            manualSalePrice: 0,
            sections: { "Massa": { processLossPct: 0, tolerancePct: 5 } },
            ingredients: [], 
            laborItems: [],
            machineryItems: [],
            indirectItems: [],
            lastUpdated: new Date().toISOString()
        };

        // --- Main App Component ---
        const App = () => {
            const [view, setView] = useState('catalog_list');
            const [notification, setNotification] = useState(null);

            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);

            // Estados Unificados
            const [catalog, setCatalog] = useState([]);
            const [ingredients, setIngredients] = useState([]);
            const [logs, setLogs] = useState([]);
            const [editingProduct, setEditingProduct] = useState(null);
            const [importDataModalOpen, setImportDataModalOpen] = useState(false);

            const defaultSettingsObj = { 
                logo: null, themeColor: '#dca900', kwhPrice: 0.95,
                lines: ["Padaria", "Confeitaria", "Salgados", "Geral"],
                stages: ["Massa", "Recheio", "Cobertura", "Montagem", "Outros"],
                machines: [{ id: 1, name: 'Forno Elétrico Industrial', powerWatts: 5000 }],
                employees: [{ id: 1, name: 'Confeiteiro Principal', salary: 2500, hoursMonth: 220 }],
                defaultIndirectCosts: [
                    { id: 'def_card', name: 'Taxa de Cartão', cost: 2, type: '%' },
                    { id: 'def_embalagem', name: 'Embalagem Padrão', cost: 1.5, type: 'R$' }
                ]
            };
            
            const [settings, setSettings] = useState(defaultSettingsObj);
            const settingsTimeoutRef = useRef(null);

            const updateSettings = (newSettings) => {
                setSettings(newSettings);
                if (!user) return;
                if (settingsTimeoutRef.current) clearTimeout(settingsTimeoutRef.current);
                settingsTimeoutRef.current = setTimeout(() => {
                    setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'settings'), newSettings);
                }, 1000);
            };

            // Firebase Auth
            useEffect(() => {
                let isMounted = true;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenError) {
                                console.warn("Falha no token customizado, usando login anônimo como fallback:", tokenError);
                                await signInAnonymously(auth).catch(e => console.warn("Fallback anônimo restrito:", e));
                            }
                        } else {
                            await signInAnonymously(auth).catch(e => console.warn("Login anônimo restrito:", e)); 
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (isMounted) {
                        setUser(u);
                        setLoadingAuth(false);
                    }
                });
                return () => {
                    isMounted = false;
                    unsubscribe();
                };
            }, []);

            const handleGoogleLogin = async () => {
                const provider = new GoogleAuthProvider();
                try {
                    setLoadingAuth(true);
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Login error:", error);
                    notify("Erro ao tentar entrar com o Google.");
                    setLoadingAuth(false);
                }
            };

            // Firebase Data Fetching
            useEffect(() => {
                if (!user) return;

                const unsubCat = onSnapshot(collection(dbExpedio, 'artifacts', expedioAppId, 'users', (authExpedio.currentUser ? authExpedio.currentUser.uid : user.uid), 'recipes'),
                    (snapshot) => {
                        const items = [];
                        snapshot.forEach(doc => items.push(doc.data()));
                        setCatalog(items);
                    },
                    (error) => console.error(error)
                );

                const unsubIng = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'ingredients'),
                    (snapshot) => {
                        const items = [];
                        snapshot.forEach(doc => items.push(doc.data()));
                        setIngredients(items);
                    },
                    (error) => console.error(error)
                );

                const unsubLogs = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'logs'),
                    (snapshot) => {
                        const items = [];
                        snapshot.forEach(doc => items.push(doc.data()));
                        setLogs(items);
                    },
                    (error) => console.error(error)
                );

                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'settings'),
                    (docSnap) => {
                        if (docSnap.exists() && !docSnap.metadata.hasPendingWrites) {
                            const data = docSnap.data();
                            setSettings({
                                ...defaultSettingsObj,
                                ...data,
                                lines: data.lines || defaultSettingsObj.lines,
                                stages: data.stages || defaultSettingsObj.stages,
                                machines: data.machines || defaultSettingsObj.machines,
                                employees: data.employees || defaultSettingsObj.employees,
                                defaultIndirectCosts: data.defaultIndirectCosts || defaultSettingsObj.defaultIndirectCosts
                            });
                        }
                    },
                    (error) => console.error(error)
                );

                return () => { unsubCat(); unsubIng(); unsubLogs(); unsubSettings(); };
            }, [user]);

            // Estados Elevados 
            const [editorTab, setEditorTab] = useState('receita'); 
            const [editorIngModalOpen, setEditorIngModalOpen] = useState(false);
            const [editorActiveLinkIdx, setEditorActiveLinkIdx] = useState(null);

            const [invNewIng, setInvNewIng] = useState({ code: '', name: '', price: '', unit: 'kg' });
            const [invSearch, setInvSearch] = useState('');

            const [poSelectedProduct, setPoSelectedProduct] = useState('');
            const [poMode, setPoMode] = useState('batch'); 
            const [poInputValue, setPoInputValue] = useState(1);
            const [poBasisItem, setPoBasisItem] = useState('');

            const [setNewLine, setSetNewLine] = useState('');
            const [setNewStage, setSetNewStage] = useState('');
            const [setNewMachine, setSetNewMachine] = useState({ name: '', powerWatts: '' });
            const [setNewEmployee, setSetNewEmployee] = useState({ name: '', salary: '', hoursMonth: 220 });
            const [setNewIndirect, setSetNewIndirect] = useState({ name: '', cost: '', type: '%' });

            // ── Importação de Custos WinThor (sem instalação) ───────────────
            const [wtPanelOpen, setWtPanelOpen]     = useState(false);
            const [wtSyncing, setWtSyncing]          = useState(false);
            const [wtLastSync, setWtLastSync]        = useState(() => localStorage.getItem('wt_last_sync') || null);
            const [wtSyncResult, setWtSyncResult]    = useState(null);
            const [wtImportStep, setWtImportStep]    = useState('idle'); // idle | preview | done
            const [wtParsed, setWtParsed]            = useState([]);     // linhas parseadas do Excel/colar
            const [wtPasteText, setWtPasteText]      = useState('');
            const wtFileRef = useRef(null);

            // Parseia texto colado ou Excel (TSV/CSV)
            // Colunas do portal: CODIGO | PRODUTO | EMBALAGEM | RENDIMENTO | QTD | QTD/RECEITA | UNIDADE | TIPO | CUSTO | CUSTO RECEITA
            const wtParseText = (raw) => {
                const lines = raw.trim().split('\n').filter(l => l.trim());
                const results = [];
                for (const line of lines) {
                    // Suporta tab (Excel/portal) e vírgula/ponto-e-vírgula
                    const sep = line.includes('\t') ? '\t' : line.includes(';') ? ';' : ',';
                    const cols = line.split(sep).map(c => c.replace(/"/g, '').trim());
                    if (cols.length < 2) continue;
                    // Tenta identificar colunas automaticamente
                    // Formato portal: CODIGO, PRODUTO, EMBALAGEM, RENDIMENTO, QTD, QTD/RECEITA, UNIDADE, TIPO, CUSTO, CUSTO RECEITA
                    const codStr  = cols[0];
                    const cod     = Number(codStr);
                    if (!cod || isNaN(cod)) continue; // pula cabeçalho ou linhas inválidas
                    // Custo pode estar na col 8 (CUSTO) — tenta várias posições
                    let custo = 0;
                    for (let ci = cols.length - 1; ci >= 2; ci--) {
                        const v = parseFloat(String(cols[ci]).replace(',', '.').replace(/[^0-9.]/g, ''));
                        if (v > 0 && v < 100000) { custo = v; break; }
                    }
                    // Coluna CUSTO específica (índice 8 no portal)
                    if (cols[8]) {
                        const v8 = parseFloat(String(cols[8]).replace(',', '.').replace(/[^0-9.]/g, ''));
                        if (v8 > 0) custo = v8;
                    }
                    const nome   = cols[1] || '';
                    const unid   = (cols[6] || cols[2] || 'kg').toLowerCase();
                    if (!nome || custo <= 0) continue;
                    results.push({ codprod: cod, descricao: nome, unidade: unid, custo });
                }
                return results;
            };

            const wtHandleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                    const data = await file.arrayBuffer();
                    const wb   = window.XLSX.read(data, { type: 'array' });
                    const ws   = wb.Sheets[wb.SheetNames[0]];
                    const tsv  = window.XLSX.utils.sheet_to_csv(ws, { FS: '\t' });
                    const rows = wtParseText(tsv);
                    setWtParsed(rows);
                    setWtImportStep(rows.length > 0 ? 'preview' : 'idle');
                    if (rows.length === 0) notify('Nenhuma linha válida encontrada. Verifique o formato.');
                } else {
                    const text = await file.text();
                    const rows = wtParseText(text);
                    setWtParsed(rows);
                    setWtImportStep(rows.length > 0 ? 'preview' : 'idle');
                }
                e.target.value = '';
            };

            const wtHandlePaste = (text) => {
                setWtPasteText(text);
                const rows = wtParseText(text);
                setWtParsed(rows);
                setWtImportStep(rows.length > 0 ? 'preview' : 'idle');
            };

            // Aplica os custos importados nos insumos que têm código correspondente
            const wtApplyImport = async () => {
                if (!wtParsed.length || !user) return;
                setWtSyncing(true);
                try {
                    const mapaWt = {};
                    wtParsed.forEach(p => { mapaWt[String(p.codprod)] = p; });

                    const batch = writeBatch(db);
                    let atualizados = 0;
                    const resultado = [];

                    ingredients.forEach(ing => {
                        const cod = String(ing.code || ing.wt_codprod || '').trim();
                        if (!cod) return;
                        const found = mapaWt[cod];
                        if (!found) { resultado.push({ nome: ing.name, cod, atualizado: false }); return; }
                        const novoPreco = found.custo;
                        batch.set(
                            doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', ing.id),
                            { price: novoPreco, wt_ultimo_custo: novoPreco, wt_ultima_sync: new Date().toISOString() },
                            { merge: true }
                        );
                        setIngredients(prev => prev.map(i => i.id === ing.id ? { ...i, price: novoPreco } : i));
                        atualizados++;
                        resultado.push({ nome: ing.name, cod, custo: novoPreco, atualizado: true });
                    });

                    await batch.commit();
                    const now = new Date().toLocaleString('pt-BR');
                    setWtLastSync(now);
                    localStorage.setItem('wt_last_sync', now);
                    setWtSyncResult({ atualizados, total: resultado.filter(r => r.cod).length, resultado });
                    setWtImportStep('done');
                    notify(`✅ ${atualizados} insumos atualizados com custos do WinThor!`);
                } catch(e) {
                    notify('Erro ao aplicar custos: ' + e.message);
                } finally {
                    setWtSyncing(false);
                }
            };
            // ── Fim Importação WinThor ───────────────────────────────────────

            // Sincronização Segura
            const pLength = editingProduct?.ingredients?.length || 0;
            useEffect(() => {
                if (editingProduct) {
                    const currentSections = Array.from(new Set(editingProduct.ingredients.map(i => i.section || settings?.stages?.[0] || 'Massa')));
                    let changed = false; 
                    const newSecs = { ...editingProduct.sections };
                    currentSections.forEach(s => { 
                        if (!newSecs[s]) { 
                            newSecs[s] = { processLossPct: 0, tolerancePct: 5 }; 
                            changed = true; 
                        } 
                    });
                    if (changed) {
                        setEditingProduct(prev => ({ ...prev, sections: newSecs }));
                    }
                }
            }, [pLength, settings?.stages]); 

            const notify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };

            const handleGuestLogin = async () => {
                try {
                    setLoadingAuth(true);
                    await signInAnonymously(auth);
                } catch (error) {
                    console.error("Login convidado error:", error);
                    if (error.code === 'auth/admin-restricted-operation') {
                        notify("O login anônimo está desativado no Firebase. Faça login com o Google.");
                    } else {
                        notify("Erro ao tentar entrar como convidado.");
                    }
                    setLoadingAuth(false);
                }
            };

            // ==========================================
            // MOTOR DE CÁLCULO UNIFICADO 
            // ==========================================
            const calculateProductData = (prod) => {
                let grandTotalGrossKg = 0;
                let grandTotalNetKg = 0;
                let directCost = 0;

                const sectionsData = {};
                (prod.ingredients || []).forEach(ing => {
                    const sec = ing.section || "Geral";
                    if (!sectionsData[sec]) sectionsData[sec] = { ings: [], grossKg: 0 };
                    sectionsData[sec].ings.push(ing);
                    
                    const qty = safeVal(ing.qty) + safeVal(ing.fixedQty); 
                    const kgQty = toKg(qty, ing.unit);
                    
                    if (!isPackaging(ing.name)) {
                        sectionsData[sec].grossKg += kgQty;
                        grandTotalGrossKg += kgQty;
                    }

                    let price = safeVal(ing.cost);
                    let invUnit = ing.unit;
                    if (ing.ingredientId) {
                        const invItem = ingredients.find(i => i.id === ing.ingredientId);
                        if (invItem) { price = safeVal(invItem.price); invUnit = invItem.unit; }
                    }

                    let costMultiplier = qty;
                    if ((ing.unit === 'g' || ing.unit === 'ml') && (invUnit === 'kg' || invUnit === 'l')) {
                        costMultiplier = qty / 1000;
                    }
                    
                    directCost += (costMultiplier * price);
                });

                Object.keys(sectionsData).forEach(secName => {
                    const lossPct = prod.sections?.[secName]?.processLossPct || 0;
                    const netKg = sectionsData[secName].grossKg * (1 - (lossPct / 100));
                    sectionsData[secName].netKg = netKg;
                    grandTotalNetKg += netKg;
                });

                const finalYieldKg = grandTotalNetKg > 0 ? grandTotalNetKg : (safeVal(prod.yieldUnit) || 1);

                let laborCost = 0;
                (prod.laborItems || []).forEach(l => {
                    const emp = (settings?.employees || []).find(e => e.id == l.employeeId);
                    if (emp) {
                        const costPerMin = emp.salary / (emp.hoursMonth * 60);
                        laborCost += (costPerMin * safeVal(l.minutes));
                    }
                });

                let machineryCost = 0;
                (prod.machineryItems || []).forEach(m => {
                    const mach = (settings?.machines || []).find(x => x.id == m.machineId);
                    if (mach) {
                        machineryCost += ((mach.powerWatts / 1000) * (safeVal(m.timeMinutes) / 60) * (settings?.kwhPrice || 0));
                    }
                });

                const subtotalForIndirects = directCost + laborCost + machineryCost;
                let indirectCost = 0;
                
                (prod.indirectItems || []).forEach(i => {
                    const val = safeVal(i.cost);
                    if (i.type === '%') {
                        indirectCost += subtotalForIndirects * (val / 100);
                    } else {
                        indirectCost += val;
                    }
                });

                const totalCost = subtotalForIndirects + indirectCost;
                const costPerKg = finalYieldKg > 0 ? totalCost / finalYieldKg : 0;

                let totalUnits = 1; 
                let unitCost = costPerKg;
                if (prod.outputType === 'unit' && safeVal(prod.outputUnitWeight) > 0) {
                    const unitWeightKg = toKg(prod.outputUnitWeight, prod.outputUnitMeasure || 'g');
                    totalUnits = Math.floor(finalYieldKg / unitWeightKg);
                    unitCost = totalUnits > 0 ? totalCost / totalUnits : 0;
                }

                const marginDecimal = (prod.targetMargin || 0) / 100;
                const baseCostForPricing = prod.outputType === 'unit' ? unitCost : costPerKg;
                
                const suggestedPrice = marginDecimal < 1 ? baseCostForPricing / (1 - marginDecimal) : 0;
                const salePrice = safeVal(prod.manualSalePrice) || suggestedPrice;
                
                const grossProfit = salePrice - baseCostForPricing;
                const marginPercent = salePrice > 0 ? (grossProfit / salePrice) * 100 : 0;

                return {
                    finalYieldKg, grandTotalGrossKg,
                    directCost, laborCost, machineryCost, indirectCost, totalCost,
                    costPerKg, unitCost, totalUnits,
                    suggestedPrice, salePrice, grossProfit, marginPercent,
                    baseCostForPricing
                };
            };

            const handleProcessImportedData = async (data) => {
                const productsToProcess = data.products || (data.recipeName ? [data] : []);
                let countImported = 0;
                const finalIngredientsList = [...ingredients];
                
                productsToProcess.forEach(prodData => {
                    (prodData.ingredients || []).forEach(ing => {
                        if (!ing.name) return;
                        // Vincula ao estoque: busca por nome (case-insensitive) ou cria novo
                        let invItem = finalIngredientsList.find(i =>
                            i.name.toLowerCase().trim() === ing.name.toLowerCase().trim()
                        );
                        if (!invItem) {
                            invItem = { id: generateId(), code: '', name: ing.name, price: safeVal(ing.unitPrice), unit: ing.unit || 'kg' };
                            finalIngredientsList.push(invItem);
                        } else if (safeVal(ing.unitPrice) > 0) {
                            invItem.price = safeVal(ing.unitPrice);
                        }
                        ing.ingredientId = invItem.id;
                    });
                });

                const newProducts = [];
                productsToProcess.forEach(prodData => {
                    // ── Monta seções com % de perda do Excel ──────────────
                    // prodData.sectionLoss = { MASSA: 25.0, RECHEIO: 28.9 }
                    const sectionLoss = prodData.sectionLoss || {};
                    // Mapeia seções reais usadas nos ingredientes
                    const usedSections = [...new Set((prodData.ingredients || []).map(i => i.section || 'MASSA'))];
                    const sectionsObj = {};
                    usedSections.forEach(s => {
                        // Procura perda pelo nome da seção (ex: "MASSA" ou "RECHEIO")
                        const lossKey = Object.keys(sectionLoss).find(k =>
                            s.toUpperCase().includes(k) || k.includes(s.toUpperCase())
                        );
                        sectionsObj[s] = {
                            processLossPct: lossKey ? sectionLoss[lossKey] : 0,
                            tolerancePct: 5
                        };
                    });

                    // ── Formato de saída: unidade ou kg ───────────────────
                    const hasUnitWeight = (prodData.unitWeightG || 0) > 0;
                    const outputType    = hasUnitWeight ? 'unit' : 'kg';
                    const outputWeight  = prodData.unitWeightG || 0;
                    const outputMeasure = prodData.unitWeightMeasure || 'g';

                    // ── Ingredientes ligados ao estoque ───────────────────
                    const recipeIngs = (prodData.ingredients || []).map(ing => ({
                        id:           generateId(),
                        name:         ing.name,
                        qty:          safeVal(ing.quantity),
                        unit:         ing.unit || 'kg',
                        cost:         safeVal(ing.unitPrice),
                        section:      ing.section || usedSections[0] || 'MASSA',
                        fixedQty:     0,
                        ingredientId: ing.ingredientId,
                    })).filter(i => i.name);

                    const defaults = (settings?.defaultIndirectCosts || []).map(d => ({ ...d, id: generateId() }));

                    // ── Monta descrição rica com info de pacote ───────────
                    let desc = '';
                    if (prodData.packWeightKg)     desc += `Peso por pacote: ${prodData.packWeightKg} kg | `;
                    if (prodData.unitsPerPackage)  desc += `${prodData.unitsPerPackage} un/pacote | `;
                    if (prodData.packagesPerBatch) desc += `${prodData.packagesPerBatch} pacotes/receita`;
                    if (prodData.totalUnitsPerBatch) desc += ` = ${prodData.totalUnitsPerBatch} unidades`;

                    newProducts.push({
                        ...INITIAL_PRODUCT,
                        id:               generateId(),
                        name:             prodData.recipeName || 'Receita Importada',
                        description:      desc.trim(),
                        outputType,
                        outputUnitWeight: outputWeight,
                        outputUnitMeasure: outputMeasure,
                        yieldUnit:        prodData.yieldKg || 1,
                        sections:         Object.keys(sectionsObj).length > 0 ? sectionsObj : INITIAL_PRODUCT.sections,
                        ingredients:      recipeIngs,
                        indirectItems:    defaults,
                        // campos extras para referência
                        packWeightKg:        prodData.packWeightKg || 0,
                        unitsPerPackage:     prodData.unitsPerPackage || 0,
                        packagesPerBatch:    prodData.packagesPerBatch || 0,
                        totalUnitsPerBatch:  prodData.totalUnitsPerBatch || 0,
                        lastUpdated:         new Date().toISOString(),
                    });
                });

                countImported = newProducts.length;

                if (user) {
                    try {
                        const expedioUid = authExpedio.currentUser ? authExpedio.currentUser.uid : user.uid;
                        // Receitas → dbExpedio (mesmo Firebase onde o catálogo é lido)
                        const batchRecipes = writeBatch(dbExpedio);
                        newProducts.forEach(p => batchRecipes.set(
                            doc(dbExpedio, 'artifacts', expedioAppId, 'users', expedioUid, 'recipes', p.id), p
                        ));
                        await batchRecipes.commit();

                        // Insumos → db principal
                        const batchIngs = writeBatch(db);
                        finalIngredientsList.forEach(ing => batchIngs.set(
                            doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', ing.id), ing, { merge: true }
                        ));
                        await batchIngs.commit();
                    } catch (e) {
                        console.error("Batch write error:", e);
                        notify("Erro ao salvar no Firebase: " + e.message);
                    }
                }

                setImportDataModalOpen(false);
                
                setTimeout(() => {
                    if (countImported === 1) {
                        setEditingProduct(newProducts[0]);
                        setEditorTab('receita');
                        setView('catalog_editor');
                    } else {
                        setView('catalog_list');
                    }
                    notify(`${countImported} receita(s) importada(s) com sucesso!`);
                }, 50);
            };

            // ==========================================
            // COMPONENTES DE VISTA
            // ==========================================

            const renderLogin = () => (

                        </div>
                        <h1 className="text-2xl font-black text-imac-text tracking-tight mb-2">Fichas Técnicas / Custos</h1>

                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>

            const renderDashboard = () => (
                <div className="max-w-6xl mx-auto space-y-6 animate-fade-in pb-20">
                    <NavHeader title="Visão Geral do Sistema" />
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="p-6 border-l-4 border-imac-yellow hover:shadow-md transition-all cursor-pointer hover:-translate-y-1 group" onClick={() => setView('catalog_list')}>
                            <div className="flex items-center gap-4">

                        <Card className="p-6 border-l-4 border-gray-800 hover:shadow-md transition-all cursor-pointer hover:-translate-y-1 group" onClick={() => setView('inventory')}>

                            <Button onClick={() => {

                    </div>

                <div className="hidden print:block w-full bg-white text-black p-4 font-sans max-w-4xl mx-auto">

                        </div>

                            <div><p className="text-[10px] uppercase font-bold text-gray-500 tracking-wider">Rendimento do Lote</p><p className="font-black text-imac-yellow text-xl">{t.finalYieldKg.toFixed(3)} kg</p></div>
                            <div><p className="text-[10px] uppercase font-bold text-gray-500 tracking-wider">Formato de Venda</p><p className="font-bold text-lg text-gray-800">{p.outputType === 'unit' ? `Unidade (${p.outputUnitWeight}${p.outputUnitMeasure})` : 'Quilo (kg)'}</p></div>
                        </div>
                        {p.image ? (

                    </div>

                            <tr><th className="p-3 border-b border-gray-200">Etapa de Processo</th><th className="p-3 border-b border-gray-200">Descrição do Insumo</th><th className="p-3 border-b border-gray-200 text-center">Quant.</th><th className="p-3 border-b border-gray-200 text-right">Custo Base</th></tr>

                        <tbody className="divide-y divide-gray-100">
                            {p.ingredients.map((ing, i) => (

                            </div>
                        </div>
                        <div>
                            <h3 className="font-black text-lg mb-4 uppercase tracking-widest text-gray-800">Precificação Estratégica</h3>

                                <div className="flex justify-between items-center mb-4"><span className="text-xs font-bold uppercase tracking-widest text-gray-400">Markup Alvo</span><span className="font-black text-xl">{p.targetMargin}%</span></div>
                                <div className="flex justify-between items-center mb-5"><span className="text-xs font-bold uppercase tracking-widest text-gray-400">Custo Base ({p.outputType==='unit'?'Un':'Kg'})</span><span className="font-black text-2xl text-gray-200">R$ {formatMoney(t.baseCostForPricing)}</span></div>
                                <div className="flex justify-between items-center border-t border-gray-700 pt-5"><span className="text-sm font-black uppercase tracking-widest text-emerald-400">Preço Sugerido</span><span className="font-black text-4xl text-emerald-400">R$ {formatMoney(t.suggestedPrice)}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderCatalogEditor = () => {
                if (!editingProduct) return <div className="p-10 text-center text-gray-500"><i className="ph ph-spinner animate-spin text-3xl mx-auto mb-4"></i>A carregar editor...</div>;
                const p = editingProduct;
                const t = calculateProductData(p);
                const activeSections = Array.from(new Set(p.ingredients.map(i => i.section || settings?.stages?.[0] || 'Massa')));

                const updateField = (f, v) => setEditingProduct({ ...p, [f]: v });
                const updateIng = (idx, f, v) => { const newIngs = [...p.ingredients]; newIngs[idx][f] = v; setEditingProduct({ ...p, ingredients: newIngs }); };
                const addIng = (sec) => setEditingProduct({ ...p, ingredients: [...p.ingredients, { id: generateId(), name: '', qty: 0, unit: 'g', cost: 0, section: sec, fixedQty: 0, ingredientId: null }] });
                const removeIng = (idx) => setEditingProduct({ ...p, ingredients: p.ingredients.filter((_, i) => i !== idx) });
                
                const updateSection = (secName, field, value) => {
                    const newSecs = { ...p.sections, [secName]: { ...p.sections[secName], [field]: value } };
                    setEditingProduct({ ...p, sections: newSecs });
                };

                const handleLink = (ing) => {
                    if (editorActiveLinkIdx !== null) {
                        updateIng(editorActiveLinkIdx, 'name', ing.name);
                        updateIng(editorActiveLinkIdx, 'unit', ing.unit);
                        updateIng(editorActiveLinkIdx, 'ingredientId', ing.id);
                        updateIng(editorActiveLinkIdx, 'cost', ing.price);
                    }
                    setEditorIngModalOpen(false); setEditorActiveLinkIdx(null);
                };

                const handleUnlink = (idx) => updateIng(idx, 'ingredientId', null);
                const getIngCostDisplay = (ing) => { if (ing.ingredientId) { const inv = ingredients.find(i => i.id === ing.ingredientId); if (inv) return inv.price; } return ing.cost; };

                const handleProductImageUpload = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        const base64Img = await compressImage(file, 600);
                        updateField('image', base64Img);
                    } catch (err) {
                        notify("Erro ao carregar a imagem.");
                    }
                };

                const handleSave = async () => {
                    if (!p.name) return notify("Nome do produto é obrigatório.");
                    if (!p.id) p.id = generateId();
                    p.lastUpdated = new Date().toISOString();
                    
                    if (user) {
                        await setDoc(doc(dbExpedio, 'artifacts', expedioAppId, 'users', (authExpedio.currentUser ? authExpedio.currentUser.uid : user.uid), 'recipes', p.id), p);
                    }
                    
                    setView('catalog_list'); notify("Produto salvo com sucesso!");
                };

                return (
                    <div className="max-w-6xl mx-auto animate-slide-in pb-32">
                        <PrintTechSheet product={p} calc={t} settings={settings} />

                        <div className="print:hidden">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setView('catalog_list')} className="p-2 bg-white border border-gray-200 hover:bg-gray-50 rounded-xl transition-colors shadow-sm"><i className="ph ph-caret-left text-xl text-gray-600"></i></button>
                                    <div>
                                        <h2 className="text-2xl font-black text-imac-text leading-none tracking-tight">Editor de Ficha</h2>
                                        <p className="text-xs text-gray-500 font-bold uppercase tracking-widest mt-1">Ref: {p.id ? p.id.slice(-6).toUpperCase() : 'NOVO'}</p>
                                    </div>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto overflow-x-auto">
                                    <Button variant="outline" onClick={() => window.print()} className="bg-white whitespace-nowrap"><i className="ph ph-printer text-lg"></i> Imprimir Ficha</Button>
                                    <Button variant="brand" onClick={handleSave} className="whitespace-nowrap w-full md:w-auto"><i className="ph ph-floppy-disk text-lg"></i> Guardar e Voltar</Button>
                                </div>
                            </div>

                            {/* Cabeçalho do Produto com Imagem */}
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6 flex flex-col md:flex-row gap-6">
                                <div className="flex-shrink-0 w-full md:w-48 h-48 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center overflow-hidden relative group cursor-pointer transition-colors hover:border-imac-yellow hover:bg-yellow-50 z-0">
                                    <input type="file" accept="image/*" onChange={handleProductImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20"/>
                                    {p.image ? (
                                        <>
                                            <img src={p.image} className="w-full h-full object-cover relative z-0" />
                                            <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity z-10">
                                                <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); updateField('image', null); }} className="text-white bg-red-500 p-2 rounded-full relative z-30 hover:bg-red-600 transition-colors shadow-lg"><i className="ph ph-trash text-lg"></i></button>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex flex-col items-center text-gray-400 group-hover:text-imac-yellow transition-colors relative z-0"><i className="ph ph-image text-3xl mb-2"></i><span className="text-xs font-bold uppercase tracking-widest text-center px-4">Adicionar Foto</span></div>
                                    )}
                                </div>

                                <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-5 content-start">
                                    <div className="md:col-span-2"><label className="block text-xs font-bold text-gray-500 uppercase mb-1.5">Nome do Produto</label><input type="text" value={p.name} onChange={e => updateField('name', e.target.value)} className="w-full p-3 border border-gray-300 rounded-xl outline-none font-black text-gray-800 focus:border-imac-yellow focus:ring-1 focus:ring-yellow-400 transition-all text-lg" placeholder="Ex: Pão Francês Tradicional" /></div>
                                    <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1.5">Linha / Categoria</label><SearchableSelect options={settings?.lines || []} value={p.category} onChange={(val) => updateField('category', val)} /></div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1.5">Formato de Venda</label>
                                        <select value={p.outputType} onChange={e => updateField('outputType', e.target.value)} className="w-full p-3 border border-gray-300 rounded-xl outline-none focus:border-imac-yellow bg-white text-sm font-bold text-gray-800 transition-all">
                                            <option value="kg">Por Kg (Granel)</option>
                                            <option value="unit">Por Unidade / Pacote</option>
                                        </select>
                                    </div>
                                    {p.outputType === 'unit' && (
                                        <div className="md:col-span-2 bg-yellow-50/50 p-4 rounded-xl border border-yellow-100 flex items-center gap-4 animate-fade-in mt-2">
                                            <div className="p-2 bg-white rounded-lg shadow-sm border border-yellow-100"><i className="ph ph-info text-xl text-imac-yellow"></i></div>
                                            <div className="flex-1">
                                                <label className="block text-xs font-bold text-yellow-800 uppercase mb-2">Peso exato de 1 Unidade para venda</label>
                                                <div className="flex items-center gap-3">
                                                    <input type="number" step="0.001" value={p.outputUnitWeight} onChange={e => updateField('outputUnitWeight', e.target.value)} className="w-32 p-3 border border-yellow-200 rounded-xl font-bold text-gray-800 outline-none focus:border-imac-yellow" placeholder="Ex: 50" />
                                                    <select value={p.outputUnitMeasure} onChange={e => updateField('outputUnitMeasure', e.target.value)} className="p-3 border border-yellow-200 rounded-xl bg-white text-sm font-bold outline-none focus:border-imac-yellow"><option value="g">gramas (g)</option><option value="kg">quilos (kg)</option></select>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Abas Navegação */}
                            <div className="flex overflow-x-auto border-b border-gray-200 mb-6 gap-2 no-print pb-px custom-scroll">
