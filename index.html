                                                <h3 className="font-bold text-stone-800 flex items-center gap-3 text-lg"><div className="w-1.5 h-6 bg-brand-orange rounded-full"></div> {secName}</h3>
                                                <div className="flex items-center gap-4 bg-white px-4 py-2 rounded-xl border border-stone-200 shadow-sm">
                                                    <span className="text-xs font-bold uppercase text-stone-500 tracking-wider">Perda (Evaporação/Quebra)</span>
                                                    <div className="flex items-center gap-1">
                                                        <input type="number" className="w-16 text-right font-black text-red-500 outline-none bg-red-50 p-1 rounded" value={secLoss} onChange={e => updateSection(secName, 'processLossPct', Number(e.target.value))} />
                                                        <span className="text-sm font-bold text-red-500">%</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-5 space-y-3">
                                                <div className="hidden md:flex gap-3 px-3 text-[10px] font-bold text-stone-400 uppercase tracking-widest border-b border-stone-100 pb-2">
                                                    <div className="flex-1">Ingrediente Base</div><div className="w-24 text-center">Quant.</div><div className="w-16 text-center">Medida</div><div className="w-24 text-center" title="Qtd Fixa Setup">Fixo/Setup*</div><div className="w-32 text-right">Custo Unitário</div><div className="w-10"></div>
                                                </div>
                                                {secIngs.map((ing) => {
                                                    const idx = ing.originalIdx;
                                                    const isLinked = !!ing.ingredientId;
                                                    return (
                                                        <div key={idx} className={`flex flex-wrap md:flex-nowrap gap-3 items-center p-2.5 rounded-xl border transition-all ${isLinked ? 'bg-orange-50/30 border-orange-200 shadow-sm' : 'bg-white hover:bg-stone-50 border-stone-100'}`}>
                                                            <div className="flex-1 flex items-center gap-2 w-full md:w-auto">
                                                                <button onClick={() => { if(isLinked) handleUnlink(idx); else { setEditorActiveLinkIdx(idx); setEditorIngModalOpen(true); } }} className={`p-2 rounded-lg transition-colors ${isLinked ? 'text-brand-orange bg-orange-100' : 'text-stone-400 bg-stone-100 hover:bg-stone-200'}`} title={isLinked ? "Desvincular" : "Vincular ao Estoque Central"}>
                                                                    {isLinked ? <LinkIcon size={16}/> : <Unlink size={16}/>}
                                                                </button>
                                                                <input placeholder="Nome do Ingrediente..." value={ing.name} onChange={e => updateIng(idx, 'name', e.target.value)} className="w-full bg-transparent border-none outline-none font-medium text-sm text-stone-800 placeholder:text-stone-300" readOnly={isLinked} />
                                                            </div>
                                                            <div className="w-1/3 md:w-24"><input type="number" step="any" placeholder="Qtd" value={ing.qty} onChange={e => updateIng(idx, 'qty', e.target.value)} className="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm text-center font-bold text-stone-800 outline-none focus:border-brand-orange" /></div>
                                                            <div className="w-1/3 md:w-16"><select value={ing.unit} onChange={e => updateIng(idx, 'unit', e.target.value)} className="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm text-center font-medium outline-none" disabled={isLinked}><option value="g">g</option><option value="kg">kg</option><option value="ml">ml</option><option value="l">L</option><option value="un">un</option></select></div>
                                                            <div className="w-1/3 md:w-24"><input type="number" step="any" placeholder="Fixo" value={ing.fixedQty||''} onChange={e => updateIng(idx, 'fixedQty', e.target.value)} className="w-full p-2.5 bg-blue-50/50 border border-blue-200 rounded-lg text-sm text-center text-blue-700 font-medium outline-none" title="Quantidade que não se multiplica ao fazer mais lotes" /></div>
                                                            <div className="w-full md:w-32 relative flex items-center">
                                                                <span className="absolute left-3 text-xs font-bold text-stone-400">R$</span>
                                                                <input type="number" step="any" className={`w-full p-2.5 pl-8 border rounded-lg text-sm text-right font-black outline-none ${isLinked ? 'bg-orange-100/50 text-stone-600 border-orange-200' : 'bg-white border-stone-200 focus:border-brand-orange'}`} value={getIngCostDisplay(ing)} onChange={e => updateIng(idx, 'cost', e.target.value)} readOnly={isLinked} />
                                                            </div>
                                                            <button onClick={() => removeIng(idx)} className="text-stone-300 hover:text-red-500 p-2.5 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={18}/></button>
                                                        </div>
                                                    )
                                                })}
                                                <Button variant="outline" onClick={() => addIng(secName)} className="mt-4 text-stone-600 w-full border-dashed border-2 py-3"><Plus size={16}/> Adicionar Ingrediente em {secName}</Button>
                                            </div>
                                        </div>
                                    )
                                })}

                                <div className="bg-stone-50 p-6 border-2 border-dashed border-stone-200 rounded-2xl text-center no-print">
                                    <span className="block text-sm text-stone-600 font-bold mb-4 uppercase tracking-wider">Criar Nova Etapa de Produção:</span>
                                    <div className="inline-flex flex-wrap gap-2 justify-center">
                                        {(settings?.stages || []).map(s => <button key={s} onClick={() => addIng(s)} className="px-4 py-2 bg-white border shadow-sm rounded-xl text-xs font-bold text-stone-700 hover:border-brand-orange hover:text-brand-orange transition-all">+ {s}</button>)}
                                    </div>
                                </div>
                            </div>

                            {/* ABA 2: CUSTOS ADICIONAIS */}
                            <div className={`space-y-6 ${editorTab==='custos' ? 'block animate-fadeIn' : 'hidden'}`}>
                                {/* Mão de Obra */}
                                <Card className="overflow-hidden border-0 shadow-md">
                                    <div className="px-6 py-4 bg-stone-800 text-white flex items-center gap-3"><Clock size={20}/><h3 className="font-bold text-lg">Mão de Obra Operacional</h3></div>
                                    <div className="p-6 space-y-3 bg-stone-50/30">
                                        {p.laborItems?.map(l => {
                                            const emp = (settings?.employees || []).find(e => e.id == l.employeeId);
                                            return (
                                                <div key={l.id} className="flex gap-3 items-center bg-white border border-stone-200 p-3 rounded-xl shadow-sm">
                                                    <div className="flex-1 font-bold text-sm text-stone-800 pl-2">{emp?.name || 'Desconhecido'}</div>
                                                    <div className="flex items-center gap-2 bg-stone-50 px-4 py-2 rounded-lg border border-stone-200">
                                                        <input type="number" className="w-16 bg-transparent text-right outline-none font-black text-stone-800" value={l.minutes} onChange={e => { const nl = p.laborItems.map(x=>x.id===l.id?{...x,minutes:e.target.value}:x); updateField('laborItems', nl); }}/> 
                                                        <span className="text-xs font-bold text-stone-500 uppercase">minutos</span>
                                                    </div>
                                                    <button onClick={() => { const nl = p.laborItems.filter(x=>x.id!==l.id); updateField('laborItems', nl); }} className="p-3 text-stone-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={18}/></button>
                                                </div>
                                            )
                                        })}
                                        <div className="flex flex-col sm:flex-row gap-3 mt-4 bg-stone-100 p-4 rounded-xl border border-stone-200 border-dashed">
                                            <select id="newLaborEmp" className="flex-1 p-3 bg-white border border-stone-200 rounded-xl text-sm font-medium outline-none"><option value="">Selecionar Profissional...</option>{(settings?.employees || []).map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</select>
                                            <div className="flex gap-3">
                                                <input id="newLaborMin" type="number" placeholder="Minutos" className="w-32 p-3 bg-white border border-stone-200 rounded-xl text-sm text-center outline-none font-bold"/>
                                                <Button onClick={() => { 
                                                    const empId = document.getElementById('newLaborEmp').value; const min = document.getElementById('newLaborMin').value;
                                                    if(empId && min) { updateField('laborItems', [...(p.laborItems||[]), {id:generateId(), employeeId: empId, minutes: Number(min)}]); document.getElementById('newLaborEmp').value=''; document.getElementById('newLaborMin').value='';}
                                                }} variant="secondary" className="px-6">Adicionar</Button>
                                            </div>
                                        </div>
                                    </div>
                                </Card>

                                {/* Energia */}
                                <Card className="overflow-hidden border-0 shadow-md">
                                    <div className="px-6 py-4 bg-yellow-500 text-yellow-950 flex items-center gap-3"><Zap size={20}/><h3 className="font-bold text-lg">Maquinário & Energia</h3></div>
                                    <div className="p-6 space-y-3 bg-stone-50/30">
                                        {p.machineryItems?.map(m => {
                                            return (
                                                <div key={m.id} className="flex gap-3 items-center bg-white border border-stone-200 p-3 rounded-xl shadow-sm">
                                                    <select className="flex-1 p-2 text-sm font-bold text-stone-800 border-none bg-transparent outline-none" value={m.machineId} onChange={e => { const nm = p.machineryItems.map(x=>x.id===m.id?{...x,machineId:e.target.value}:x); updateField('machineryItems', nm); }}>{(settings?.machines || []).map(sm => <option key={sm.id} value={sm.id}>{sm.name}</option>)}</select>
                                                    <div className="flex items-center gap-2 bg-stone-50 px-4 py-2 rounded-lg border border-stone-200">
                                                        <input type="number" className="w-16 bg-transparent text-right outline-none font-black text-stone-800" value={m.timeMinutes} onChange={e => { const nm = p.machineryItems.map(x=>x.id===m.id?{...x,timeMinutes:e.target.value}:x); updateField('machineryItems', nm); }}/> 
                                                        <span className="text-xs font-bold text-stone-500 uppercase">minutos</span>
                                                    </div>
                                                    <button onClick={() => { const nm = p.machineryItems.filter(x=>x.id!==m.id); updateField('machineryItems', nm); }} className="p-3 text-stone-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={18}/></button>
                                                </div>
                                            )
                                        })}
                                        <Button onClick={() => updateField('machineryItems', [...(p.machineryItems||[]), {id:generateId(), machineId: settings?.machines?.[0]?.id, timeMinutes: 60}])} variant="outline" className="w-full border-dashed border-2 py-3 mt-4 text-stone-600"><Plus size={16}/> Adicionar Uso de Máquina</Button>
                                    </div>
                                </Card>

                                {/* Indiretos */}
                                <Card className="overflow-hidden border-0 shadow-md">
                                    <div className="px-6 py-4 bg-brand-orange text-white flex items-center gap-3"><Coins size={20}/><h3 className="font-bold text-lg">Custos Indiretos / Taxas / Embalagens</h3></div>
                                    <div className="p-6 space-y-3 bg-stone-50/30">
                                        <p className="text-xs font-medium text-stone-500 mb-4 bg-stone-100 p-3 rounded-lg border border-stone-200">Nota: Os itens importados das configurações padrão podem ser editados livremente apenas para esta ficha.</p>
                                        {p.indirectItems?.map(ind => (
                                            <div key={ind.id} className="flex gap-3 items-center bg-white border border-stone-200 p-3 rounded-xl shadow-sm">
                                                <input type="text" placeholder="Descrição do Custo..." value={ind.name} onChange={e => { const ni = p.indirectItems.map(x=>x.id===ind.id?{...x,name:e.target.value}:x); updateField('indirectItems', ni); }} className="flex-1 text-sm font-bold text-stone-800 outline-none pl-2 border-none bg-transparent"/>
                                                <div className="flex items-center bg-stone-50 rounded-lg border border-stone-200 overflow-hidden">
                                                    <select value={ind.type || 'R$'} onChange={e => { const ni = p.indirectItems.map(x=>x.id===ind.id?{...x,type:e.target.value}:x); updateField('indirectItems', ni); }} className="p-3 bg-stone-100 text-xs font-black text-stone-600 outline-none border-r border-stone-200 cursor-pointer">
                                                        <option value="R$">R$</option>
                                                        <option value="%">%</option>
                                                    </select>
                                                    <input type="number" step="0.01" className="w-24 bg-transparent text-right outline-none font-black text-stone-800 p-3" value={ind.cost} onChange={e => { const ni = p.indirectItems.map(x=>x.id===ind.id?{...x,cost:e.target.value}:x); updateField('indirectItems', ni); }}/>
                                                </div>
                                                <button onClick={() => { const ni = p.indirectItems.filter(x=>x.id!==ind.id); updateField('indirectItems', ni); }} className="p-3 text-stone-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={18}/></button>
                                            </div>
                                        ))}
                                        <Button onClick={() => updateField('indirectItems', [...(p.indirectItems||[]), {id:generateId(), name:'', cost:0, type: 'R$'}])} variant="outline" className="w-full border-dashed border-2 py-3 mt-4 text-stone-600"><Plus size={16}/> Adicionar Novo Custo Indireto</Button>
                                    </div>
                                </Card>
                            </div>

                            {/* ABA 3: PRECIFICAÇÃO */}
                            <div className={`space-y-6 ${editorTab==='precificacao' ? 'block animate-fadeIn' : 'hidden'}`}>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="space-y-8">
                                        <Card className="p-6 border-t-4 border-stone-800 shadow-md">
                                            <h3 className="font-black text-stone-900 border-b border-stone-100 pb-4 mb-5 uppercase text-sm tracking-widest">Estrutura de Custos (1 Lote)</h3>
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-center p-3 bg-stone-50 rounded-lg border border-stone-100"><span className="text-sm font-bold text-stone-600 flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-brand-orange"></div> Matéria Prima</span><span className="font-black text-stone-800">R$ {formatMoney(t.directCost)}</span></div>
                                                <div className="flex justify-between items-center p-3 bg-stone-50 rounded-lg border border-stone-100"><span className="text-sm font-bold text-stone-600 flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-stone-800"></div> Mão de Obra</span><span className="font-black text-stone-800">R$ {formatMoney(t.laborCost)}</span></div>
                                                <div className="flex justify-between items-center p-3 bg-stone-50 rounded-lg border border-stone-100"><span className="text-sm font-bold text-stone-600 flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-yellow-500"></div> Energia / Máquinas</span><span className="font-black text-stone-800">R$ {formatMoney(t.machineryCost)}</span></div>
                                                <div className="flex justify-between items-center p-3 bg-stone-50 rounded-lg border border-stone-100"><span className="text-sm font-bold text-stone-600 flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-purple-500"></div> Indiretos & Taxas</span><span className="font-black text-stone-800">R$ {formatMoney(t.indirectCost)}</span></div>
                                            </div>
                                            <div className="mt-6 p-4 bg-stone-900 rounded-xl flex justify-between items-center shadow-inner">
                                                <span className="font-bold text-stone-300 uppercase tracking-widest text-xs">Custo Total do Lote</span>
                                                <span className="font-black text-2xl text-white">R$ {formatMoney(t.totalCost)}</span>
                                            </div>
                                        </Card>

                                        <Card className="p-6 bg-gradient-to-br from-stone-50 to-stone-100 border-stone-200 shadow-md">
                                            <h3 className="font-black text-stone-800 border-b border-stone-200 pb-4 mb-5 uppercase text-sm tracking-widest">Rendimento Técnico</h3>
                                            <div className="space-y-5">
                                                <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-stone-200 shadow-sm">
                                                    <div><span className="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-1">Massa Bruta (Entrada)</span><span className="font-black text-xl text-stone-700">{t.grandTotalGrossKg.toFixed(3)} <span className="text-sm font-bold text-stone-400">kg</span></span></div>
                                                    <div className="bg-stone-100 p-2 rounded-full"><ArrowRight className="text-stone-400" size={20}/></div>
                                                    <div className="text-right"><span className="block text-[10px] font-bold text-brand-orange uppercase tracking-wider mb-1">Final (Após Quebras)</span><span className="font-black text-2xl text-stone-900">{t.finalYieldKg.toFixed(3)} <span className="text-sm font-bold text-brand-orange">kg</span></span></div>
                                                </div>
                                                
                                                <div className="bg-white p-5 rounded-xl border-l-4 border-l-emerald-500 shadow-sm">
                                                    <span className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">Custo Base ({p.outputType === 'unit' ? 'Por Unidade' : 'Por Quilo'})</span>
                                                    <span className="block font-black text-4xl text-emerald-600">R$ {formatMoney(t.baseCostForPricing)}</span>
                                                </div>

                                                {p.outputType === 'unit' && (
                                                    <div className="flex justify-between text-sm font-bold text-stone-500 px-2">
                                                        <span>Peso Ref: {p.outputUnitWeight}{p.outputUnitMeasure}</span>
                                                        <span>1 Lote rende ~{t.totalUnits} unidades</span>
                                                    </div>
                                                )}
                                            </div>
                                        </Card>
                                    </div>

                                    <Card className="p-0 overflow-hidden border-brand-orange/30 shadow-xl flex flex-col h-full">
                                        <div className="bg-brand-orange px-6 py-5 flex items-center gap-3"><TrendingUp className="text-white"/><h3 className="font-black text-white text-lg tracking-wide uppercase">Simulador de Preço</h3></div>
                                        <div className="p-8 flex flex-col gap-8 flex-1 bg-white">
                                            
                                            <div className="space-y-6">
                                                <div>
                                                    <label className="flex items-center justify-between text-sm font-bold text-stone-600 uppercase mb-2">
                                                        <span>Markup Alvo (Margem %)</span>
                                                    </label>
                                                    <div className="relative">
                                                        <input type="number" className="w-full p-4 bg-orange-50/50 border border-orange-200 rounded-xl text-brand-orange font-black text-2xl outline-none focus:ring-2 focus:ring-brand-orange transition-all" value={p.targetMargin} onChange={e => updateField('targetMargin', Number(e.target.value))} />
                                                        <span className="absolute right-5 top-4 text-orange-400 font-black text-2xl">%</span>
                                                    </div>
                                                </div>
                                                <div className="bg-stone-50 p-5 rounded-xl border border-stone-200 flex justify-between items-center">
                                                    <span className="block text-xs font-bold text-stone-500 uppercase w-32">Preço Sugerido ({p.outputType==='unit'?'Un':'Kg'})</span>
                                                    <span className="block text-3xl font-black text-stone-800">R$ {formatMoney(t.suggestedPrice)}</span>
                                                </div>
                                            </div>

                                            <div className="bg-stone-900 rounded-2xl p-8 shadow-inner mt-auto">
                                                <label className="block text-sm font-bold text-stone-400 uppercase mb-4 flex items-center gap-2 tracking-wider"><DollarSign size={18}/> Preço de Venda Real Praticado</label>
                                                <div className="relative mb-8">
                                                    <span className="absolute left-4 top-4 text-white/50 font-black text-3xl">R$</span>
                                                    <input type="number" step="0.01" className="w-full p-4 pl-16 bg-white/10 border-2 border-white/20 rounded-xl text-4xl font-black text-white outline-none focus:border-emerald-500 transition-colors" value={p.manualSalePrice||''} onChange={e => updateField('manualSalePrice', Number(e.target.value))} placeholder={formatMoney(t.suggestedPrice)} />
                                                </div>
                                                
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className={`p-4 rounded-xl border ${t.marginPercent >= p.targetMargin ? 'bg-emerald-500/20 border-emerald-500/30 text-emerald-400' : 'bg-red-500/20 border-red-500/30 text-red-400'}`}>
                                                        <span className="block text-[10px] uppercase font-bold tracking-widest opacity-80 mb-1">Margem Real</span>
                                                        <span className="block text-2xl font-black">{formatMoney(t.marginPercent)}%</span>
                                                    </div>
                                                    <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                                                        <span className="block text-[10px] uppercase font-bold text-stone-400 tracking-widest mb-1">Lucro Bruto ({p.outputType==='unit'?'Un':'Kg'})</span>
                                                        <span className="block text-2xl font-black text-white">R$ {formatMoney(t.grossProfit)}</span>
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    </Card>
                                </div>
                            </div>
                        </div>

                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 p-4 shadow-lg flex justify-center gap-4 z-50 md:hidden">
                             <Button onClick={handleSave} className="bg-brand-brown text-white w-full"><Save size={18}/> Guardar Produto</Button>
                        </div>
                    </div>
                );
            };

            // VISTA: ESTOQUE (INVENTÁRIO)
            // ==========================================
            const renderInventory = () => {
                const addIng = async () => { 
                    if(invNewIng.name && invNewIng.price) { 
                        const newObj = { ...invNewIng, id: generateId(), price: Number(invNewIng.price) };
                        if (user) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', newObj.id), newObj);
                        setInvNewIng({code: '', name:'', price:'', unit:'kg'}); 
                        notify("Insumo adicionado ao estoque!"); 
                    } 
                };
                const updateIng = async (id, f, v) => {
                    setIngredients(prev => prev.map(i => i.id === id ? { ...i, [f]: v } : i));
                    if (user) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', id), { [f]: v }, { merge: true });
                };
                const removeIng = async (id) => {
                    if (user) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', id));
                };
                
                const filteredIngredients = ingredients.filter(i => 
                    i.name.toLowerCase().includes(invSearch.toLowerCase()) || 
                    (i.code && String(i.code).toLowerCase().includes(invSearch.toLowerCase()))
                );
                
                return (
                    <div className="max-w-7xl mx-auto space-y-6 animate-fade-in">
                        <NavHeader title="Estoque Integrado de Insumos" />
                        
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <Card className="p-6 h-fit bg-white border-none shadow-md">
                                <h3 className="font-black text-stone-800 mb-6 flex items-center gap-2 text-lg uppercase tracking-wider"><Plus className="text-brand-orange"/> Novo Insumo Manual</h3>
                                <div className="space-y-5">
                                    <div className="grid grid-cols-3 gap-3">
                                        <div className="col-span-1"><label className="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1.5">Cód. ERP</label><input placeholder="Ex: 114" value={invNewIng.code} onChange={e=>setInvNewIng({...invNewIng, code: e.target.value})} className="w-full p-3 border border-stone-200 rounded-xl outline-none focus:border-brand-orange bg-stone-50 font-mono text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1.5">Descrição / Nome</label><input placeholder="Ex: Farinha de Trigo" value={invNewIng.name} onChange={e=>setInvNewIng({...invNewIng, name: e.target.value})} className="w-full p-3 border border-stone-200 rounded-xl outline-none focus:border-brand-orange bg-stone-50 text-sm font-bold text-stone-800" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1.5">Preço (R$)</label><input type="number" step="0.01" placeholder="0.00" value={invNewIng.price} onChange={e=>setInvNewIng({...invNewIng, price: e.target.value})} className="w-full p-3 border border-stone-200 rounded-xl outline-none focus:border-brand-orange font-black text-brand-orange bg-orange-50/30" /></div>
                                        <div><label className="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1.5">Unidade</label><input placeholder="kg, L, un" value={invNewIng.unit} onChange={e=>setInvNewIng({...invNewIng, unit: e.target.value})} className="w-full p-3 border border-stone-200 rounded-xl outline-none focus:border-brand-orange bg-stone-50 text-center font-bold text-stone-600 text-sm" /></div>
                                    </div>
                                    <Button className="w-full bg-stone-900 text-white shadow-md py-3.5 mt-2" onClick={addIng}>Gravar no Estoque</Button>
                                </div>
                            </Card>

                            <Card className="p-0 lg:col-span-2 overflow-hidden flex flex-col border-none shadow-md">
                                <div className="bg-stone-900 text-white px-6 py-5 flex flex-col sm:flex-row items-center justify-between gap-4">
                                    <div className="flex items-center gap-3"><Database size={20} className="text-brand-orange"/><h3 className="font-bold text-lg tracking-wide">Base de Dados de Insumos</h3><span className="bg-white/10 px-2.5 py-1 rounded-lg text-xs font-black border border-white/10">{ingredients.length}</span></div>
                                    <div className="flex items-center gap-3 w-full sm:w-auto">
                                        <div className="relative flex-1 sm:w-64 text-stone-900">
                                            <Search className="absolute left-3 top-2.5 text-stone-400" size={18}/>
                                            <input type="text" placeholder="Pesquisa Inteligente (Nome ou Cód)..." value={invSearch} onChange={e=>setInvSearch(e.target.value)} className="w-full pl-10 pr-4 py-2 text-sm rounded-xl bg-white border-0 outline-none focus:ring-2 focus:ring-brand-orange font-medium"/>
                                        </div>
                                        <button onClick={() => setView('inv_print')} className="bg-white/10 hover:bg-white/20 border border-white/10 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors" title="Imprimir Base de Dados"><FileOutput size={16}/> Ficha TI</button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto flex-1 custom-scroll h-[600px] bg-white">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-stone-50 text-stone-400 uppercase text-[10px] tracking-widest font-black sticky top-0 shadow-sm z-10">
                                            <tr><th className="p-4 w-24 text-center border-b border-stone-200">Cód. ERP</th><th className="p-4 border-b border-stone-200">Descrição do Insumo</th><th className="p-4 text-center border-b border-stone-200 w-20">Unid</th><th className="p-4 text-right border-b border-stone-200 w-32">Preço (R$)</th><th className="p-4 border-b border-stone-200 w-16"></th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-stone-100">
                                            {filteredIngredients.map(i => (
                                                <tr key={i.id} className="hover:bg-stone-50 transition-colors group">
                                                    <td className="p-3 text-center"><input value={i.code || ''} placeholder="-" onChange={e=>updateIng(i.id, 'code', e.target.value)} className="w-16 bg-transparent border border-transparent outline-none text-center focus:bg-white focus:border-stone-300 rounded-lg px-2 py-1.5 text-stone-500 font-mono text-xs transition-all"/></td>
                                                    <td className="p-3"><input value={i.name} onChange={e=>updateIng(i.id, 'name', e.target.value)} className="w-full bg-transparent border border-transparent outline-none font-bold text-stone-800 focus:bg-white focus:border-brand-orange rounded-lg px-3 py-1.5 transition-all"/></td>
                                                    <td className="p-3 text-center"><input value={i.unit} onChange={e=>updateIng(i.id, 'unit', e.target.value)} className="w-14 bg-transparent border border-transparent outline-none text-center focus:bg-white focus:border-stone-300 rounded-lg px-2 py-1.5 font-medium text-stone-600 transition-all"/></td>
                                                    <td className="p-3 text-right"><div className="flex items-center justify-end gap-1"><span className="text-stone-400 text-xs font-bold">R$</span><input type="number" step="0.01" value={i.price} onChange={e=>updateIng(i.id, 'price', Number(e.target.value))} className="w-20 bg-transparent border border-transparent outline-none font-black text-stone-900 text-right focus:bg-white focus:border-brand-orange rounded-lg px-2 py-1.5 transition-all"/></div></td>
                                                    <td className="p-3 text-center"><button onClick={()=>removeIng(i.id)} className="text-stone-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-all"><Trash2 size={16}/></button></td>
                                                </tr>
                                            ))}
                                            {filteredIngredients.length === 0 && <tr><td colSpan="5" className="text-center p-16 text-stone-400 font-medium">Nenhum insumo encontrado na base de dados.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    </div>
                );
            };

            const renderInvPrint = () => {
                const filteredIngredients = ingredients.filter(i => 
                    i.name.toLowerCase().includes(invSearch.toLowerCase()) || 
                    (i.code && String(i.code).toLowerCase().includes(invSearch.toLowerCase()))
                );

                return (
                    <div className="max-w-4xl mx-auto p-8 bg-white min-h-screen shadow-2xl">
                        <div className="no-print flex justify-between items-center mb-8 border-b border-stone-200 pb-6">
                            <Button variant="secondary" onClick={() => setView('inventory')} className="text-sm"><ChevronLeft size={18}/> Voltar ao Estoque</Button>
                            <Button onClick={() => window.print()} className="bg-stone-900 text-white text-sm"><Printer size={18}/> Imprimir Ficha TI</Button>
                        </div>
                        <div className="text-center mb-10">
                            {settings?.logo && <img src={settings.logo} className="h-16 w-auto mx-auto mb-4" />}
                            <h1 className="text-2xl font-bold uppercase tracking-widest text-stone-800">Ficha de Cadastro de Insumos</h1>
                            <p className="text-stone-500">Para atualização no Sistema (TI)</p>
                            <p className="text-xs text-stone-400 mt-1 font-bold">Data de Emissão: {new Date().toLocaleDateString('pt-BR')}</p>
                        </div>
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="border-b-2 border-stone-800 text-stone-800 uppercase text-xs">
                                    <th className="py-2 pl-2">Código ERP</th>
                                    <th className="py-2">Item / Descrição</th>
                                    <th className="py-2 text-center">Unid.</th>
                                    <th className="py-2 pr-2 text-right">Preço Ref. (R$)</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-stone-200">
                                {filteredIngredients.map((i, idx) => (
                                    <tr key={idx} className="text-sm hover:bg-stone-50">
                                        <td className="py-2 pl-2 font-mono font-bold text-stone-600">{i.code || <span className="text-stone-300 italic">Sem Código</span>}</td>
                                        <td className="py-2 font-medium text-stone-900">{i.name}</td>
                                        <td className="py-2 text-center text-stone-600">{i.unit}</td>
                                        <td className="py-2 pr-2 text-right text-stone-800 font-medium">{formatMoney(i.price)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                )
            };

            const renderProdOrders = () => {
                const p = catalog.find(x => x.id === poSelectedProduct);
                const t = p ? calculateProductData(p) : null;
                let basisOptions = [];
                if (p) {
                    const activeSections = Array.from(new Set(p.ingredients.map(i => i.section || settings?.stages?.[0] || 'Massa')));
                    activeSections.forEach(s => basisOptions.push({ label: `[ETAPA] ${s}`, value: `SECTION:${s}` }));
                    p.ingredients.forEach(i => basisOptions.push({ label: `[ING] ${i.name}`, value: `ING:${i.name}:${i.section}` }));
                }

                let order = null;
                if (p && t) {
                    let factor = 1; let targetBatches = 0; let referenceLabel = "Padrão";
                    const activeSections = Array.from(new Set(p.ingredients.map(i => i.section || settings?.stages?.[0] || 'Massa')));
                    const sectionsData = {};
                    
                    activeSections.forEach(secName => {
                        const secIngs = p.ingredients.filter(i => (i.section || settings?.stages?.[0] || 'Massa') === secName);
                        const lossPct = p.sections?.[secName]?.processLossPct || 0;
                        const secGross = secIngs.reduce((acc, curr) => isPackaging(curr.name) ? acc : acc + toKg(safeVal(curr.qty), curr.unit), 0);
                        sectionsData[secName] = { secGross, yieldKg: secGross * (1 - lossPct/100) };
                    });

                    if (poMode === 'batch') { factor = Number(poInputValue) || 0; targetBatches = factor; referenceLabel = `${factor} Receita(s)`; } 
                    else if (poMode === 'target') { factor = (Number(poInputValue) || 0) / t.finalYieldKg; targetBatches = factor; referenceLabel = `Meta: ${Number(poInputValue)}kg Final`; } 
                    else if (poMode === 'proportional' && poBasisItem) {
                        const parts = poBasisItem.split(':'); const type = parts[0]; const name = parts[1]; const sec = parts[2];
                        const targetQty = Number(poInputValue) || 0; let baseQty = 0;
                        if (type === 'SECTION' && sectionsData[name]) baseQty = sectionsData[name].yieldKg; 
                        else if (type === 'ING') { const ing = p.ingredients.find(i => i.name === name && (i.section || 'Geral') === (sec || 'Geral')); if (ing) baseQty = toKg(safeVal(ing.qty), ing.unit); }
                        if (baseQty > 0) { factor = targetQty / baseQty; targetBatches = factor; referenceLabel = `Base: ${targetQty}kg de ${name}`; }
                    }

                    const sectionsOut = []; let grossTotal = 0;
                    activeSections.forEach(secName => {
                        const secIngs = p.ingredients.filter(i => (i.section || settings?.stages?.[0] || 'Massa') === secName);
                        const lossPct = p.sections?.[secName]?.processLossPct || 0;
                        let secGross = 0;
                        const scaledIngs = secIngs.map(ing => {
                            const variableQty = safeVal(ing.qty) * factor; const fixedQty = safeVal(ing.fixedQty); const totalVal = variableQty + fixedQty;
                            if(!isPackaging(ing.name)) secGross += toKg(totalVal, ing.unit);
                            return { ...ing, calcNet: totalVal };
                        });
                        grossTotal += secGross;
                        sectionsOut.push({ name: secName, lossPct, ingredients: scaledIngs, finalWeightKg: secGross * (1 - lossPct/100) });
                    });
                    order = { factor, sections: sectionsOut, grossTotal, finalProductWeightKg: t.finalYieldKg * factor, targetBatches, referenceLabel };
                }

                return (
                    <div className="max-w-5xl mx-auto space-y-6 animate-fade-in pb-20">
                        <NavHeader title="Ordens de Produção" />
                        <Card className="p-6 md:p-8 mb-6 border-none shadow-md bg-gradient-to-br from-white to-stone-50 no-print">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                                <div className="md:col-span-2"><label className="block text-[10px] font-bold text-stone-500 uppercase tracking-widest mb-2">Selecione o Produto a Fabricar</label><SearchableSelect options={catalog.map(c => ({label: c.name, value: c.id}))} value={poSelectedProduct} onChange={setPoSelectedProduct} placeholder="Pesquisar Produto..." /></div>
                                <div>
                                    <label className="block text-[10px] font-bold text-stone-500 uppercase tracking-widest mb-2">Escalonamento Matemático</label>
                                    <div className="flex bg-stone-200 p-1.5 rounded-xl overflow-x-auto shadow-inner">
                                        <button onClick={()=>setPoMode('batch')} className={`flex-1 py-2 px-2 text-xs font-bold rounded-lg whitespace-nowrap transition-all ${poMode==='batch'?'bg-white shadow-sm text-stone-900':'text-stone-500 hover:text-stone-700'}`}>Lotes</button>
                                        <button onClick={()=>setPoMode('target')} className={`flex-1 py-2 px-2 text-xs font-bold rounded-lg whitespace-nowrap transition-all ${poMode==='target'?'bg-white shadow-sm text-stone-900':'text-stone-500 hover:text-stone-700'}`}>Kg Final</button>
                                        <button onClick={()=>setPoMode('proportional')} className={`flex-1 py-2 px-2 text-xs font-bold rounded-lg whitespace-nowrap transition-all ${poMode==='proportional'?'bg-white shadow-sm text-stone-900':'text-stone-500 hover:text-stone-700'}`}>Por Item</button>
                                    </div>
                                </div>
                            </div>
                            {p && (
                                <div className="mt-8 flex flex-col md:flex-row gap-6 items-end border-t border-stone-200 pt-8 animate-fade-in">
                                    {poMode === 'proportional' && (<div className="flex-1 w-full"><label className="block text-[10px] font-bold text-brand-orange uppercase tracking-widest mb-2">Basear a matemática em:</label><SearchableSelect options={basisOptions} value={poBasisItem} onChange={setPoBasisItem} placeholder="Ex: Massa, Farinha..." /></div>)}
                                    <div className="flex-1 w-full">
                                        <label className="block text-[10px] font-bold text-brand-orange uppercase tracking-widest mb-2">{poMode === 'batch' ? 'Quantos Lotes / Receitas Base?' : poMode === 'target' ? 'Qual a Meta de Quilos (Kg) Final?' : 'Qual a Quantidade Disponível (Kg)?'}</label>
                                        <input type="number" step="any" value={poInputValue} onChange={e=>setPoInputValue(e.target.value)} className="w-full p-4 border border-orange-200 rounded-xl text-3xl font-black text-stone-800 outline-none focus:border-brand-orange bg-white shadow-inner transition-all" />
                                    </div>
                                    <Button onClick={()=>window.print()} className="h-16 px-8 bg-stone-900 text-white w-full md:w-auto shadow-lg hover:shadow-xl"><Printer size={20}/> Imprimir Ficha de Produção</Button>
                                </div>
                            )}
                        </Card>

                        {order && (
                            <Card className="border-none shadow-2xl overflow-hidden print-shadow-none">
                                <div className="bg-stone-900 text-white p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                    <div><span className="text-stone-400 text-[10px] font-bold uppercase tracking-widest block mb-2 flex items-center gap-2"><ClipboardList size={14}/> Ordem de Produção Emitida</span><h2 className="text-3xl font-black">{p.name}</h2><p className="text-sm font-medium text-stone-400 mt-2 bg-stone-800 inline-block px-3 py-1 rounded-lg">Cálculo Base: {order.referenceLabel}</p></div>
                                    <div className="md:text-right w-full md:w-auto bg-stone-800 md:bg-transparent p-4 md:p-0 rounded-xl"><span className="text-stone-400 text-[10px] font-bold uppercase tracking-widest block mb-2">Rendimento Alvo Estimado</span><span className="text-4xl font-black text-emerald-400">{order.finalProductWeightKg.toFixed(3)} <span className="text-xl text-emerald-600">kg</span></span>{p.outputType === 'unit' && p.outputUnitWeight > 0 && (<span className="block text-sm font-bold text-stone-400 mt-2">Equivalente a ~ {Math.floor(order.finalProductWeightKg / toKg(p.outputUnitWeight, p.outputUnitMeasure))} unidades</span>)}</div>
                                </div>
                                <div className="p-8">
                                    <div className="flex flex-col md:flex-row gap-6 mb-10 bg-stone-50 p-6 rounded-2xl border border-stone-200 shadow-inner">
                                        <div className="flex-1 md:border-r border-stone-200 md:pr-6"><span className="block text-[10px] text-stone-500 uppercase font-bold tracking-widest mb-1">Múltiplo de Lotes Escalonado</span><span className="text-2xl font-black text-stone-800">{order.targetBatches.toFixed(3)}x <span className="text-sm font-bold text-stone-400">Padrão</span></span></div>
                                        <div className="flex-1 md:pl-6 pt-6 md:pt-0 border-t md:border-t-0 border-stone-200"><span className="block text-[10px] text-stone-500 uppercase font-bold tracking-widest mb-1">Massa Bruta Total (Entrada)</span><span className="text-2xl font-black text-stone-800">{order.grossTotal.toFixed(3)} <span className="text-sm font-bold text-stone-400">kg</span></span></div>
                                    </div>
                                </div>
                            </Card>
                        )}
                    </div>
                );
            };

            const renderSettingsView = () => {
                const handleExport = () => { const data = JSON.stringify({ catalog, ingredients, settings, logs }); const blob = new Blob([data], {type: "application/json"}); const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.download = `backup_gestao_${new Date().toISOString().slice(0,10)}.json`; link.href = url; link.click(); };
                const handleImport = (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = async (evt) => { try { const d = JSON.parse(evt.target.result); if(d.catalog || d.ingredients || d.settings || d.logs) { if (user) { const batch = writeBatch(db); if (d.catalog) d.catalog.forEach(p => batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'catalog', p.id), p)); if (d.ingredients) d.ingredients.forEach(i => batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'ingredients', i.id), i)); if (d.logs) d.logs.forEach(l => batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'logs', l.id), l)); if (d.settings) batch.set(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'settings'), d.settings); await batch.commit(); } notify("Sistema restaurado com sucesso do Firebase!"); } } catch(err){ notify("Erro no ficheiro de backup."); } }; reader.readAsText(file); };
                
                const addLine = () => { if(setNewLine) { updateSettings({...settings, lines: [...(settings?.lines || []), setNewLine]}); setSetNewLine(''); } };
                const addStage = () => { if(setNewStage) { updateSettings({...settings, stages: [...(settings?.stages || []), setNewStage]}); setSetNewStage(''); } };
                const addMachine = () => { if(setNewMachine.name) { updateSettings({...settings, machines: [...(settings?.machines || []), { ...setNewMachine, id: generateId() }]}); setSetNewMachine({name:'', powerWatts:''}); } };
                const addEmployee = () => { if(setNewEmployee.name) { updateSettings({...settings, employees: [...(settings?.employees || []), { ...setNewEmployee, id: generateId() }]}); setSetNewEmployee({name:'', salary:'', hoursMonth:220}); } };
                const addDefaultIndirect = () => { if(setNewIndirect.name && setNewIndirect.cost) { updateSettings({...settings, defaultIndirectCosts: [...(settings?.defaultIndirectCosts || []), { ...setNewIndirect, id: generateId(), cost: Number(setNewIndirect.cost) }]}); setSetNewIndirect({name:'', cost:'', type:'%'}); } };

                const removeLine = (l) => updateSettings({...settings, lines: (settings?.lines || []).filter(x => x !== l)});
                const removeStage = (s) => updateSettings({...settings, stages: (settings?.stages || []).filter(x => x !== s)});
                const removeMachine = (id) => updateSettings({...settings, machines: (settings?.machines || []).filter(x => x.id !== id)});
                const removeEmployee = (id) => updateSettings({...settings, employees: (settings?.employees || []).filter(x => x.id !== id)});
                const removeDefaultIndirect = (id) => updateSettings({...settings, defaultIndirectCosts: (settings?.defaultIndirectCosts || []).filter(x => x.id !== id)});

                return (
                    <div className="max-w-4xl mx-auto space-y-6 animate-fade-in pb-20">
                        <NavHeader title="Configurações do Sistema" />
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <Card className="p-6 md:col-span-2 flex flex-col md:flex-row items-center justify-between bg-stone-900 border-none shadow-md gap-4 text-white">
                                <div><h3 className="font-bold text-lg flex items-center gap-2 mb-1"><Archive className="text-stone-400"/> Backup Integrado</h3><p className="text-sm text-stone-400 font-medium">Faça o download ou restaure toda a base de dados num único ficheiro JSON seguro.</p></div>
                                <div className="flex gap-3 w-full md:w-auto">
                                    <div className="relative flex-1 md:flex-none">
                                        <input type="file" accept=".json" onChange={handleImport} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10"/>
                                        <Button variant="secondary" className="w-full bg-white/10 text-white border-white/20 hover:bg-white/20 relative z-0"><Upload size={16}/> Restaurar</Button>
                                    </div>
                                    <Button onClick={handleExport} className="bg-brand-orange text-white flex-1 md:flex-none hover:bg-orange-600 border-none"><Download size={16}/> Exportar DB</Button>
                                </div>
                            </Card>

                            <Card className="p-6 border-none shadow-sm">
                                <h3 className="font-black text-stone-800 text-lg mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]"><ImageIcon size={16} className="text-stone-400"/> Logótipo da Empresa</h3>
                                <div className="flex gap-5 items-center">
                                    <div className="w-24 h-24 bg-stone-50 rounded-2xl border-2 border-dashed border-stone-200 flex items-center justify-center overflow-hidden relative group transition-colors hover:border-brand-orange hover:bg-orange-50 cursor-pointer z-0">
                                        <input type="file" accept="image/*" onChange={async (e) => { 
                                            const f = e.target.files[0]; 
                                            if(f){ 
                                                try {
                                                    const base64 = await compressImage(f, 400);
                                                    updateSettings({...settings, logo: base64});
                                                } catch(err) {
                                                    notify("Erro ao processar o logótipo.");
                                                }
                                            } 
                                        }} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"/>
                                        {settings?.logo ? (
                                            <>
                                                <img src={settings.logo} className="w-full h-full object-contain p-2 relative z-0"/>
                                                <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity z-10">
                                                    <button onClick={(e)=>{e.preventDefault(); e.stopPropagation(); updateSettings({...settings, logo: null});}} className="text-white bg-red-500 p-2 rounded-full relative z-20 hover:bg-red-600 transition-colors shadow-lg"><Trash2 size={16}/></button>
                                                </div>
                                            </>
                                        ) : (
                                            <ImageIcon className="text-stone-300 relative z-0"/>
                                        )}
                                    </div>
                                    <p className="text-xs text-stone-500 font-medium">Aparece no cabeçalho e nas impressões PDF.</p>
                                </div>
                            </Card>
                            <Card className="p-6 border-none shadow-sm">
                                <h3 className="font-black text-stone-800 text-lg mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]"><Zap size={16} className="text-yellow-500"/> Tarifa de Energia</h3>
                                <div><label className="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Preço KWh Referência (R$)</label><input type="number" step="0.01" value={settings?.kwhPrice || 0} onChange={e=>updateSettings({...settings, kwhPrice: Number(e.target.value)})} className="w-full p-3 border border-stone-200 rounded-xl font-black text-stone-800 outline-none focus:border-yellow-500 bg-stone-50 transition-colors" /></div>
                            </Card>

                            <Card className="p-6 md:col-span-2 border-none shadow-sm">
                                <h3 className="font-black text-stone-800 text-lg mb-2 flex items-center gap-2 uppercase tracking-widest text-[11px]"><Coins size={16} className="text-brand-orange"/> Taxas e Indiretos (Padrão Global)</h3>
                                <p className="text-xs text-stone-500 font-medium mb-6">Estas parcelas serão adicionadas automaticamente à aba de Custos de <strong>todas as novas Fichas Técnicas</strong>.</p>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-stone-50 p-5 rounded-2xl border border-stone-200 border-dashed">
                                    <input className="md:col-span-2 border border-stone-200 bg-white rounded-xl px-4 py-3 text-sm font-bold text-stone-800 outline-none focus:border-brand-orange transition-colors" placeholder="Ex: Taxa TPA, Embalagem Genérica" value={setNewIndirect.name} onChange={e=>setSetNewIndirect({...setNewIndirect, name: e.target.value})} />
                                    <div className="flex items-center bg-white rounded-xl border border-stone-200 overflow-hidden focus-within:border-brand-orange transition-colors">
                                        <select value={setNewIndirect.type} onChange={e=>setSetNewIndirect({...setNewIndirect, type: e.target.value})} className="p-3 bg-stone-100 text-sm font-black text-stone-600 outline-none border-r border-stone-200 cursor-pointer">
                                            <option value="%">%</option>
                                            <option value="R$">R$</option>
                                        </select>
                                        <input type="number" step="0.01" className="w-full border-none px-3 py-3 text-sm font-black text-stone-800 outline-none focus:ring-0 text-right" placeholder="0.00" value={setNewIndirect.cost} onChange={e=>setSetNewIndirect({...setNewIndirect, cost: e.target.value})} />
                                    </div>
                                    <Button onClick={addDefaultIndirect} className="bg-stone-900 text-white rounded-xl">Registar Padrão</Button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {(settings?.defaultIndirectCosts || []).map(ind => (
                                        <div key={ind.id} className="flex justify-between items-center p-4 border border-stone-200 rounded-xl bg-white shadow-sm hover:border-brand-orange transition-colors group">
                                            <div>
                                                <div className="font-bold text-sm text-stone-800 mb-0.5">{ind.name}</div>
                                                <div className="text-xs font-black text-brand-orange">{ind.type === '%' ? `${ind.cost}% do Subtotal` : `R$ ${ind.cost} fixos`}</div>
                                            </div>
                                            <button onClick={()=>removeDefaultIndirect(ind.id)} className="text-stone-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100"><Trash2 size={18}/></button>
                                        </div>
                                    ))}
                                </div>
                            </Card>

                            <Card className="p-6 border-none shadow-sm">
                                <h3 className="font-black text-stone-800 mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]">Categorias de Produto</h3>
                                <div className="flex gap-2 mb-6"><input value={setNewLine} onChange={e=>setSetNewLine(e.target.value)} placeholder="Ex: Padaria Fria" className="flex-1 p-3 border border-stone-200 bg-stone-50 rounded-xl text-sm font-bold text-stone-800 outline-none focus:border-brand-orange transition-colors" /><Button onClick={addLine} className="bg-stone-900 text-white px-4 rounded-xl"><Plus size={18}/></Button></div>
                                <ul className="space-y-2">{(settings?.lines || []).map(l => <li key={l} className="flex justify-between items-center bg-white p-3 rounded-xl text-sm font-medium border border-stone-200 shadow-sm group">{l}<button onClick={()=>removeLine(l)} className="text-stone-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16}/></button></li>)}</ul>
                            </Card>
                            <Card className="p-6 border-none shadow-sm">
                                <h3 className="font-black text-stone-800 mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]">Etapas de Processo</h3>
                                <div className="flex gap-2 mb-6"><input value={setNewStage} onChange={e=>setSetNewStage(e.target.value)} placeholder="Ex: Forneamento" className="flex-1 p-3 border border-stone-200 bg-stone-50 rounded-xl text-sm font-bold text-stone-800 outline-none focus:border-brand-orange transition-colors" /><Button onClick={addStage} className="bg-stone-900 text-white px-4 rounded-xl"><Plus size={18}/></Button></div>
                                <ul className="space-y-2">{(settings?.stages || []).map(s => <li key={s} className="flex justify-between items-center bg-white p-3 rounded-xl text-sm font-medium border border-stone-200 shadow-sm group">{s}<button onClick={()=>removeStage(s)} className="text-stone-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16}/></button></li>)}</ul>
                            </Card>

                            <Card className="p-6 md:col-span-2 border-none shadow-sm">
                                <h3 className="font-black text-stone-800 text-lg mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]"><Users size={16} className="text-stone-400"/> Profissionais & Cargos</h3>
                                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6 bg-stone-50 p-5 rounded-2xl border border-stone-200 border-dashed">
                                    <input className="md:col-span-2 border border-stone-200 bg-white rounded-xl px-4 py-3 text-sm font-bold text-stone-800 outline-none focus:border-brand-orange transition-colors" placeholder="Cargo (Ex: Padeiro)" value={setNewEmployee.name} onChange={e=>setSetNewEmployee({...setNewEmployee, name: e.target.value})} />
                                    <input type="number" className="border border-stone-200 bg-white rounded-xl px-4 py-3 text-sm font-bold text-stone-800 outline-none focus:border-brand-orange transition-colors" placeholder="Salário (R$)" value={setNewEmployee.salary} onChange={e=>setSetNewEmployee({...setNewEmployee, salary: Number(e.target.value)})} />
                                    <div className="md:col-span-2 flex gap-3"><input type="number" className="w-full border border-stone-200 bg-white rounded-xl px-4 py-3 text-sm font-bold text-stone-800 text-center outline-none focus:border-brand-orange transition-colors" placeholder="Carga (Hrs/mês)" value={setNewEmployee.hoursMonth} onChange={e=>setSetNewEmployee({...setNewEmployee, hoursMonth: Number(e.target.value)})} /><Button onClick={addEmployee} className="bg-stone-900 text-white rounded-xl w-full">Registar</Button></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {(settings?.employees || []).map(e => <div key={e.id} className="flex justify-between items-center p-4 border border-stone-200 rounded-xl bg-white shadow-sm group"><div><div className="font-bold text-sm text-stone-800 mb-0.5">{e.name}</div><div className="text-xs font-bold text-stone-400 tracking-wider">R$ {e.salary} <span className="font-medium text-stone-300">|</span> {e.hoursMonth}h/mês</div></div><button onClick={()=>removeEmployee(e.id)} className="text-stone-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100"><Trash2 size={18}/></button></div>)}
                                </div>
                            </Card>

                            <Card className="p-6 md:col-span-2 border-none shadow-sm">
                                <h3 className="font-black text-stone-800 text-lg mb-4 flex items-center gap-2 uppercase tracking-widest text-[11px]"><Settings size={16} className="text-stone-400"/> Equipamentos de Produção</h3>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-stone-50 p-5 rounded-2xl border border-stone-200 border-dashed">
                                    <input className="md:col-span-2 border border-stone-200 bg-white rounded-xl px-4 py-3 text-sm font-bold text-stone-800 outline-none focus:border-brand-orange transition-colors" placeholder="Equipamento (Ex: Forno Elétrico)" value={setNewMachine.name} onChange={e=>setSetNewMachine({...setNewMachine, name: e.target.value})} />
                                    <input type="number" className="border border-stone-200 bg-white rounded-xl px-4 py-3 text-sm font-black text-brand-orange text-right outline-none focus:border-brand-orange transition-colors" placeholder="Consumo Watts" value={setNewMachine.powerWatts} onChange={e=>setSetNewMachine({...setNewMachine, powerWatts: Number(e.target.value)})} />
                                    <Button onClick={addMachine} className="bg-stone-900 text-white rounded-xl w-full">Registar Eq.</Button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {(settings?.machines || []).map(m => <div key={m.id} className="flex justify-between items-center p-4 border border-stone-200 rounded-xl bg-white shadow-sm group"><div><div className="font-bold text-sm text-stone-800 mb-0.5">{m.name}</div><div className="text-xs font-black text-brand-orange tracking-wider">{m.powerWatts} <span className="font-medium text-stone-400">Watts</span></div></div><button onClick={()=>removeMachine(m.id)} className="text-stone-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100"><Trash2 size={18}/></button></div>)}
                                </div>
                            </Card>
                        </div>
                    </div>
                );
            };

            const menuItems = [
                { id: 'dashboard', label: 'Visão Geral', icon: LayoutDashboard },
                { id: 'catalog_list', label: 'Fichas Técnicas', icon: Book },
                { id: 'inventory', label: 'Estoque / Insumos', icon: Database },
                { id: 'prod_orders', label: 'Ordens de Produção', icon: ClipboardList },
                { id: 'prod_monitoring', label: 'Qualidade & Rend.', icon: Activity },
                { id: 'settings', label: 'Configurações', icon: Settings }
            ];

            if (loadingAuth) {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center bg-[#f5f5f4] text-stone-600">
                        <Loader2 className="animate-spin w-12 h-12 mb-4 text-brand-orange"/>
                        <p className="font-bold text-lg">Conectando ao Firebase...</p>
                        <p className="text-sm text-stone-400">A verificar a sua sessão</p>
                    </div>
                );
            }

            if (!user) {
                return renderLogin();
            }

            let content;
            if (view === 'dashboard') content = renderDashboard();
            else if (view === 'catalog_list') content = renderCatalogList();
            else if (view === 'catalog_editor') content = renderCatalogEditor();
            else if (view === 'inventory') content = renderInventory();
            else if (view === 'inv_print') content = renderInvPrint();
            else if (view === 'prod_orders') content = renderProdOrders();
            else if (view === 'prod_monitoring') content = renderMonitoring();
            else if (view === 'settings') content = renderSettingsView();

            return (
                <div className="flex h-screen overflow-hidden font-sans text-stone-900 w-full bg-stone-100 selection:bg-brand-orange selection:text-white">
                    <div className={`fixed inset-0 z-50 flex md:hidden ${isMobileMenuOpen ? '' : 'pointer-events-none'}`}>
                        <div className={`fixed inset-0 bg-stone-900/60 backdrop-blur-sm transition-opacity duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsMobileMenuOpen(false)}></div>
                        <aside id="sidebar-root" className={`relative flex w-[280px] max-w-[85vw] flex-col bg-stone-950 transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] shadow-2xl ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="flex items-center justify-between px-6 py-6 border-b border-white/5">
                                <div className="flex items-center gap-3">
                                    {settings?.logo ? <img src={settings.logo} className="h-10 w-auto rounded-lg bg-white p-1" /> : <div className="p-2.5 bg-brand-orange rounded-xl text-white shadow-lg shadow-orange-500/20"><ChefHat size={22}/></div>}
                                    <span className="text-lg font-black text-white tracking-wide leading-tight">Fichas Técnicas<br/><span className="text-xs text-stone-400 font-bold tracking-widest uppercase">Custos</span></span>
                                </div>
                                <button onClick={() => setIsMobileMenuOpen(false)} className="text-stone-400 hover:text-white transition-colors bg-white/5 p-2 rounded-full"><X size={20} /></button>
                            </div>
                            <nav className="flex-1 space-y-1.5 px-4 py-6 overflow-y-auto custom-scroll">
                                {menuItems.map(item => {
                                    const isActive = view === item.id || (view === 'catalog_editor' && item.id === 'catalog_list') || (view === 'inv_print' && item.id === 'inventory');
                                    return (
                                        <button key={item.id} onClick={() => { setView(item.id); setIsMobileMenuOpen(false); }} className={`flex items-center gap-4 w-full px-4 py-3.5 rounded-2xl transition-all font-bold text-sm outline-none ${isActive ? 'bg-brand-orange text-white shadow-lg shadow-orange-500/20 translate-x-1' : 'text-stone-400 hover:bg-white/5 hover:text-stone-100'}`}>
                                            <item.icon size={20} className={isActive ? 'text-white' : 'text-stone-500'} strokeWidth={isActive ? 2.5 : 2}/> {item.label}
                                        </button>
                                    )
                                })}
                            </nav>
                            <div className="p-6 border-t border-white/5 relative z-10">
                                <div className="bg-white/5 rounded-2xl p-4 flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        {user?.photoURL ? <img src={user.photoURL} className="w-8 h-8 rounded-full" /> : <div className="w-8 h-8 rounded-full bg-stone-800 flex items-center justify-center"><Users size={16} className="text-stone-400"/></div>}
                                        <div className="flex flex-col text-left">
                                            <span className="text-xs text-white font-bold truncate max-w-[100px]">{user?.displayName || 'Utilizador'}</span>
                                            <button onClick={() => signOut(auth)} className="text-[10px] text-stone-500 hover:text-brand-orange transition-colors uppercase font-bold tracking-widest mt-0.5">Terminar Sessão</button>
                                        </div>
                                    </div>
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
                                </div>
                            </div>
                        </aside>
                    </div>

                    <aside id="sidebar-root" className={`hidden md:flex flex-col bg-stone-950 border-r border-stone-800 no-print flex-shrink-0 shadow-2xl z-40 relative transition-all duration-300 ease-in-out ${isSidebarExpanded ? 'w-72' : 'w-20'}`}>
                        <button 
                            onClick={() => setIsSidebarExpanded(!isSidebarExpanded)} 
                            className="absolute -right-3.5 top-10 w-7 h-7 bg-stone-800 border border-stone-700 rounded-full flex items-center justify-center text-stone-400 hover:text-white hover:bg-stone-700 transition-colors z-50 shadow-md"
                        >
                            {isSidebarExpanded ? <ChevronLeft size={16} /> : <ChevronRight size={16} />}
                        </button>

                        <div className={`flex items-center ${isSidebarExpanded ? 'gap-4 px-8' : 'justify-center px-0'} py-8 border-b border-white/5 relative overflow-hidden h-[100px] flex-shrink-0 transition-all`}>
                            <div className="absolute -right-12 -top-12 w-32 h-32 bg-brand-orange/10 rounded-full blur-3xl"></div>
                            {settings?.logo ? (
                                <img src={settings.logo} className={`w-auto rounded-xl bg-white p-1.5 shadow-lg relative z-10 flex-shrink-0 transition-all ${isSidebarExpanded ? 'h-12' : 'h-8'}`} title={!isSidebarExpanded ? "Fichas Técnicas" : ""} />
                            ) : (
                                <div className={`bg-brand-orange rounded-2xl text-white shadow-xl shadow-orange-500/20 relative z-10 flex-shrink-0 flex items-center justify-center transition-all ${isSidebarExpanded ? 'p-3 w-12 h-12' : 'p-2 w-10 h-10'}`} title={!isSidebarExpanded ? "Fichas Técnicas" : ""}>
                                    <ChefHat size={isSidebarExpanded ? 26 : 20} strokeWidth={2.5}/>
                                </div>
                            )}
                            {isSidebarExpanded && (
                                <div className="relative z-10 whitespace-nowrap animate-fade-in overflow-hidden">
                                    <span className="text-xl font-black text-white tracking-wide leading-none block mb-1 truncate">Fichas Técnicas</span>
                                    <span className="text-[10px] text-brand-orange font-black tracking-widest uppercase truncate">Sistema de Custos</span>
                                </div>
                            )}
                        </div>
                        <nav className={`flex-1 space-y-2 py-8 overflow-y-auto custom-scroll relative z-10 transition-all ${isSidebarExpanded ? 'px-5' : 'px-3'}`}>
                            {menuItems.map(item => {
                                const isActive = view === item.id || (view === 'catalog_editor' && item.id === 'catalog_list') || (view === 'inv_print' && item.id === 'inventory');
                                return (
                                    <button key={item.id} onClick={() => setView(item.id)} title={!isSidebarExpanded ? item.label : ""} className={`flex items-center w-full py-4 rounded-2xl transition-all font-bold outline-none group ${isSidebarExpanded ? 'px-5 gap-4 justify-start' : 'px-0 justify-center'} ${isActive ? 'bg-brand-orange text-white shadow-xl shadow-orange-500/20 scale-[1.02]' : 'text-stone-400 hover:bg-white/5 hover:text-stone-100'}`}>
                                        <item.icon size={22} className={`transition-transform duration-300 flex-shrink-0 ${isActive ? 'text-white scale-110' : 'text-stone-500 group-hover:scale-110'}`} strokeWidth={isActive ? 2.5 : 2}/> 
                                        {isSidebarExpanded && <span className="whitespace-nowrap animate-fade-in">{item.label}</span>}
                                    </button>
                                )
                            })}
                        </nav>
                        <div className={`py-6 border-t border-white/5 relative z-10 transition-all ${isSidebarExpanded ? 'px-6' : 'px-3'}`}>
